# Local-dev runner for the control plane.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up firestore-emulator
#   # in another terminal:
#   FIRESTORE_PROJECT=clayrune-dev FIRESTORE_EMULATOR_HOST=127.0.0.1:8081 \
#     uvicorn app.main:app --reload --port 8080
#
# Why Docker for the emulator? The emulator ships in `gcloud beta emulators`,
# which requires Java + a working gcloud install. Docker sidesteps both.

services:
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: >
      gcloud beta emulators firestore start
      --host-port=0.0.0.0:8081
      --project=clayrune-dev
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
