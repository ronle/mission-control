    border-radius: 9px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s;
  }
  .schedule-toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%; background: var(--text-faint);
    transition: all 0.2s;
  }
  .schedule-toggle.on { background: var(--accent-dim); border-color: var(--accent); }
  .schedule-toggle.on::after { left: 18px; background: var(--accent); }
  .schedule-form {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px 16px 24px; margin-bottom: 20px;
  }
  .schedule-form label { display: block; font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .schedule-form select, .schedule-form input[type="text"], .schedule-form input[type="time"],
  .schedule-form input[type="number"], .schedule-form input[type="datetime-local"], .schedule-form textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 13px; padding: 8px 10px; border-radius: 5px;
    outline: none; box-sizing: border-box; margin-bottom: 10px;
  }
  .schedule-form select:focus, .schedule-form input:focus, .schedule-form textarea:focus { border-color: var(--accent); }
  .schedule-form textarea { resize: vertical; min-height: 60px; }
  .schedule-form .sched-type-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .schedule-form .sched-type-btn {
    flex: 1; padding: 6px; text-align: center; border: 1px solid var(--border);
    border-radius: 5px; background: transparent; color: var(--text-faint);
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .schedule-form .sched-type-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .schedule-form .sched-days { display: flex; gap: 4px; margin-bottom: 10px; }
  .schedule-form .sched-day-btn {
    width: 32px; height: 28px; border: 1px solid var(--border); border-radius: 4px;
    background: transparent; color: var(--text-faint); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .schedule-form .sched-day-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .schedule-form .sched-actions { display: flex; gap: 8px; margin-top: 4px; }
  .schedule-form .btn-sched-save {
    padding: 8px 20px; background: var(--accent-dim); border: 1px solid var(--accent);
    color: var(--accent); font-weight: 600; border-radius: 5px; cursor: pointer; font-size: 12px;
  }
  .schedule-form .btn-sched-save:hover { background: var(--accent); color: var(--bg); }
  .schedule-form .btn-sched-cancel {
    padding: 8px 20px; background: transparent; border: 1px solid var(--border);
    color: var(--text-faint); font-weight: 600; border-radius: 5px; cursor: pointer; font-size: 12px;
  }
  .schedule-empty { color: var(--text-faint); font-size: 13px; text-align: center; padding: 24px; }

  /* ── PLAN HISTORY CARDS ─────────────────────────────────────── */
  .plan-history-card {
    padding: 12px 14px; border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .plan-history-card:hover { border-color: var(--accent); }
  .plan-history-card .plan-cb { flex-shrink: 0; margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
  .plan-card-body { flex: 1; min-width: 0; }
  .plan-history-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .plan-history-meta { font-size: 11px; color: var(--text-faint); display: flex; gap: 12px; }
  .plan-history-task { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .plan-history-filename { color: var(--text-faint); font-size: 10px; opacity: 0.7; }
  .plan-card-delete {
    flex-shrink: 0; background: none; border: none; color: var(--text-faint); cursor: pointer;
    font-size: 14px; padding: 2px 4px; border-radius: 4px; opacity: 0.5; transition: opacity 0.15s, color 0.15s;
  }
  .plan-card-delete:hover { opacity: 1; color: #e55; }
  .plans-toolbar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 6px 0;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .plans-toolbar label { font-size: 12px; color: var(--text-faint); cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .plans-toolbar label input { accent-color: var(--accent); }
  .plans-toolbar .btn-plans-action {
    font-size: 11px; padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .plans-toolbar .btn-plans-action:hover { background: var(--border); }
  .plans-toolbar .btn-plans-delete { color: #e55; border-color: #e55; }
  .plans-toolbar .btn-plans-delete:hover { background: #e55; color: #fff; }

  /* ── TOKEN COUNTERS ────────────────────────────────────────── */
  .token-counter-global {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-faint); padding: 4px 10px;
    border: 1px solid var(--border); border-radius: 5px;
    cursor: pointer; white-space: nowrap; position: relative;
    user-select: none;
  }
  .token-counter-global .tc-icon { font-size: 13px; }
  .token-counter-global .tc-cost { color: var(--green-text); font-weight: 500; }
  .token-counter-global .tc-mode {
    font-size: 9px; color: var(--text-faint); text-transform: uppercase;
    letter-spacing: 0.5px; opacity: 0.7;
  }
  .tc-context-menu {
    display: none; position: fixed; z-index: 999;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; min-width: 170px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); overflow: hidden;
    padding: 4px 0;
  }
  .tc-context-menu.open { display: block; }
  .tc-ctx-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; cursor: pointer; font-size: 12px;
    color: var(--text); border: none; background: none;
    width: 100%; text-align: left; transition: background 0.1s;
  }
  .tc-ctx-item:hover { background: var(--surface3); }
  .tc-ctx-item.active { color: var(--accent); font-weight: 600; }
  .tc-ctx-item .ctx-check { width: 14px; text-align: center; font-size: 11px; }
  .tc-ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }
  .token-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-faint); padding: 2px 8px;
    background: var(--surface3); border-radius: 4px;
    white-space: nowrap; min-width: 0;
  }
  .token-badge:empty { display: none; }
  }
  .token-badge .tb-cost { color: var(--green-text); }
  .agent-log-usage {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-faint); margin-top: 2px;
  }
  .agent-log-usage .alu-cost { color: var(--green-text); }

  .shared-rules-editor {
    padding: 28px; display: flex; flex-direction: column;
    height: calc(100% - 56px); box-sizing: border-box;
  }
  .shared-rules-editor h2 {
    font-size: 16px; font-weight: 700; color: var(--text); margin: 0 0 6px 0;
    flex-shrink: 0;
  }
  .shared-rules-editor .rules-hint {
    font-size: 11px; color: var(--text-faint); margin-bottom: 16px;
    flex-shrink: 0;
  }
  .shared-rules-editor .rules-textarea {
    flex: 1; min-height: 0; max-height: none; resize: none;
  }

  .new-project-form { padding: 28px; }
  .new-project-form h2 {
    font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text);
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 11px; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-faint); font-weight: 600; margin-bottom: 5px;
  }
  .form-group input, .form-group select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 8px 12px; border-radius: 5px; outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text-faint); }
  .form-group .hint { font-size: 11px; color: var(--text-faint); margin-top: 3px; }

  /* ── FOLDER BROWSER ────────────────────────────────────────── */
  .folder-breadcrumb {
    display: flex; align-items: center; gap: 2px;
    padding: 6px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; margin-bottom: 6px; overflow-x: auto; white-space: nowrap;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
  }
  .folder-breadcrumb::-webkit-scrollbar { height: 4px; }
  .folder-breadcrumb::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .folder-crumb {
    color: var(--accent); cursor: pointer; padding: 2px 4px; border-radius: 3px; flex-shrink: 0;
  }
  .folder-crumb:hover { background: var(--accent-dim); }
  .folder-crumb-sep { color: var(--text-faint); flex-shrink: 0; font-size: 10px; }
  .folder-crumb-current { color: var(--text); font-weight: 600; padding: 2px 4px; flex-shrink: 0; }
  .folder-listing {
    display: flex; flex-direction: column; gap: 2px;
    max-height: 200px; overflow-y: auto;
    background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 4px;
  }
  .folder-listing::-webkit-scrollbar { width: 5px; }
  .folder-listing::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .folder-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    color: var(--text-dim); font-size: 13px; transition: background 0.1s;
  }
  .folder-item:hover { background: var(--surface3); color: var(--text); }
  .folder-item-icon { flex-shrink: 0; color: var(--accent); font-size: 14px; }
  .folder-item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .folder-empty, .folder-loading { padding: 16px; text-align: center; color: var(--text-faint); font-size: 12px; }
  .folder-error { padding: 10px; color: var(--red-text); font-size: 12px; background: var(--red-dim); border-radius: 4px; text-align: center; }

  /* ── AGENT CONSOLE (persistent bottom panel) ────────────────── */
  .agent-console {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    transition: height 0.2s ease;
  }
  .agent-console.collapsed { height: 36px; }
  .agent-console.expanded { height: 320px; }
  .agent-console.hidden { display: none; }

  .agent-console-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 20px; cursor: pointer; user-select: none;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .agent-console-bar:hover { background: var(--surface3); }
  .agent-console-title {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-dim); font-weight: 600; flex: 1;
  }
  .agent-console-count {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 600; background: var(--accent-dim); color: var(--accent);
  }
  .agent-console-count.has-running { background: var(--green-dim); color: var(--green-text); }
  .agent-console-chevron {
    color: var(--text-faint); font-size: 10px; transition: transform 0.2s;
  }
  .agent-console.expanded .agent-console-chevron { transform: rotate(180deg); }

  .agent-console-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
  }
  .agent-console.collapsed .agent-console-body { display: none; }
  .agent-console-body::-webkit-scrollbar { width: 5px; }
  .agent-console-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .agent-console-empty {
    color: var(--text-faint); font-size: 12px; text-align: center;
    padding: 24px; font-style: italic;
  }

  .ac-session {
    border-bottom: 1px solid var(--border); padding: 0;
  }
  .ac-session:last-child { border-bottom: none; }
  .ac-session-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px; cursor: pointer; user-select: none;
    transition: background 0.1s;
  }
  .ac-session-header:hover { background: var(--bg); }
  .ac-session-project {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--accent); flex-shrink: 0;
  }
  .ac-session-task {
    flex: 1; font-size: 12px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ac-session-time {
    font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .ac-session-chevron { color: var(--text-faint); font-size: 10px; transition: transform 0.15s; flex-shrink: 0; }
  .ac-session-chevron.open { transform: rotate(90deg); }
  .ac-stop-btn {
    background: var(--red-dim); border: 1px solid var(--red);
    color: var(--red-text); font-family: 'Inter', sans-serif;
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .ac-stop-btn:hover { background: var(--red); color: var(--bg); }

  .ac-session-output {
    display: none; background: #0a0c10; border-top: 1px solid var(--border);
    max-height: 200px; overflow-y: auto; padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.5;
    color: #e2e8f0; white-space: pre-wrap; word-break: break-word;
  }
  .ac-session-output.open { display: block; }
  .ac-session-output::-webkit-scrollbar { width: 4px; }
  .ac-session-output::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Adjust main content to avoid being hidden behind console */
  body.console-open .main { padding-bottom: 340px; }
  body.console-visible .main { padding-bottom: 50px; }

  /* ── Walkthrough / Tour ──────────────────────────────────────────────────── */
  .wt-overlay {
    position: fixed; inset: 0; z-index: 2000;
    pointer-events: none; /* allow clicks through by default */
  }
  .wt-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.72);
    pointer-events: auto;
    transition: clip-path 0.35s cubic-bezier(.4,0,.2,1);
  }
  .wt-highlight {
    position: fixed;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 4px rgba(77,166,255,0.18), 0 0 24px rgba(77,166,255,0.35);
    pointer-events: none;
    animation: wt-pulse 2s ease-in-out infinite;
    transition: all 0.35s cubic-bezier(.4,0,.2,1);
  }
  @keyframes wt-pulse {
    0%,100% { box-shadow: 0 0 0 4px rgba(77,166,255,0.18), 0 0 24px rgba(77,166,255,0.35); }
    50%     { box-shadow: 0 0 0 8px rgba(77,166,255,0.28), 0 0 36px rgba(77,166,255,0.5); }
  }
  .wt-card {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.55);
    padding: 24px 28px;
    max-width: 400px; min-width: 280px;
    pointer-events: auto;
    z-index: 2001;
    transition: left 0.3s, top 0.3s;
  }
  .wt-card.centered {
    left: 50% !important; top: 50% !important;
    transform: translate(-50%, -50%);
  }
  .wt-title {
    font-size: 17px; font-weight: 700; color: var(--accent);
    margin-bottom: 10px; letter-spacing: 0.3px;
  }
  .wt-body {
    font-size: 13.5px; line-height: 1.65; color: var(--text-dim);
    margin-bottom: 20px;
  }
  .wt-actions {
    display: flex; gap: 8px; align-items: center;
  }
  .wt-progress {
    flex: 1; font-size: 11px; color: var(--text-faint);
    letter-spacing: 0.5px;
  }
  .wt-btn {
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; padding: 7px 16px;
    border-radius: 6px; cursor: pointer; transition: all 0.15s;
  }
  .wt-btn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .wt-btn-primary { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .wt-btn-primary:hover { background: #5db3ff; }
  .wt-btn-skip { background: transparent; border: none; color: var(--text-faint); padding: 7px 10px; }
  .wt-btn-skip:hover { color: var(--text); }
  .wt-dismiss {
    display: flex; align-items: center; gap: 6px;
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-faint); cursor: pointer;
    user-select: none;
  }
  .wt-dismiss input[type="checkbox"] {
    accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer;
  }
  .wt-dismiss label { cursor: pointer; }
  /* Elevate spotlighted element above the backdrop */
  .wt-elevated { z-index: 2000 !important; position: relative; }
  /* Virtual demo elements shown during walkthrough */
  .wt-demo { filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5)); }
  @media (max-width: 600px) {
    .wt-card {
      max-width: calc(100vw - 32px); min-width: 0;
      left: 16px !important; right: 16px !important;
    }
    .wt-card.centered { transform: translateY(-50%) !important; left: 16px !important; right: 16px !important; }
  }

  /* ── TERMINAL POP-OUT ────────────────────────────────────────────── */
  .terminal-popout { display:flex; flex-direction:column; height:100%; background:#0a0c10; }
  .terminal-header {
    display:flex; align-items:center; gap:8px; padding:10px 16px;
    background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .terminal-header .terminal-cmd { color:var(--text-faint); font-family:'JetBrains Mono',monospace; font-size:12px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .terminal-header .terminal-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .terminal-header .terminal-status-dot.running { background:var(--accent); box-shadow:0 0 6px var(--accent); }
  .terminal-header .terminal-status-dot.completed { background:#34d399; }
  .terminal-header .terminal-status-dot.error { background:#f87171; }
  .terminal-header .terminal-status-dot.stopped { background:var(--text-faint); }
  .terminal-container { flex:1; min-height:200px; overflow:hidden; padding:8px 12px; box-sizing:border-box; }
  .terminal-container .xterm { padding-left:8px; }
  .terminal-stdin-row {
    display:flex; gap:8px; padding:8px 12px; background:var(--surface);
    border-top:1px solid var(--border); flex-shrink:0;
  }
  .terminal-stdin-input {
    flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:13px; padding:6px 10px;
    border-radius:4px; outline:none; transition:border-color 0.15s;
  }
  .terminal-stdin-input:focus { border-color:var(--accent); }
  .terminal-stdin-input::placeholder { color:var(--text-faint); }
  .btn-terminal-stop {
    background:transparent; border:1px solid #f87171; color:#f87171; padding:4px 10px;
    border-radius:4px; cursor:pointer; font-size:12px; font-weight:500; flex-shrink:0;
  }
  .btn-terminal-stop:hover { background:#f8717120; }
</style>
</head>
<body>
<span id="name-measure" class="name-measure"></span>

<div class="header">
  <div class="header-left">
    <span class="logo">Mission Control</span>
    <span class="tagline">Project Intelligence</span>
  </div>
  <div class="header-right">
    <span class="token-counter-global" id="global-token-counter" title="Click to change time range" onclick="openTokenContextMenu(event)">
      <span class="tc-icon">&#x26A1;</span>
      <span id="global-tc-tokens">—</span>
      <span class="tc-cost" id="global-tc-cost"></span>
      <span class="tc-mode" id="global-tc-mode"></span>
    </span>
    <div class="tc-context-menu" id="tc-context-menu"></div>
    <button class="btn-header-action" onclick="openSharedRulesEditor()">Shared Rules</button>
    <button class="btn-header-action" onclick="openScheduler()">Scheduler</button>
    <button class="btn-header-action" onclick="openProcessManager()">Processes</button>
    <button class="btn-new-project" onclick="openNewProjectForm()">+ New</button>
    <button class="btn-header-action" onclick="showDesktop()" title="Minimize all windows">&#x1F5D4;</button>
    <button class="btn-header-action" onclick="startWalkthrough()" title="Take a tour">Tour</button>
    <span class="refresh-timer" id="refresh-timer">refresh in 30s</span>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>
<div class="schedule-banner hidden" id="schedule-banner"></div>

<div class="filter-row">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="blocked">Blocked</button>
  <button class="filter-btn" data-filter="waiting">Waiting</button>
  <button class="filter-btn" data-filter="parked">Parked</button>
  <span id="domain-filters"></span>
  <button class="filter-btn" onclick="compactGrid()" title="Remove all gaps between tiles" style="margin-left:auto">Compact</button>
</div>

<div class="main">
  <div class="projects-col" id="projects-col"><div class="loading">Loading...</div></div>
  <div class="feed-col">
    <div class="feed-header">Activity Stream</div>
    <div class="feed-entries" id="feed-entries"><div class="loading">—</div></div>
  </div>
</div>

<div class="modal-layer" id="modal-layer"></div>
<div class="minimized-tray" id="minimized-tray"></div>
<div id="toast-container"></div>

<div class="agent-console hidden collapsed" id="agent-console">
  <div class="agent-console-bar" onclick="toggleAgentConsole()">
    <span class="agent-console-title">Agent Sessions</span>
    <span class="agent-console-count" id="ac-count">0</span>
    <span class="agent-console-chevron">&#9650;</span>
  </div>
  <div class="agent-console-body" id="ac-body"></div>
</div>

<script>
// ── API base: empty for standalone Flask, full URL when running inside Tauri ──
const API_BASE = window.__TAURI_INTERNALS__ ? 'http://localhost:5199' : '';

let allProjects = [];
const _isMobileDevice = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);
const _orderKey = _isMobileDevice ? 'projectOrder_mobile' : 'projectOrder';
let projectOrder = JSON.parse(localStorage.getItem(_orderKey) || '[]');
let activeFilter = 'all';
let showDoneMap = {};
let modalSearchQuery = {};  // projectId → search filter string
let openAttPanels = new Set();
let undoStack = [];  // [{type, projectId, itemId, data, label}]
let modalActiveTab = {};  // projectId → 'backlog' | 'agent' | 'agent-log' | 'activity'
let textareaHeights = {}; // textarea id → height string (persists user resize across refreshes)
let textareaValues = {};  // textarea id → value string (persists content across tab switches)
let refreshCountdown = 30;
let refreshInterval, countdownInterval;
let lastDragEnd = 0;
let domainsList = [];
let newProjDomain = 'general';

const COLOR_PRESETS = [
  { label: 'Blue',   color: 'var(--accent)',      bg: 'var(--accent-dim)' },
  { label: 'Purple', color: 'var(--purple-text)', bg: 'var(--purple-dim)' },
  { label: 'Green',  color: 'var(--green-text)',  bg: 'var(--green-dim)' },
  { label: 'Amber',  color: 'var(--amber-text)',  bg: 'var(--amber-dim)' },
  { label: 'Red',    color: 'var(--red-text)',    bg: 'var(--red-dim)' },
  { label: 'Gray',   color: 'var(--text-dim)',    bg: 'var(--surface3)' },
];

async function fetchDomains() {
  try {
    const res = await fetch(API_BASE + '/api/settings/domains');
    domainsList = await res.json();
  } catch(e) {
    domainsList = [
      {id:'general', label:'General', color:'var(--text-dim)', bg:'var(--surface3)'},
      {id:'trading', label:'Trading', color:'var(--accent)', bg:'var(--accent-dim)'},
      {id:'infra', label:'Infra', color:'var(--purple-text)', bg:'var(--purple-dim)'},
      {id:'hobby', label:'Hobby', color:'var(--amber-text)', bg:'var(--amber-dim)'},
    ];
  }
}

function getDomainConfig(domainId) {
  return domainsList.find(d => d.id === domainId) || {id: domainId, label: domainId, color: 'var(--text-dim)', bg: 'var(--surface3)'};
}

async function fetchProjects() {
  try {
    const res = await fetch(API_BASE + '/api/projects');
    allProjects = await res.json();
    applyOrder();
    render();
  } catch(e) {
    document.getElementById('projects-col').innerHTML = '<div class="loading">Failed to load — is server running?</div>';
  }
}

function applyOrder() {
  if (projectOrder.length === 0) return;
  const orderMap = {};
  projectOrder.forEach((id, i) => { if (id !== null) orderMap[id] = i; });
  allProjects.sort((a, b) => {
    const oa = orderMap[a.id] !== undefined ? orderMap[a.id] : 99999;
    const ob = orderMap[b.id] !== undefined ? orderMap[b.id] : 99999;
    return oa - ob;
  });
}

function buildSlotArray(filteredIds) {
  const slots = [];
  const placed = new Set();
  for (const entry of projectOrder) {
    if (entry === null) {
      // Only keep spacer if adjacent visible tiles exist (avoid leading/trailing gaps in filtered views)
      if (activeFilter === 'all') slots.push(null);
    } else if (filteredIds.has(entry)) {
      slots.push(entry);
      placed.add(entry);
    }
    // Filtered-out project IDs are skipped entirely (no gap)
  }
  // Append any projects not in projectOrder
  for (const id of filteredIds) {
    if (!placed.has(id)) slots.push(id);
  }
  return slots;
}

function render() { renderStats(); renderProjects(); renderFeed(); }

function renderStats() {
  const counts = {active:0, blocked:0, waiting:0, parked:0};
  allProjects.forEach(p => { if(counts[p.status] !== undefined) counts[p.status]++; });
  const cfg = [
    {key:'active',  label:'Active',  color:'var(--green)'},
    {key:'blocked', label:'Blocked', color:'var(--red)'},
    {key:'waiting', label:'Waiting', color:'var(--amber)'},
    {key:'parked',  label:'Parked',  color:'var(--text-faint)'},
  ];
  document.getElementById('stats-bar').innerHTML = cfg.map(c => `
    <div class="stat" onclick="setFilter('${c.key}')">
      <div class="stat-dot" style="background:${c.color}"></div>
      <div>
        <div class="stat-count" style="color:${c.color}">${counts[c.key]}</div>
        <div class="stat-label">${c.label}</div>
      </div>
    </div>`).join('');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderProjects();
}

function renderDomainFilters() {
  const container = document.getElementById('domain-filters');
  if (!container) return;
  container.innerHTML = domainsList
    .filter(d => d.id !== 'general')
    .map(d => `<button class="filter-btn${activeFilter===d.id?' active':''}" data-filter="${esc(d.id)}">${esc(d.label || d.id)}</button>`)
    .join('');
  container.querySelectorAll('.filter-btn').forEach(b =>
    b.addEventListener('click', () => setFilter(b.dataset.filter))
  );
}

function filterProjects() {
  if (activeFilter === 'all') return allProjects;
  if (['active','blocked','waiting','parked'].includes(activeFilter))
    return allProjects.filter(p => p.status === activeFilter);
  return allProjects.filter(p => p.domain === activeFilter);
}

function renderProjects() {
  const filtered = filterProjects();
  const col = document.getElementById('projects-col');
  if (!filtered.length) { col.innerHTML = '<div class="loading">No projects match filter</div>'; return; }
  const filteredIds = new Set(filtered.map(p => p.id));
  const slots = buildSlotArray(filteredIds);
  col.innerHTML = slots.map((slot, i) => {
    if (slot === null) return `<div class="grid-spacer" data-slot="${i}"></div>`;
    const p = allProjects.find(pr => pr.id === slot);
    if (!p) return `<div class="grid-spacer" data-slot="${i}"></div>`;
    return tileHTML(p, i);
  }).join('');
  // Attach click handlers
  col.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    card.addEventListener('click', (e) => {
      if (e.defaultPrevented || lastDragEnd > Date.now() - 200) return;
      openProjectModal(id);
    });
  });
  // Double-click spacer to remove it
  col.querySelectorAll('.grid-spacer').forEach(spacer => {
    spacer.addEventListener('dblclick', () => {
      const slot = parseInt(spacer.dataset.slot);
      if (slot >= 0 && slot < projectOrder.length && projectOrder[slot] === null) {
        projectOrder.splice(slot, 1);
        trimTrailingNulls();
        persistGridOrder();
        renderProjects();
      }
    });
  });
}

// ── Tile HTML (compact grid card) ───────────────────────────────────────────

function hasRunningAgent(projectId) {
  return agentHistory.some(h => h.projectId === projectId && (h.status === 'running' || h.status === 'idle'));
}

function tileHTML(p, slotIndex) {
  const sc = `status-${p.status||'unknown'}`;
  const domCfg = getDomainConfig(p.domain||'general');
  const backlog = p.backlog || [];
  const openItems = backlog.filter(i => i.status === 'open');
  const backlogBadge = openItems.length
    ? `<span class="backlog-badge">${openItems.length} open</span>` : '';
  const agentBadge = hasRunningAgent(p.id)
    ? `<span class="agent-running-badge">Agent Running</span>` : '';

  const taskText = p.blocked
    ? `<div class="tile-task blocked-text">${esc(p.blocked_reason||'Blocked')}</div>`
    : (p.current_task
      ? `<div class="tile-task">${esc(p.current_task)}</div>`
      : `<div class="tile-task empty">${esc(p.next_action||'No current task')}</div>`);

  const cardBgStyle = p.modal_color ? ` style="background:${p.modal_color.bg}"` : '';

  return `
  <div class="card ${sc}" data-id="${esc(p.id)}" data-slot="${slotIndex !== undefined ? slotIndex : ''}"${cardBgStyle}>
    <div class="card-header">
      <div class="card-title-row">
        <span class="project-name">${esc(p.name||p.id)}</span>
        <span class="domain-tag" style="background:${domCfg.bg};color:${domCfg.color}">${esc(domCfg.label||p.domain||'general')}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="status-pill ${sc}">${esc(p.status||'unknown')}</span>
        ${agentBadge}
      </div>
    </div>
    <div class="tile-body">
      ${taskText}
    </div>
    <div class="tile-footer">
      ${backlogBadge}
      <span class="time-ago">${esc(p.last_updated_relative||'')}</span>
    </div>
  </div>`;
}

// ── Modal HTML (full detail view) ───────────────────────────────────────────

function modalContentHTML(p) {
  const sc = `status-${p.status||'unknown'}`;
  const showDone = showDoneMap[p.id] || false;
  const backlog = p.backlog || [];
  const openItems = backlog.filter(i => i.status === 'open');
  const doneItems = backlog.filter(i => i.status === 'done');

  const backlogBadge = openItems.length
    ? `<span class="backlog-badge">${openItems.length} open</span>` : '';

  const currentTaskHTML = p.blocked
    ? `<span class="summary-value blocked-text">${esc(p.blocked_reason||'Blocked')}</span>`
    : `<span class="summary-value current-task">${esc(p.current_task||'—')}</span>`;

  const activeTab = modalActiveTab[p.id] || 'agent';

  const logHTML = (p.activity_log||[]).slice(0,20).map(e => `
    <div class="log-entry">
      <span class="log-ts">${esc(e.ts_relative||e.ts||'')}</span>
      <span class="log-msg">${esc(e.msg||'')}</span>
    </div>`).join('');

  const visibleItems = [...openItems, ...(showDone ? doneItems : [])];
  const backlogItemsHTML = visibleItems.map(item => `
    <div class="backlog-item ${item.status==='done'?'done':''} priority-${item.priority||'normal'}" data-item-id="${esc(item.id)}">
      <button class="backlog-check" onclick="toggleDone(event,'${esc(p.id)}','${esc(item.id)}','${item.status}')" title="${item.status==='done'?'Reopen':'Mark done'}">
        ${item.status==='done' ? '✓' : ''}
      </button>
      <span class="backlog-text" contenteditable="true" spellcheck="true"
        onblur="saveBacklogText(event,'${esc(p.id)}','${esc(item.id)}')"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
      >${esc(item.text)}</span>
      <div class="backlog-meta">
        <span class="priority-badge priority-${item.priority||'normal'}"
          onclick="cyclePriority(event,'${esc(p.id)}','${esc(item.id)}','${item.priority||'normal'}')"
          title="Click to change priority">${item.priority||'normal'}</span>
        ${item.github_issue_number ? `<a class="gh-issue-link" href="https://github.com/${esc(p.github_repo||'')}/issues/${item.github_issue_number}" target="_blank" rel="noopener" title="View on GitHub">#${item.github_issue_number}</a>` : ''}
        ${item.source && item.source !== 'dashboard' ? `<span class="backlog-source">${esc(item.source)}</span>` : ''}
        ${p.project_path && item.status !== 'done' ? `<button class="backlog-dispatch" onclick="dispatchBacklogItem(event,'${esc(p.id)}','${esc(item.id)}')" title="Send to agent">▶</button>` : ''}
        <button class="att-btn ${(item.attachments||[]).length > 0 ? 'has-atts' : ''}"
          onclick="toggleAttPanel(event,'${esc(p.id)}','${esc(item.id)}')"
          title="Attachments">📎${(item.attachments||[]).length > 0 ? ' '+item.attachments.length : ''}</button>
        <button class="backlog-del" onclick="deleteBacklogItem(event,'${esc(p.id)}','${esc(item.id)}')" title="Delete">✕</button>
      </div>
      <div class="att-panel${openAttPanels.has(item.id) ? ' open' : ''}" id="att-${esc(item.id)}">
        <div class="att-drop-zone" id="drop-${esc(item.id)}"
          ondragover="attDragOver(event,'${esc(item.id)}')"
          ondragleave="attDragLeave('${esc(item.id)}')"
          ondrop="attDrop(event,'${esc(p.id)}','${esc(item.id)}')"
          onclick="document.getElementById('file-${esc(item.id)}').click()">
          <input type="file" id="file-${esc(item.id)}" multiple
            onchange="attFileSelected(event,'${esc(p.id)}','${esc(item.id)}')">
          Drop files here or click to browse
        </div>
        <div class="att-list" id="attlist-${esc(item.id)}">
          ${(item.attachments||[]).map(a => attHTML(a, p.id, item.id)).join('')}
        </div>
      </div>
    </div>`).join('');

  const undoBtn = undoStack.length && undoStack[undoStack.length-1].projectId === p.id
    ? `<button class="btn-undo" onclick="performUndo(event)" title="Undo ${undoStack[undoStack.length-1].label}">↩ Undo</button>`
    : '';
  const doneToggle = doneItems.length
    ? `<button class="toggle-done" onclick="toggleShowDone(event,'${esc(p.id)}')">${showDone ? `Hide ${doneItems.length} done` : `Show ${doneItems.length} done`}</button>`
    : '';

  const modalAccent = p.modal_color ? p.modal_color.color : '';
  const accentStyle = modalAccent ? `style="--modal-accent:${modalAccent}"` : '';

  return `
    <div class="modal-header" ${accentStyle}>
      <div class="modal-window-controls">
        <button class="modal-menu-btn" onclick="toggleModalMenu(event,'${esc(p.id)}')" title="Menu">&#x22EE;</button>
        <button class="modal-minimize" onclick="minimizeModal('${esc(p.id)}')" title="Minimize">&#x2015;</button>
        <button class="modal-close" onclick="closeModalById('${esc(p.id)}')" title="Close">&#10005;</button>
        <div class="modal-menu-dropdown" id="modal-menu-${esc(p.id)}">
          <button class="modal-menu-item" onclick="toggleModalMenuSub(event,'status-sub-${esc(p.id)}')">
            <span class="menu-icon">&#x25CF;</span> Change Status <span style="margin-left:auto;color:var(--text-faint);font-size:11px">&#x25B8;</span>
          </button>
          <div class="modal-menu-sub" id="status-sub-${esc(p.id)}">
            <button class="modal-menu-sub-item${(p.status||'')==='active'?' active':''}" onclick="setProjectStatus('${esc(p.id)}','active')">
              <span class="modal-menu-sub-dot" style="background:var(--green)"></span> Active</button>
            <button class="modal-menu-sub-item${(p.status||'')==='waiting'?' active':''}" onclick="setProjectStatus('${esc(p.id)}','waiting')">
              <span class="modal-menu-sub-dot" style="background:var(--amber)"></span> Waiting</button>
            <button class="modal-menu-sub-item${(p.status||'')==='blocked'?' active':''}" onclick="setProjectStatus('${esc(p.id)}','blocked')">
              <span class="modal-menu-sub-dot" style="background:var(--red)"></span> Blocked</button>
            <button class="modal-menu-sub-item${(p.status||'')==='parked'?' active':''}" onclick="setProjectStatus('${esc(p.id)}','parked')">
              <span class="modal-menu-sub-dot" style="background:var(--text-faint)"></span> Parked</button>
          </div>
          <button class="modal-menu-item" onclick="toggleModalMenuSub(event,'color-sub-${esc(p.id)}')">
            <span class="menu-icon">&#x25CF;</span> Change Color <span style="margin-left:auto;color:var(--text-faint);font-size:11px">&#x25B8;</span>
          </button>
          <div class="modal-menu-sub" id="color-sub-${esc(p.id)}">
            <div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px">
              ${COLOR_PRESETS.map(c => {
                const isCurrent = p.modal_color ? (p.modal_color.color === c.color) : (c.label === 'Blue');
                return `<button style="width:24px;height:24px;border-radius:4px;border:${isCurrent ? '2px solid var(--text)' : '1px solid var(--border)'};background:${c.bg};cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center"
                  title="${c.label}"
                  onclick="setProjectColor('${esc(p.id)}','${c.color}','${c.bg}')"><span style="width:10px;height:10px;border-radius:2px;background:${c.color}"></span></button>`;
              }).join('')}
            </div>
          </div>
          <button class="modal-menu-item" onclick="toggleModalMenuSub(event,'domain-sub-${esc(p.id)}')">
            <span class="menu-icon">&#x25CF;</span> Change Domain <span style="margin-left:auto;color:var(--text-faint);font-size:11px">&#x25B8;</span>
          </button>
          <div class="modal-menu-sub" id="domain-sub-${esc(p.id)}">
            ${domainsList.map(d => {
              const cfg = getDomainConfig(d.id);
              return `<button class="modal-menu-sub-item${(p.domain||'general')===d.id?' active':''}" onclick="saveDomainFromMenu(event,'${esc(p.id)}','${d.id}')">
              <span class="modal-menu-sub-dot" style="background:${cfg.color}"></span> ${esc(d.label||d.id)}</button>`;
            }).join('')}
            <div style="border-top:1px solid var(--border);padding:6px 8px">
              <div style="font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Color</div>
              <div style="display:flex;gap:4px;flex-wrap:wrap">
                ${COLOR_PRESETS.map(c =>
                  `<button style="width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:${c.bg};cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center"
                    title="${c.label}"
                    onclick="setDomainColorFromMenu(event,'${esc(p.id)}','${esc(p.domain||'general')}','${c.color}','${c.bg}')"><span style="width:8px;height:8px;border-radius:2px;background:${c.color}"></span></button>`
                ).join('')}
              </div>
            </div>
            <div style="border-top:1px solid var(--border);padding:4px">
              <input type="text" placeholder="New domain..." style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:11px;padding:4px 8px;border-radius:4px;outline:none;box-sizing:border-box"
                onclick="event.stopPropagation()"
                onkeydown="if(event.key==='Enter'){event.stopPropagation();addDomainFromMenu(event,'${esc(p.id)}',this.value)}">
            </div>
          </div>
          <button class="modal-menu-item" onclick="toggleModalMenuSub(event,'model-sub-${esc(p.id)}')">
            <span class="menu-icon">&#x2699;</span> Agent Model ${p.agent_model ? `<span style="margin-left:4px;color:var(--accent);font-size:11px">${esc(p.agent_model)}</span>` : '<span style="margin-left:4px;color:var(--text-faint);font-size:11px">default</span>'} <span style="margin-left:auto;color:var(--text-faint);font-size:11px">&#x25B8;</span>
          </button>
          <div class="modal-menu-sub" id="model-sub-${esc(p.id)}">
            <button class="modal-menu-sub-item${!p.agent_model?' active':''}" onclick="setProjectModel('${esc(p.id)}','')">
              <span class="modal-menu-sub-dot" style="background:var(--text-faint)"></span> Default (global)</button>
            <button class="modal-menu-sub-item${p.agent_model==='claude-sonnet-4-5-20250929'?' active':''}" onclick="setProjectModel('${esc(p.id)}','claude-sonnet-4-5-20250929')">
              <span class="modal-menu-sub-dot" style="background:var(--green)"></span> Sonnet 4.5</button>
            <button class="modal-menu-sub-item${p.agent_model==='claude-opus-4-6'?' active':''}" onclick="setProjectModel('${esc(p.id)}','claude-opus-4-6')">
              <span class="modal-menu-sub-dot" style="background:var(--amber)"></span> Opus 4.6</button>
            <button class="modal-menu-sub-item${p.agent_model==='claude-haiku-4-5-20251001'?' active':''}" onclick="setProjectModel('${esc(p.id)}','claude-haiku-4-5-20251001')">
              <span class="modal-menu-sub-dot" style="background:var(--blue)"></span> Haiku 4.5</button>
          </div>
          <button class="modal-menu-item" onclick="editProjectDescription('${esc(p.id)}')">
            <span class="menu-icon">&#x270E;</span> ${p.description ? 'Edit' : 'Add'} Description
          </button>
          <button class="modal-menu-item" onclick="toggleModalMenuSub(event,'enter-sub-${esc(p.id)}')">
            <span class="menu-icon">&#x21B5;</span> Enter Key ${enterKeyMode === 'enter' ? '<span style="margin-left:4px;color:var(--accent);font-size:11px">sends</span>' : '<span style="margin-left:4px;color:var(--text-faint);font-size:11px">new line</span>'} <span style="margin-left:auto;color:var(--text-faint);font-size:11px">&#x25B8;</span>
          </button>
          <div class="modal-menu-sub" id="enter-sub-${esc(p.id)}">
            <button class="modal-menu-sub-item${enterKeyMode==='ctrl-enter'?' active':''}" onclick="setEnterMode('ctrl-enter')">
              Ctrl+Enter sends</button>
            <button class="modal-menu-sub-item${enterKeyMode==='enter'?' active':''}" onclick="setEnterMode('enter')">
              Enter sends</button>
          </div>
          <button class="modal-menu-item" onclick="toggleModalMenuSub(event,'gh-sub-${esc(p.id)}')">
            <span class="menu-icon">&#x1F517;</span> GitHub Sync ${p.github_sync_enabled ? `<span style="margin-left:4px;color:var(--green);font-size:11px">&#x2713; ${esc(p.github_repo)}</span>` : '<span style="margin-left:4px;color:var(--text-faint);font-size:11px">not connected</span>'} <span style="margin-left:auto;color:var(--text-faint);font-size:11px">&#x25B8;</span>
          </button>
          <div class="modal-menu-sub" id="gh-sub-${esc(p.id)}" style="min-width:220px">
            ${p.github_sync_enabled ? `
              <div style="padding:6px 10px;font-size:11px;color:var(--text-dim)">
                Syncing with <strong style="color:var(--accent)">${esc(p.github_repo)}</strong>
                ${p.github_last_sync ? `<br><span style="font-size:10px">Last sync: ${esc(timeAgoJS(p.github_last_sync))}</span>` : ''}
              </div>
              <button class="modal-menu-sub-item" onclick="githubSyncNow('${esc(p.id)}')">
                &#x21BB; Sync Now</button>
              <button class="modal-menu-sub-item" style="color:var(--red-text)" onclick="githubDisconnect('${esc(p.id)}')">
                &#x2715; Disconnect</button>
            ` : `
              <div style="padding:6px 10px">
                <input type="text" id="gh-repo-${esc(p.id)}" placeholder="owner/repo" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:11px;padding:4px 8px;border-radius:4px;outline:none;box-sizing:border-box"

// ── Multi-modal window manager ──────────────────────────────────────────────

const openModals = new Map();   // modalId -> { projectId, element, minimized, zIndex }
let focusedModalId = null;
let nextModalZ = 201;

function getStatusColor(status) {
  const map = { active: 'var(--green)', blocked: 'var(--red)', waiting: 'var(--amber)', parked: 'var(--text-faint)' };
  return map[status] || 'var(--text-faint)';
}

function centerModalElement(win) {
  const w = win.offsetWidth, h = win.offsetHeight;
  const offset = Math.max(0, openModals.size - 1) * 30;
  win.style.left = Math.max(0, (window.innerWidth - w) / 2 + offset) + 'px';
  win.style.top = Math.max(0, (window.innerHeight - h) / 2 + offset) + 'px';
}

function focusModal(modalId) {
  const entry = openModals.get(modalId);
  if (!entry || entry.minimized) return;
  if (focusedModalId && openModals.has(focusedModalId)) {
    openModals.get(focusedModalId).element.classList.remove('focused');
  }
  const z = nextModalZ++;
  entry.zIndex = z;
  entry.element.style.zIndex = z;
  entry.element.classList.add('focused');
  focusedModalId = modalId;
}

function openProjectModal(projectId) {
  const p = allProjects.find(x => x.id === projectId);
  if (!p) return;

  // If already open, focus/restore it
  if (openModals.has(projectId)) {
    const entry = openModals.get(projectId);
    if (entry.minimized) restoreModal(projectId);
    focusModal(projectId);
    return;
  }

  const win = document.createElement('div');
  win.className = 'modal-window';
  win.dataset.modalId = projectId;

  const content = document.createElement('div');
  content.className = 'modal-content';
  content.innerHTML = modalContentHTML(p);
  win.appendChild(content);

  document.getElementById('modal-layer').appendChild(win);
  const nameInput = content.querySelector('.name-edit');
  if (nameInput) autoSizeNameInput(nameInput);

  const z = nextModalZ++;
  win.style.zIndex = z;
  openModals.set(projectId, { projectId, element: win, minimized: false, zIndex: z });

  centerModalElement(win);
  focusModal(projectId);
  Promise.all([fetchAgentStatus(projectId), fetchTerminalStatus(projectId)])
    .then(() => refreshModalById(projectId));

  // Re-size agent chat when modal is resized
  new ResizeObserver(() => {
    const entry = openModals.get(projectId);
    if (!entry || entry.minimized) return;
    const sid = activeAgentTab[projectId];
    if (sid && (modalActiveTab[projectId] || 'agent') === 'agent') {
      sizeAgentChat(entry.element, sid);
    }
  }).observe(content);
}

function closeModalById(modalId) {
  const entry = openModals.get(modalId);
  if (!entry) return;
  // Clean up terminal pop-out resources
  cleanupTerminalModal(modalId);
  entry.element.remove();
  const chip = document.getElementById('chip-' + CSS.escape(modalId));
  if (chip) chip.remove();
  openModals.delete(modalId);

  if (entry.projectId) {
    const p = allProjects.find(x => x.id === entry.projectId);
    if (p && p.backlog) p.backlog.forEach(item => openAttPanels.delete(item.id));
  }

  if (focusedModalId === modalId) {
    focusedModalId = null;
    let topId = null, topZ = 0;
    for (const [id, e] of openModals) {
      if (!e.minimized && e.zIndex > topZ) { topZ = e.zIndex; topId = id; }
    }
    if (topId) focusModal(topId);
  }
}

function closeModal() {
  if (focusedModalId) closeModalById(focusedModalId);
}

// ── Three-dot Modal Menu ──────────────────────────────────────────────────────

function toggleModalMenu(e, projectId) {
  e.stopPropagation();
  const dd = document.getElementById(`modal-menu-${projectId}`);
  if (!dd) return;
  const isOpen = dd.classList.contains('open');
  // Close all open modal menus first
  document.querySelectorAll('.modal-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.modal-menu-sub.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) {
    dd.classList.add('open');
    const close = (ev) => {
      if (!dd.contains(ev.target) && !ev.target.closest('.modal-menu-btn')) {
        dd.classList.remove('open');
        dd.querySelectorAll('.modal-menu-sub.open').forEach(s => s.classList.remove('open'));
        document.removeEventListener('mousedown', close);
      }
    };
    setTimeout(() => document.addEventListener('mousedown', close), 0);
  }
}

function toggleModalMenuSub(e, subId) {
  e.stopPropagation();
  const sub = document.getElementById(subId);
  if (!sub) return;
  sub.classList.toggle('open');
}

function minimizeModal(modalId) {
  const entry = openModals.get(modalId);
  if (!entry) return;
  entry.minimized = true;
  entry.savedScrollTop = entry.element.querySelector('.modal-scroll-body')?.scrollTop || 0;
  entry.element.classList.add('minimized');

  const tray = document.getElementById('minimized-tray');
  const p = entry.projectId ? allProjects.find(x => x.id === entry.projectId) : null;
  const name = p ? (p.name || p.id) : modalId.replace(/^__/, '').replace(/_/g, ' ');
  const statusColor = p ? getStatusColor(p.status) : 'var(--text-faint)';

  const chipEl = document.createElement('div');
  chipEl.className = 'minimized-chip';
  chipEl.id = 'chip-' + modalId;
  chipEl.innerHTML = `
    <span class="chip-status" style="background:${statusColor}"></span>
    <span>${esc(name)}</span>
    <span class="chip-close" onclick="event.stopPropagation(); closeModalById('${esc(modalId)}')" title="Close">&#10005;</span>`;
  chipEl.addEventListener('click', (e) => {
    if (!e.target.closest('.chip-close')) restoreModal(modalId);
  });
  tray.appendChild(chipEl);

  if (focusedModalId === modalId) {
    focusedModalId = null;
    let topId = null, topZ = 0;
    for (const [id, e] of openModals) {
      if (!e.minimized && e.zIndex > topZ) { topZ = e.zIndex; topId = id; }
    }
    if (topId) focusModal(topId);
  }
}

function showDesktop() {
  for (const [modalId, entry] of openModals) {
    if (!entry.minimized) minimizeModal(modalId);
  }
}

function restoreModal(modalId) {
  const entry = openModals.get(modalId);
  if (!entry) return;
  entry.minimized = false;
  entry.element.classList.remove('minimized');
  const chip = document.getElementById('chip-' + CSS.escape(modalId));
  if (chip) chip.remove();
  if (entry.projectId) refreshModalById(modalId);
  const scrollBody = entry.element.querySelector('.modal-scroll-body');
  if (scrollBody && entry.savedScrollTop) scrollBody.scrollTop = entry.savedScrollTop;
  focusModal(modalId);
}

function sizeAgentChat(win, sessionId) {
  const scrollBody = win.querySelector('.modal-scroll-body');
  const chat = win.querySelector('.agent-chat');
  const out = document.getElementById(`agent-output-${sessionId}`);
  if (!scrollBody || !chat) return;
  scrollBody.style.overflow = 'hidden';
  const available = scrollBody.clientHeight;
  const panel = chat.parentElement;
  let used = 0;
  for (const child of panel.children) {
    if (child !== chat) used += child.offsetHeight;
  }
  const panelStyle = getComputedStyle(panel);
  used += parseFloat(panelStyle.paddingTop) + parseFloat(panelStyle.paddingBottom);
  const chatHeight = Math.max(120, available - used - 8);
  chat.style.height = chatHeight + 'px';
  if (out) {
    out.scrollTop = out.scrollHeight;
    requestAnimationFrame(() => { out.scrollTop = out.scrollHeight; });
  }
}

function updateAgentStatusUI(sessionId, status) {
  // Update status dot and label without rebuilding the modal
  const dot = document.querySelector(`#session-metrics-${CSS.escape(sessionId)}`)?.closest('.agent-panel')?.querySelector('.agent-status-dot');
  const label = document.querySelector(`#session-metrics-${CSS.escape(sessionId)}`)?.closest('.agent-panel')?.querySelector('.agent-status-label');
  if (dot) { dot.className = `agent-status-dot ${status}`; }
  if (label) { label.className = `agent-status-label ${status}`; label.textContent = status; }
  // Also update the session tab dot
  const tabDot = document.querySelector(`.agent-tab.active .agent-status-dot`);
  if (tabDot) { tabDot.className = `agent-status-dot ${status}`; }
}

function refreshModalById(modalId) {
  const entry = openModals.get(modalId);
  if (!entry || entry.minimized) return;
  const p = allProjects.find(x => x.id === entry.projectId);
  if (!p) { closeModalById(modalId); return; }

  const content = entry.element.querySelector('.modal-content');
  const scrollBody = content.querySelector('.modal-scroll-body');
  const savedScroll = scrollBody ? scrollBody.scrollTop : 0;
  const saved = {};
  let focusedId = null, selStart = 0, selEnd = 0;
  content.querySelectorAll('textarea, input[type="text"]').forEach(ta => {
    if (ta.id && ta.value) saved[ta.id] = ta.value;
    if (ta.id && ta.tagName === 'TEXTAREA' && ta.offsetHeight > 50) {
      textareaHeights[ta.id] = ta.offsetHeight + 'px';
    }
    if (ta === document.activeElement) {
      focusedId = ta.id;
      selStart = ta.selectionStart;
      selEnd = ta.selectionEnd;
    }
  });

  // Preserve existing agent output DOM to avoid expensive re-render
  const sid = activeAgentTab[entry.projectId];
  const curTab = modalActiveTab[entry.projectId] || 'agent';
  let savedOutput = null, savedOutputScroll = 0, savedChatHeight = null;
  if (sid && curTab === 'agent') {
    const existingOutput = document.getElementById(`agent-output-${sid}`);
    if (existingOutput && existingOutput.children.length > 0) {
      savedOutputScroll = existingOutput.scrollTop;
      const chat = existingOutput.closest('.agent-chat');
      if (chat) savedChatHeight = chat.style.height;
      existingOutput.remove();  // detach from DOM before innerHTML wipe
      savedOutput = existingOutput;
    }
  }

  _skipAgentOutput = !!savedOutput;
  content.innerHTML = modalContentHTML(p);
  _skipAgentOutput = false;

  // Re-attach preserved agent output (replacing the freshly rendered empty one)
  if (savedOutput) {
    const newOutput = document.getElementById(`agent-output-${sid}`);
    if (newOutput) {
      newOutput.replaceWith(savedOutput);
      savedOutput.scrollTop = savedOutputScroll;
      if (savedChatHeight) {
        const chat = savedOutput.closest('.agent-chat');
        if (chat) chat.style.height = savedChatHeight;
      }
    }
  }

  for (const [id, val] of Object.entries(saved)) {
    const el = document.getElementById(id);
    if (el) el.value = val;
  }
  // Also restore from global textarea cache (survives tab switches)
  for (const [id, val] of Object.entries(textareaValues)) {
    const el = document.getElementById(id);
    if (el && !saved[id] && val) el.value = val;
  }
  for (const [id, h] of Object.entries(textareaHeights)) {
    const el = document.getElementById(id);
    if (el) el.style.height = h;
  }
  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el) { el.focus(); el.selectionStart = selStart; el.selectionEnd = selEnd; }
  }
  const newScrollBody = content.querySelector('.modal-scroll-body');
  if (newScrollBody) newScrollBody.scrollTop = savedScroll;
  const nameInput = content.querySelector('.name-edit');
  if (nameInput) autoSizeNameInput(nameInput);
  if (sid && curTab === 'agent') {
    sizeAgentChat(entry.element, sid);
  }
  if (modalZoomLevels[modalId]) {
    entry.element.querySelectorAll('.agent-output, .ac-session-output, .plan-viewer-body').forEach(el => {
      el.style.fontSize = modalZoomLevels[modalId] + 'px';
    });
  }
  if (modalSearchQuery[entry.projectId]) {
    applyTabFilter(entry.projectId);
  }
}

function refreshModal() {
  for (const [modalId, entry] of openModals) {
    if (entry.projectId) refreshModalById(modalId);
  }
}

// ── Drag-and-drop grid reordering ────────────────────────────────────────────

let dragState = null;

function trimTrailingNulls() {
  while (projectOrder.length > 0 && projectOrder[projectOrder.length - 1] === null) projectOrder.pop();
}

function persistGridOrder() {
  localStorage.setItem(_orderKey, JSON.stringify(projectOrder));
  // Only persist to server from desktop — mobile layout is local-only
  if (!_isMobileDevice) {
    fetch(API_BASE + '/api/projects/order', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({order: projectOrder})
    }).catch(() => {});
  }
}

function getSlotIndexAtPoint(clientX, clientY) {
  const col = document.getElementById('projects-col');
  const colRect = col.getBoundingClientRect();
  const children = col.children;
  if (children.length === 0) return -1;
  const firstRect = children[0].getBoundingClientRect();
  const cellW = firstRect.width;
  const cellH = firstRect.height;
  const gap = parseFloat(getComputedStyle(col).gap) || 16;
  const numCols = Math.max(1, Math.round((colRect.width + gap) / (cellW + gap)));
  const relX = clientX - colRect.left;
  const relY = clientY - colRect.top + col.scrollTop;
  const colIdx = Math.min(numCols - 1, Math.max(0, Math.floor(relX / (cellW + gap))));
  const rowIdx = Math.max(0, Math.floor(relY / (cellH + gap)));
  return rowIdx * numCols + colIdx;
}

function ensureSlotsUpTo(targetSlot) {
  const col = document.getElementById('projects-col');
  while (col.children.length <= targetSlot) {
    const spacer = document.createElement('div');
    spacer.className = 'grid-spacer';
    spacer.dataset.slot = col.children.length;
    col.appendChild(spacer);
  }
}

function startTileDrag(card, clientX, clientY) {
  const rect = card.getBoundingClientRect();
  dragState.offsetX = clientX - rect.left;
  dragState.offsetY = clientY - rect.top;
  dragState.started = true;
  card.classList.add('dragging');
  // Create ghost
  const ghost = card.cloneNode(true);
  ghost.classList.remove('dragging');
  ghost.classList.add('drag-ghost');
  ghost.style.width = rect.width + 'px';
  ghost.style.height = rect.height + 'px';
  ghost.style.left = (clientX - dragState.offsetX) + 'px';
  ghost.style.top = (clientY - dragState.offsetY) + 'px';
  document.body.appendChild(ghost);
  dragState.ghost = ghost;
}

function updateTileDrag(clientX, clientY) {
  if (dragState.ghost) {
    dragState.ghost.style.left = (clientX - dragState.offsetX) + 'px';
    dragState.ghost.style.top = (clientY - dragState.offsetY) + 'px';
  }
  const col = document.getElementById('projects-col');
  col.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  const targetSlot = getSlotIndexAtPoint(clientX, clientY);
  if (targetSlot >= 0) {
    const maxSlot = Math.min(targetSlot, (allProjects.length * 3));
    ensureSlotsUpTo(maxSlot);
    const targetEl = col.children[maxSlot];
    if (targetEl) targetEl.classList.add('drop-target');
    dragState.targetSlot = maxSlot;
  }
}

function endTileDrag() {
  if (!dragState) return;
  const { id: srcId, started, targetSlot, ghost } = dragState;
  dragState = null;
  if (ghost) ghost.remove();
  const col = document.getElementById('projects-col');
  col.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  col.querySelectorAll('.card').forEach(c => c.classList.remove('dragging'));
  if (!started) return;
  lastDragEnd = Date.now();
  if (targetSlot === undefined || targetSlot < 0) return;
  moveProjectToSlot(srcId, targetSlot);
}

function moveProjectToSlot(srcId, targetSlot) {
  // Remove src from current position
  const srcIdx = projectOrder.indexOf(srcId);
  if (srcIdx !== -1) projectOrder.splice(srcIdx, 1);

  // Remove nulls (compact) then insert at target position, pushing others right
  projectOrder = projectOrder.filter(e => e !== null);
  const insertAt = Math.min(targetSlot, projectOrder.length);
  projectOrder.splice(insertAt, 0, srcId);

  trimTrailingNulls();
  persistGridOrder();
  applyOrder();
  renderProjects();
}

function compactGrid() {
  projectOrder = projectOrder.filter(e => e !== null);
  persistGridOrder();
  applyOrder();
  renderProjects();
}

// Mouse events
document.getElementById('projects-col').addEventListener('mousedown', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  if (e.target.closest('button, a, input, select, textarea, [contenteditable]')) return;
  dragState = { id: card.dataset.id, card, startX: e.clientX, startY: e.clientY, started: false };
});

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  if (!dragState.started) {
    if (Math.abs(e.clientX - dragState.startX) + Math.abs(e.clientY - dragState.startY) < 8) return;
    startTileDrag(dragState.card, e.clientX, e.clientY);
  }
  updateTileDrag(e.clientX, e.clientY);
});

document.addEventListener('mouseup', () => endTileDrag());

// Touch events — long-press (300ms) required to start tile drag
// This prevents conflicts with scroll, pinch-to-zoom, and swipe gestures
let tileLongPressTimer = null;

function cancelTileLongPress() {
  if (tileLongPressTimer) { clearTimeout(tileLongPressTimer); tileLongPressTimer = null; }
}

document.getElementById('projects-col').addEventListener('touchstart', (e) => {
  cancelTileLongPress();
  if (e.touches.length > 1) return;  // multi-finger = pinch, ignore
  const card = e.target.closest('.card');
  if (!card) return;
  if (e.target.closest('button, a, input, select, textarea')) return;
  const t = e.touches[0];
  const startX = t.clientX, startY = t.clientY;
  tileLongPressTimer = setTimeout(() => {
    tileLongPressTimer = null;
    dragState = { id: card.dataset.id, card, startX, startY, started: false, isTouch: true };
    // Visual feedback: slight scale
    card.style.transform = 'scale(0.97)';
    card.style.transition = 'transform 0.1s';
    setTimeout(() => { card.style.transform = ''; card.style.transition = ''; }, 200);
  }, 300);
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  // Cancel long-press if finger moves before timer fires
  if (tileLongPressTimer) {
    const t = e.touches[0];
    cancelTileLongPress();  // any movement cancels — let browser handle scroll/pinch
    return;
  }
  if (!dragState || !dragState.isTouch) return;
  const t = e.touches[0];
  if (!dragState.started) {
    if (Math.abs(t.clientX - dragState.startX) + Math.abs(t.clientY - dragState.startY) < 12) return;
    e.preventDefault();
    startTileDrag(dragState.card, t.clientX, t.clientY);
  }
  if (dragState.started) {
    e.preventDefault();
    updateTileDrag(t.clientX, t.clientY);
  }
}, { passive: false });

document.addEventListener('touchend', () => { cancelTileLongPress(); endTileDrag(); });

// ── Create-form attachment handling ──────────────────────────────────────────

const pendingFiles = new Map();

function handleCreatePaste(e, projectId) {
  const items = Array.from(e.clipboardData?.items || []);
  const imageItems = items.filter(i => i.type.startsWith('image/'));
  if (imageItems.length === 0) return;
  e.preventDefault();
  const files = pendingFiles.get(projectId) || [];
  for (const item of imageItems) {
    const blob = item.getAsFile();
    if (blob) files.push(blob);
  }
  pendingFiles.set(projectId, files);
  renderCreatePreviews(projectId);
}

function createDragOver(e, projectId) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById(`backlog-input-${projectId}`)?.classList.add('drag-over');
}

function createDragLeave(projectId) {
  document.getElementById(`backlog-input-${projectId}`)?.classList.remove('drag-over');
}

function createDrop(e, projectId) {
  e.preventDefault();
  e.stopPropagation();
  createDragLeave(projectId);
  const droppedFiles = Array.from(e.dataTransfer.files);
  if (droppedFiles.length === 0) return;
  const files = pendingFiles.get(projectId) || [];
  files.push(...droppedFiles);
  pendingFiles.set(projectId, files);
  renderCreatePreviews(projectId);
}

function renderCreatePreviews(projectId) {
  const container = document.getElementById(`create-previews-${projectId}`);
  if (!container) return;
  const files = pendingFiles.get(projectId) || [];
  container.innerHTML = files.map((file, i) => {
    const isImage = file.type.startsWith('image/');
    const thumbContent = isImage
      ? `<img src="${URL.createObjectURL(file)}" alt="${esc(file.name)}">`
      : `<div class="file-icon">📎</div>`;
    return `
      <div class="create-preview-item" title="${esc(file.name)}">
        ${thumbContent}
        <div class="file-name">${esc(file.name)}</div>
        <button class="create-preview-remove" onclick="removeCreateFile('${esc(projectId)}',${i})">✕</button>
      </div>`;
  }).join('');
}

function removeCreateFile(projectId, index) {
  const files = pendingFiles.get(projectId) || [];
  files.splice(index, 1);
  if (files.length === 0) pendingFiles.delete(projectId);
  else pendingFiles.set(projectId, files);
  renderCreatePreviews(projectId);
}

// ── Backlog actions ─────────────────────────────────────────────────────────

async function addBacklogItem(projectId) {
  const input = document.getElementById(`backlog-input-${projectId}`);
  const priSel = document.getElementById(`backlog-pri-${projectId}`);
  const text = input.value.trim();
  const files = pendingFiles.get(projectId) || [];
  if (!text && files.length === 0) return;
  if (!text) { input.focus(); return; }
  input.value = '';
  if (input.id) delete textareaValues[input.id];
  input.disabled = true;
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/backlog`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, priority: priSel.value, source: 'dashboard'})
    });
    const data = await res.json();
    if (data.item && data.item.id && files.length > 0) {
      for (const file of files) {
        await uploadFile(projectId, data.item.id, file);
      }
    }
    pendingFiles.delete(projectId);
    const previewEl = document.getElementById(`create-previews-${projectId}`);
    if (previewEl) previewEl.innerHTML = '';
    await refreshSilent();
  } finally { input.disabled = false; input.focus(); }
}

async function toggleDone(e, projectId, itemId, currentStatus) {
  e.stopPropagation();
  pushUndo({type: 'status', projectId, itemId, data: {status: currentStatus}, label: currentStatus === 'done' ? 'mark open' : 'mark done'});
  await patchItem(projectId, itemId, {status: currentStatus === 'done' ? 'open' : 'done'});
}

async function cyclePriority(e, projectId, itemId, current) {
  e.stopPropagation();
  const cycle = {normal:'high', high:'low', low:'normal'};
  pushUndo({type: 'priority', projectId, itemId, data: {priority: current}, label: 'priority change'});
  await patchItem(projectId, itemId, {priority: cycle[current]||'normal'});
}

async function saveBacklogText(e, projectId, itemId) {
  const text = e.target.innerText.trim();
  if (!text) return;
  const p = allProjects.find(x => x.id === projectId);
  const oldItem = p && (p.backlog || []).find(i => i.id === itemId);
  if (oldItem && oldItem.text !== text) {
    pushUndo({type: 'text', projectId, itemId, data: {text: oldItem.text}, label: 'text edit'});
  }
  await patchItem(projectId, itemId, {text});
}

async function deleteBacklogItem(e, projectId, itemId) {
  e.stopPropagation();
  if (!confirm('Delete this item?')) return;
  const p = allProjects.find(x => x.id === projectId);
  const item = p && (p.backlog || []).find(i => i.id === itemId);
  if (item) {
    pushUndo({type: 'delete', projectId, itemId, data: {...item}, label: 'delete'});
  }
  await fetch(API_BASE + `/api/project/${projectId}/backlog/${itemId}`, {method: 'DELETE'});
  await refreshSilent();
}

async function dispatchBacklogItem(e, projectId, itemId) {
  e.stopPropagation();
  const p = allProjects.find(x => x.id === projectId);
  if (!p) return;
  const item = (p.backlog || []).find(i => i.id === itemId);
  if (!item) return;

  // Load image attachments into agentPendingImages so they transfer with dispatch
  const imageAtts = (item.attachments || []).filter(a => a.type === 'image');
  if (imageAtts.length > 0) {
    const sid = activeAgentTab[projectId];
    const fetched = [];
    for (const a of imageAtts) {
      try {
        const res = await fetch(API_BASE + `/api/attachments/${a.stored_name}`);
        const blob = await res.blob();
        const file = new File([blob], a.original_name, { type: blob.type });
        fetched.push({ file, objectUrl: URL.createObjectURL(blob), serverPath: null });
      } catch(err) {}
    }
    // Populate both keys so images survive switching between session and +New
    agentPendingImages[projectId] = [...(agentPendingImages[projectId] || []), ...fetched];
    if (sid) {
      const copies = fetched.map(f => ({ file: f.file, objectUrl: f.objectUrl, serverPath: null }));
      agentPendingImages[`fu_${sid}`] = [...(agentPendingImages[`fu_${sid}`] || []), ...copies];
    }
  }

  // Switch to agent tab, keep current session tab, pre-fill the text input
  // Also store in textareaValues for both input IDs so text survives switching to +New
  textareaValues[`agent-task-${projectId}`] = item.text;
  modalActiveTab[projectId] = 'agent';
  refreshModal();
  setTimeout(() => {
    const sid = activeAgentTab[projectId];
    const input = sid
      ? document.getElementById(`agent-followup-${sid}`)
      : document.getElementById(`agent-task-${projectId}`);
    if (input) {
      input.value = item.text;
      input.focus();
    }
  }, 50);
}

async function patchItem(projectId, itemId, data, skipUndo) {
  await fetch(API_BASE + `/api/project/${projectId}/backlog/${itemId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  await refreshSilent();
}

function showToast(message, durationMs = 5000) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-icon">i</span><span class="toast-msg">${esc(message)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('toast-out');
    el.addEventListener('animationend', () => el.remove());
  }, durationMs);
}

function timeAgoJS(ts) {
  if (!ts) return 'never';
  try {
    const d = new Date(ts);
    const secs = Math.floor((Date.now() - d.getTime()) / 1000);
    if (secs < 60) return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
    return `${Math.floor(secs/86400)}d ago`;
  } catch { return ts; }
}

async function githubConnect(projectId) {
  const input = document.getElementById(`gh-repo-${projectId}`);
  if (!input) return;
  const repo = input.value.trim();
  if (!repo) { input.focus(); return; }
  if (!/^[a-zA-Z0-9._-]+\/[a-zA-Z0-9._-]+$/.test(repo)) {
    alert('Invalid format — use owner/repo');
    input.focus();
    return;
  }
  document.querySelectorAll('.modal-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/github/setup`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({repo})
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    await refreshSilent();
  } catch (e) { alert('Connection failed: ' + e.message); }
}

async function githubDisconnect(projectId) {
  if (!confirm('Disconnect GitHub sync? Existing items will be kept.')) return;
  document.querySelectorAll('.modal-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  await fetch(API_BASE + `/api/project/${projectId}/github/disconnect`, {method: 'POST'});
  await refreshSilent();
}

async function githubSyncNow(projectId) {
  const badge = document.getElementById(`gh-badge-${projectId}`);
  if (badge) badge.classList.add('syncing');
  document.querySelectorAll('.modal-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/github/sync`, {method: 'POST'});
    const data = await res.json();
    if (data.error) alert(data.error);
    await refreshSilent();
  } catch (e) { alert('Sync failed: ' + e.message); }
  finally {
    if (badge) badge.classList.remove('syncing');
  }
}

function toggleShowDone(e, projectId) {
  e.stopPropagation();
  showDoneMap[projectId] = !showDoneMap[projectId];
  refreshModal();
}

function pushUndo(entry) {
  undoStack.push(entry);
  if (undoStack.length > 20) undoStack.shift();
}

async function performUndo(e) {
  e.stopPropagation();
  const entry = undoStack.pop();
  if (!entry) return;
  if (entry.type === 'status' || entry.type === 'priority' || entry.type === 'text') {
    await patchItem(entry.projectId, entry.itemId, entry.data, true);
  } else if (entry.type === 'delete') {
    // Re-create the deleted item via POST, then PATCH to restore its full state
    const res = await fetch(API_BASE + `/api/project/${entry.projectId}/backlog`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: entry.data.text, priority: entry.data.priority || 'normal', source: entry.data.source || 'dashboard'})
    });
    if (res.ok && entry.data.status === 'done') {
      const result = await res.json();
      await fetch(API_BASE + `/api/project/${entry.projectId}/backlog/${result.item.id}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({status: 'done'})
      });
    }
    await refreshSilent();
  }
}
