<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #0f1117;
    --surface:     #1a1d27;
    --surface2:    #21253300;
    --surface3:    #2a2f3e;
    --border:      #2e3347;
    --border2:     #3d4460;
    --text:        #f1f5f9;
    --text-dim:    #b8c4d4;
    --text-faint:  #7a8ba0;
    --accent:      #4da6ff;
    --accent-dim:  #1a3a5c;
    --green:       #34d399;
    --green-dim:   #0d2e1f;
    --green-text:  #6ee7b7;
    --amber:       #fbbf24;
    --amber-dim:   #2d2008;
    --amber-text:  #fcd34d;
    --red:         #f87171;
    --red-dim:     #2d1010;
    --red-text:    #fca5a5;
    --purple:      #a78bfa;
    --purple-dim:  #1e1540;
    --purple-text: #c4b5fd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .tagline {
    color: var(--text-faint);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    color: var(--green-text); font-size: 11px;
    font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .refresh-timer { color: var(--text-faint); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  /* ── STATS BAR ───────────────────────────────────────────────────── */
  .stats-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
  .stat {
    flex: 1; padding: 14px 24px;
    border-right: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: background 0.15s;
  }
  .stat:last-child { border-right: none; }
  .stat:hover, .stat.active { background: var(--surface3); }
  .stat-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .stat-count { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-label { color: var(--text-dim); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; margin-top: 2px; }

  /* ── FILTER ROW ──────────────────────────────────────────────────── */
  .filter-row {
    display: flex; gap: 8px; padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    align-items: center; flex-wrap: wrap;
    background: var(--bg);
  }
  .filter-label { color: var(--text-faint); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-right: 4px; }
  .filter-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 5px 14px; border-radius: 20px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* ── MAIN LAYOUT ─────────────────────────────────────────────────── */
  .main { padding: 24px 28px; display: flex; gap: 24px; align-items: flex-start; }
  .projects-col {
    flex: 1; min-width: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* ── TILE CARD (grid view) ─────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    position: relative;
    aspect-ratio: 1 / 1;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    user-select: none;
  }
  .card::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px;
  }
  .card.status-active::before  { background: var(--green); }
  .card.status-blocked::before { background: var(--red); }
  .card.status-waiting::before { background: var(--amber); }
  .card.status-parked::before  { background: var(--text-faint); }
  .card:hover { border-color: var(--border2); box-shadow: 0 4px 20px rgba(0,0,0,0.4); transform: translateY(-2px); }

  /* Drag states */
  .card.dragging { opacity: 0.4; transform: scale(0.95); pointer-events: none; }
  .card.drag-over-left { box-shadow: -3px 0 0 0 var(--accent); }
  .card.drag-over-right { box-shadow: 3px 0 0 0 var(--accent); }

  /* TILE HEADER */
  .card-header {
    display: flex; flex-direction: column; gap: 8px;
    padding: 18px 18px 12px 22px;
  }
  .card-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .project-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.2px; line-height: 1.3; }
  .domain-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap; font-weight: 600;
  }
  .domain-trading { background: var(--accent-dim); color: var(--accent); }
  .domain-infra    { background: var(--purple-dim); color: var(--purple-text); }
  .domain-hobby    { background: var(--amber-dim);  color: var(--amber-text); }
  .domain-general  { background: var(--surface3);   color: var(--text-dim); }

  .status-pill {
    font-size: 10px; padding: 3px 10px; border-radius: 4px;
    letter-spacing: 0.8px; text-transform: uppercase; white-space: nowrap; font-weight: 700;
    align-self: flex-start;
  }
  .status-active  { background: var(--green-dim);  color: var(--green-text); }
  .status-blocked { background: var(--red-dim);    color: var(--red-text); }
  .status-waiting { background: var(--amber-dim);  color: var(--amber-text); }
  .status-parked  { background: var(--surface3);   color: var(--text-dim); }
  .status-unknown { background: var(--surface3);   color: var(--text-dim); }

  .time-ago { color: var(--text-faint); font-size: 12px; white-space: nowrap; font-family: 'JetBrains Mono', monospace; }

  /* TILE BODY — compact info */
  .tile-body {
    flex: 1; padding: 0 18px 0 22px;
    display: flex; flex-direction: column; gap: 8px;
    overflow: hidden;
  }
  .tile-task {
    font-size: 13px; line-height: 1.4; color: var(--accent);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .tile-task.blocked-text { color: var(--red-text); }
  .tile-task.empty { color: var(--text-faint); }

  /* TILE FOOTER */
  .tile-footer {
    padding: 10px 18px 14px 22px;
    display: flex; align-items: center; gap: 8px;
    margin-top: auto;
  }
  .backlog-badge {
    background: var(--amber-dim); color: var(--amber-text);
    font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600;
  }
  .agent-running-badge {
    background: var(--green-dim); color: var(--green-text);
    font-size: 9px; padding: 3px 8px; border-radius: 4px;
    letter-spacing: 0.8px; text-transform: uppercase; font-weight: 700;
    animation: pulse 2s infinite;
  }
  .agent-image-previews {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
  }
  .agent-image-preview {
    position: relative; width: 64px; height: 64px; border-radius: 5px;
    overflow: hidden; border: 1px solid var(--border); background: var(--surface3);
    flex-shrink: 0;
  }
  .agent-image-preview img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* ── MODAL ──────────────────────────────────────────────────────── */
  /* ── MULTI-MODAL LAYER ─────────────────────────────────────────── */
  .modal-layer {
    position: fixed; inset: 0;
    z-index: 300;
    pointer-events: none;
  }
  .modal-window {
    position: absolute;
    pointer-events: auto;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
  }
  .modal-window.minimized { display: none; }
  .modal-window.focused .modal-content {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-dim);
  }
  .modal-content {
    background: var(--surface);
    width: 700px;
    height: 80vh;
    display: flex; flex-direction: column; overflow: hidden;
    border-radius: 12px;
    border: 1px solid var(--border);
    resize: both;
    min-width: 380px;
    min-height: 300px;
    position: relative;
    max-width: 95vw;
    max-height: 95vh;
  }

  .modal-window-controls {
    position: absolute; top: 8px; right: 8px; z-index: 11;
    display: flex; gap: 4px;
  }
  .modal-minimize, .modal-close {
    width: 32px; height: 32px; border-radius: 6px;
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .modal-minimize:hover { background: var(--amber-dim); color: var(--amber-text); border-color: var(--amber); }
  .modal-close:hover { background: var(--red-dim); color: var(--red-text); border-color: var(--red); }

  /* ── MINIMIZED TRAY ──────────────────────────────────────────── */
  .minimized-tray {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 180;
    display: flex; gap: 6px;
    padding: 6px 12px;
    pointer-events: none;
  }
  .minimized-tray:empty { display: none; }
  .minimized-chip {
    pointer-events: auto;
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-size: 12px; color: var(--text);
    transition: background 0.15s;
    max-width: 220px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .minimized-chip:hover { background: var(--surface3); border-color: var(--border2); }
  .minimized-chip .chip-status {
    width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
  }
  .minimized-chip .chip-close {
    margin-left: 4px; font-size: 14px;
    color: var(--text-faint); cursor: pointer;
  }
  .minimized-chip .chip-close:hover { color: var(--red); }

  .modal-header {
    padding: 16px 24px 12px 28px;
    border-bottom: 1px solid var(--border);
    background: #1e2230;
    cursor: grab;
    border-radius: 12px 12px 0 0;
    flex-shrink: 0;
  }
  .modal-header.dragging { cursor: grabbing; }
  .modal-header::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 12px 0 0 0;
  }
  .modal-header.status-active::before  { background: var(--green); }
  .modal-header.status-blocked::before { background: var(--red); }
  .modal-header.status-waiting::before { background: var(--amber); }
  .modal-header.status-parked::before  { background: var(--text-faint); }

  /* CARD SUMMARY (modal) */
  .card-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .summary-item { padding: 12px 18px 14px 22px; border-right: 1px solid var(--border); }
  .summary-item:last-child { border-right: none; }
  .summary-label {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 5px; font-weight: 600;
  }
  .summary-value {
    font-size: 13px; color: var(--text); line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .summary-value.current-task { color: var(--accent); }
  .summary-value.blocked-text { color: var(--red-text); }
  .summary-value.next-text    { color: var(--green-text); }

  /* CARD BODY (modal) */
  .card-body { border-top: 1px solid var(--border); }
  .card-section { padding: 16px 18px 16px 22px; border-bottom: 1px solid var(--border); }
  .card-section:last-child { border-bottom: none; }
  .description { color: var(--text-dim); font-size: 13px; line-height: 1.6; }
  .section-title {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }

  /* MODAL TABS */
  .modal-tab-bar {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    background: #1e2230; padding: 0 22px; flex-shrink: 0;
  }
  .modal-tab {
    padding: 9px 16px 7px; cursor: pointer;
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--text-faint);
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap; user-select: none;
  }
  .modal-tab:hover { color: var(--text-dim); }
  .modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .modal-tab .tab-badge {
    font-size: 10px; background: var(--accent-dim); color: var(--accent);
    padding: 1px 6px; border-radius: 8px; margin-left: 6px;
  }
  .modal-tab-search {
    margin-left: auto; display: flex; align-items: center;
    padding: 4px 0; position: relative;
  }
  .modal-tab-search input {
    background: var(--bg); border: 1px solid var(--border); color: var(--text-dim);
    font-family: 'Inter', sans-serif; font-size: 11px;
    padding: 4px 22px 4px 8px; border-radius: 4px; outline: none;
    width: 150px; transition: border-color 0.15s, width 0.2s;
  }
  .modal-tab-search input:focus { border-color: var(--accent); color: var(--text); width: 200px; }
  .modal-tab-search input::placeholder { color: var(--text-faint); font-style: italic; }
  .modal-tab-search .search-clear {
    position: absolute; right: 6px; color: var(--text-faint); cursor: pointer;
    font-size: 12px; line-height: 1; padding: 2px; user-select: none;
  }
  .modal-tab-search .search-clear:hover { color: var(--text); }
  .modal-scroll-body {
    flex: 1; overflow-y: auto; min-height: 0; overscroll-behavior: contain;
  }
  .modal-scroll-body::-webkit-scrollbar { width: 6px; }
  .modal-scroll-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .modal-tab-content { display: none; }
  .modal-tab-content.active { display: block; }

  /* LOG ENTRIES */
  .log-entries { display: flex; flex-direction: column; gap: 5px; }
  .log-entry {
    display: flex; gap: 12px; align-items: baseline;
    padding: 7px 10px; background: var(--bg);
    border-radius: 4px; border-left: 2px solid var(--border2);
  }
  .log-ts  { color: var(--text-faint); font-size: 11px; white-space: nowrap; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .log-msg { color: var(--text-dim); font-size: 13px; line-height: 1.4; }

  /* BACKLOG */
  .backlog-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .backlog-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px; background: var(--bg);
    border-radius: 4px; border-left: 2px solid var(--border2);
  }
  .backlog-item.done { opacity: 0.45; }
  .backlog-item.done .backlog-text { text-decoration: line-through; }
  .backlog-item.priority-high   { border-left-color: var(--red); }
  .backlog-item.priority-normal { border-left-color: var(--border2); }
  .backlog-item.priority-low    { border-left-color: var(--text-faint); opacity: 0.7; }

  .backlog-check {
    width: 16px; height: 16px; border: 1.5px solid var(--border2);
    border-radius: 3px; cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: none; color: var(--green-text); font-size: 11px;
  }
  .backlog-check:hover { border-color: var(--green); }
  .backlog-item.done .backlog-check { background: var(--green-dim); border-color: var(--green); }

  .backlog-text {
    flex: 1; font-size: 13px; color: var(--text); line-height: 1.5; word-break: break-word;
  }
  .backlog-text[contenteditable="true" spellcheck="true"] {
    outline: 1px solid var(--accent); border-radius: 3px;
    padding: 1px 4px; background: var(--surface);
  }
  .backlog-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .priority-badge {
    font-size: 9px; padding: 2px 7px; border-radius: 3px;
    letter-spacing: 0.8px; text-transform: uppercase; cursor: pointer;
    font-weight: 600; transition: opacity 0.15s;
  }
  .priority-badge:hover { opacity: 0.8; }
  .priority-high   { background: var(--red-dim);   color: var(--red-text); }
  .priority-normal { background: var(--surface3);  color: var(--text-dim); }
  .priority-low    { background: var(--surface3);  color: var(--text-faint); }

  .backlog-del {
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; font-size: 14px; padding: 0 2px; opacity: 0;
    transition: opacity 0.15s, color 0.15s; line-height: 1;
  }
  .backlog-item:hover .backlog-del { opacity: 1; }
  .backlog-del:hover { color: var(--red); }
  .backlog-dispatch {
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; font-size: 11px; padding: 0 2px; opacity: 0;
    transition: opacity 0.15s, color 0.15s; line-height: 1;
  }
  .backlog-item:hover .backlog-dispatch { opacity: 1; }
  .backlog-dispatch:hover { color: var(--green-text); }
  .backlog-source {
    font-size: 9px; color: var(--text-faint); padding: 1px 5px;
    border: 1px solid var(--border); border-radius: 3px; font-family: 'JetBrains Mono', monospace;
  }

  /* ADD FORM */
  .backlog-add { display: flex; flex-direction: column; gap: 8px; }
  .backlog-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 7px 12px; border-radius: 5px; outline: none; transition: border-color 0.15s;
    resize: vertical; min-height: 38px; max-height: 200px; line-height: 1.5;
  }
  .backlog-input:focus { border-color: var(--accent); }
  .backlog-input::placeholder { color: var(--text-faint); }
  .backlog-input.drag-over { border-color: var(--accent); background: var(--accent-dim); }

  .create-previews {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .create-previews:empty { display: none; }
  .create-preview-item {
    position: relative; width: 64px; height: 64px; border-radius: 5px;
    overflow: hidden; border: 1px solid var(--border); background: var(--surface3);
    flex-shrink: 0;
  }
  .create-preview-item img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .create-preview-item .file-icon {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-size: 24px; color: var(--text-dim);
  }
  .create-preview-item .file-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    font-size: 8px; color: var(--text); background: rgba(0,0,0,0.7);
    padding: 1px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .create-preview-remove {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: rgba(0,0,0,0.7); border: none; color: var(--text);
    cursor: pointer; font-size: 10px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .create-preview-item:hover .create-preview-remove { opacity: 1; }
  .priority-select {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'Inter', sans-serif;
    font-size: 12px; padding: 7px 8px; border-radius: 5px; cursor: pointer; outline: none;
  }
  .btn-add {
    background: var(--accent-dim); border: 1px solid var(--accent);
    color: var(--accent); font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 5px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-add:hover { background: var(--accent); color: var(--bg); }

  .toggle-done {
    background: none; border: 1px solid var(--border); color: var(--text-faint);
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s;
  }
  .toggle-done:hover { color: var(--text-dim); border-color: var(--border2); }

  .btn-undo {

  /* FEED */
  .feed-col { width: 380px; flex-shrink: 0; position: sticky; top: 90px; z-index: 99; max-height: calc(100vh - 100px); display: flex; flex-direction: column; overflow: hidden; }
  .feed-header {

  .feed-entries::-webkit-scrollbar { width: 4px; }
  .feed-entries::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .feed-entry {
    padding: 12px 14px; background: var(--surface);

  }

  .feed-entry-msg { color: var(--text-dim); font-size: 14px; line-height: 1.5; }
  .feed-entry-ts  { color: var(--text-faint); font-size: 12px; margin-top: 5px; font-family: 'JetBrains Mono', monospace; }

  .loading { color: var(--text-faint); text-align: center; padding: 48px; font-size: 13px; letter-spacing: 1px; grid-column: 1 / -1; }

  @media (max-width: 960px) {
    .feed-col { display: none; }

    .summary-item { border-right: none; border-bottom: 1px solid var(--border); }
    .summary-item:last-child { border-bottom: none; }

  /* ATTACHMENTS */
  .att-btn {
    background: none; border: 1px solid var(--border); color: var(--text-faint);
    cursor: pointer; font-size: 13px; padding: 2px 7px; border-radius: 4px;
    transition: all 0.15s; line-height: 1; flex-shrink: 0;
  }
  .att-btn:hover { border-color: var(--accent); color: var(--accent); }
  .att-btn.has-atts { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .att-panel {
    display: none; margin-top: 8px; padding: 10px 12px;
    background: var(--bg); border-radius: 5px;
    border: 1px solid var(--border); border-left: 2px solid var(--accent);
  }
  .att-panel.open { display: block; }

  .att-drop-zone {
    border: 1.5px dashed var(--border2); border-radius: 5px;
    padding: 14px; text-align: center; cursor: pointer;

  .att-list { display: flex; flex-direction: column; gap: 5px; }
  .att-item {
    display: flex; align-items: center; gap: 8px;

  .att-info { flex: 1; min-width: 0; }
  .att-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .att-size { font-size: 11px; color: var(--text-faint); }
  .att-open {
    background: none; border: 1px solid var(--border); color: var(--text-dim);

  .att-del {
    background: none; border: none; color: var(--text-faint);

  /* ── AGENT PANEL ─────────────────────────────────────────────── */
  .agent-panel { padding: 16px 18px 16px 22px; border-bottom: 1px solid var(--border); }
  .agent-panel-header {

  .agent-status-dot {

  .agent-status-dot.idle       { background: var(--text-faint); }

  .agent-status-dot.completed  { background: var(--accent); }

  .agent-tab-new {

  .btn-dispatch {
    background: var(--green-dim); border: 1px solid var(--green);

    font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 5px;

  .btn-stop {

    cursor: pointer; transition: all 0.15s; white-space: nowrap;

  .agent-chat {
    background: #0a0c10; border: 1px solid var(--border); border-radius: 6px;

    min-height: 120px; max-height: 80vh; position: relative;

  .agent-chat-resize {
    position: absolute; bottom: -4px; left: 0; right: 0; height: 8px;

  /* Rich text formatting for agent output */

  /* Plan Viewer modal */

</head>
<body>
<span id="name-measure" class="name-measure"></span>

<div class="header">
  <div class="header-left">
    <span class="logo">Mission Control</span>
    <span class="tagline">Project Intelligence</span>
  </div>
  <div class="header-right">
    <button class="btn-header-action" onclick="openSharedRulesEditor()">Shared Rules</button>
    <button class="btn-new-project" onclick="openNewProjectForm()">+ New</button>
    <span class="refresh-timer" id="refresh-timer">refresh in 30s</span>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="filter-row">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="blocked">Blocked</button>
  <button class="filter-btn" data-filter="waiting">Waiting</button>
  <button class="filter-btn" data-filter="parked">Parked</button>
  <button class="filter-btn" data-filter="trading">Trading</button>
  <button class="filter-btn" data-filter="infra">Infra</button>
  <button class="filter-btn" data-filter="hobby">Hobby</button>
</div>

<div class="main">
  <div class="projects-col" id="projects-col"><div class="loading">Loading...</div></div>
  <div class="feed-col">
    <div class="feed-header">Activity Stream</div>
    <div class="feed-entries" id="feed-entries"><div class="loading">—</div></div>
  </div>
</div>

<div class="modal-layer" id="modal-layer"></div>
<div class="minimized-tray" id="minimized-tray"></div>

<div class="agent-console hidden collapsed" id="agent-console">
  <div class="agent-console-bar" onclick="toggleAgentConsole()">
    <span class="agent-console-title">Agent Sessions</span>
    <span class="agent-console-count" id="ac-count">0</span>
    <span class="agent-console-chevron">&#9650;</span>
  </div>
  <div class="agent-console-body" id="ac-body"></div>
</div>

<script>
// ── API base: empty for standalone Flask, full URL when running inside Tauri ──
const API_BASE = window.__TAURI_INTERNALS__ ? 'http://localhost:5199' : '';

let allProjects = [];
let projectOrder = JSON.parse(localStorage.getItem('projectOrder') || '[]');
let activeFilter = 'all';
let showDoneMap = {};
let modalSearchQuery = {};  // projectId → search filter string
let openAttPanels = new Set();
let undoStack = [];  // [{type, projectId, itemId, data, label}]
let modalActiveTab = {};  // projectId → 'backlog' | 'agent' | 'agent-log' | 'activity'
let refreshCountdown = 30;
let refreshInterval, countdownInterval;
let lastDragEnd = 0;

async function fetchProjects() {
  try {
    const res = await fetch(API_BASE + '/api/projects');
    allProjects = await res.json();
    applyOrder();
    render();
  } catch(e) {
    document.getElementById('projects-col').innerHTML = '<div class="loading">Failed to load — is server running?</div>';
  }
}

function applyOrder() {
  if (projectOrder.length === 0) return;
  const orderMap = {};
  projectOrder.forEach((id, i) => orderMap[id] = i);
  allProjects.sort((a, b) => {
    const oa = orderMap[a.id] !== undefined ? orderMap[a.id] : 9999;
    const ob = orderMap[b.id] !== undefined ? orderMap[b.id] : 9999;
    return oa - ob;
  });
}

function render() { renderStats(); renderProjects(); renderFeed(); }

function renderStats() {
  const counts = {active:0, blocked:0, waiting:0, parked:0};
  allProjects.forEach(p => { if(counts[p.status] !== undefined) counts[p.status]++; });
  const cfg = [
    {key:'active',  label:'Active',  color:'var(--green)'},
    {key:'blocked', label:'Blocked', color:'var(--red)'},
    {key:'waiting', label:'Waiting', color:'var(--amber)'},
    {key:'parked',  label:'Parked',  color:'var(--text-faint)'},
  ];
  document.getElementById('stats-bar').innerHTML = cfg.map(c => `
    <div class="stat" onclick="setFilter('${c.key}')">
      <div class="stat-dot" style="background:${c.color}"></div>
      <div>
        <div class="stat-count" style="color:${c.color}">${counts[c.key]}</div>
        <div class="stat-label">${c.label}</div>
      </div>
    </div>`).join('');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderProjects();
}

function filterProjects() {
  if (activeFilter === 'all') return allProjects;
  if (['active','blocked','waiting','parked'].includes(activeFilter))
    return allProjects.filter(p => p.status === activeFilter);
  return allProjects.filter(p => p.domain === activeFilter);
}

function renderProjects() {
  const filtered = filterProjects();
  const col = document.getElementById('projects-col');
  if (!filtered.length) { col.innerHTML = '<div class="loading">No projects match filter</div>'; return; }
  col.innerHTML = filtered.map(p => tileHTML(p)).join('');
  // Attach click handlers
  col.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    card.addEventListener('click', (e) => {
      if (e.defaultPrevented || lastDragEnd > Date.now() - 200) return;
      openProjectModal(id);
    });
  });
}

// ── Tile HTML (compact grid card) ───────────────────────────────────────────

function hasRunningAgent(projectId) {
  return agentHistory.some(h => h.projectId === projectId && h.status === 'running');
}

function tileHTML(p) {
  const sc = `status-${p.status||'unknown'}`;
  const dc = `domain-${p.domain||'general'}`;
  const backlog = p.backlog || [];
  const openItems = backlog.filter(i => i.status === 'open');
  const backlogBadge = openItems.length
    ? `<span class="backlog-badge">${openItems.length} open</span>` : '';
  const agentBadge = hasRunningAgent(p.id)
    ? `<span class="agent-running-badge">Agent Running</span>` : '';

  const taskText = p.blocked
    ? `<div class="tile-task blocked-text">${esc(p.blocked_reason||'Blocked')}</div>`
    : (p.current_task
      ? `<div class="tile-task">${esc(p.current_task)}</div>`
      : `<div class="tile-task empty">${esc(p.next_action||'No current task')}</div>`);

  return `
  <div class="card ${sc}" data-id="${esc(p.id)}">
    <div class="card-header">
      <div class="card-title-row">
        <span class="project-name">${esc(p.name||p.id)}</span>
        <span class="domain-tag ${dc}">${esc(p.domain||'general')}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="status-pill ${sc}">${esc(p.status||'unknown')}</span>
        ${agentBadge}
      </div>
    </div>
    <div class="tile-body">
      ${taskText}
    </div>
    <div class="tile-footer">
      ${backlogBadge}
      <span class="time-ago">${esc(p.last_updated_relative||'')}</span>
    </div>
  </div>`;
}

// ── Modal HTML (full detail view) ───────────────────────────────────────────

function modalContentHTML(p) {
  const sc = `status-${p.status||'unknown'}`;
  const dc = `domain-${p.domain||'general'}`;
  const showDone = showDoneMap[p.id] || false;
  const backlog = p.backlog || [];
  const openItems = backlog.filter(i => i.status === 'open');
  const doneItems = backlog.filter(i => i.status === 'done');

  const backlogBadge = openItems.length
    ? `<span class="backlog-badge">${openItems.length} open</span>` : '';

  const currentTaskHTML = p.blocked
    ? `<span class="summary-value blocked-text">${esc(p.blocked_reason||'Blocked')}</span>`
    : `<span class="summary-value current-task">${esc(p.current_task||'—')}</span>`;

  const activeTab = modalActiveTab[p.id] || 'agent';

  const logHTML = (p.activity_log||[]).slice(0,20).map(e => `
    <div class="log-entry">
      <span class="log-ts">${esc(e.ts_relative||e.ts||'')}</span>
      <span class="log-msg">${esc(e.msg||'')}</span>
    </div>`).join('');

  const visibleItems = [...openItems, ...(showDone ? doneItems : [])];
  const backlogItemsHTML = visibleItems.map(item => `
    <div class="backlog-item ${item.status==='done'?'done':''} priority-${item.priority||'normal'}" data-item-id="${esc(item.id)}">
      <button class="backlog-check" onclick="toggleDone(event,'${esc(p.id)}','${esc(item.id)}','${item.status}')" title="${item.status==='done'?'Reopen':'Mark done'}">
        ${item.status==='done' ? '✓' : ''}
      </button>
      <span class="backlog-text" contenteditable="true" spellcheck="true"
        onblur="saveBacklogText(event,'${esc(p.id)}','${esc(item.id)}')"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
      >${esc(item.text)}</span>
      <div class="backlog-meta">
        <span class="priority-badge priority-${item.priority||'normal'}"
          onclick="cyclePriority(event,'${esc(p.id)}','${esc(item.id)}','${item.priority||'normal'}')"
          title="Click to change priority">${item.priority||'normal'}</span>
        ${item.source && item.source !== 'dashboard' ? `<span class="backlog-source">${esc(item.source)}</span>` : ''}
        ${p.project_path && item.status !== 'done' ? `<button class="backlog-dispatch" onclick="dispatchBacklogItem(event,'${esc(p.id)}','${esc(item.id)}')" title="Send to agent">▶</button>` : ''}
        <button class="att-btn ${(item.attachments||[]).length > 0 ? 'has-atts' : ''}"
          onclick="toggleAttPanel(event,'${esc(p.id)}','${esc(item.id)}')"
          title="Attachments">📎${(item.attachments||[]).length > 0 ? ' '+item.attachments.length : ''}</button>

// ── Multi-modal window manager ──────────────────────────────────────────────

const openModals = new Map();   // modalId -> { projectId, element, minimized, zIndex }
let focusedModalId = null;
let nextModalZ = 201;

function getStatusColor(status) {
  const map = { active: 'var(--green)', blocked: 'var(--red)', waiting: 'var(--amber)', parked: 'var(--text-faint)' };
  return map[status] || 'var(--text-faint)';
}

function centerModalElement(win) {
  const w = win.offsetWidth, h = win.offsetHeight;
  const offset = Math.max(0, openModals.size - 1) * 30;
  win.style.left = Math.max(0, (window.innerWidth - w) / 2 + offset) + 'px';
  win.style.top = Math.max(0, (window.innerHeight - h) / 2 + offset) + 'px';
}

function focusModal(modalId) {
  const entry = openModals.get(modalId);
  if (!entry || entry.minimized) return;
  if (focusedModalId && openModals.has(focusedModalId)) {
    openModals.get(focusedModalId).element.classList.remove('focused');
  }
  const z = nextModalZ++;
  entry.zIndex = z;
  entry.element.style.zIndex = z;
  entry.element.classList.add('focused');
  focusedModalId = modalId;
}

function openProjectModal(projectId) {
  const p = allProjects.find(x => x.id === projectId);
  if (!p) return;

  // If already open, focus/restore it
  if (openModals.has(projectId)) {
    const entry = openModals.get(projectId);
    if (entry.minimized) restoreModal(projectId);
    focusModal(projectId);
    return;
  }

  const win = document.createElement('div');
  win.className = 'modal-window';
  win.dataset.modalId = projectId;

  const content = document.createElement('div');
  content.className = 'modal-content';
  content.innerHTML = modalContentHTML(p);
  win.appendChild(content);

  document.getElementById('modal-layer').appendChild(win);
  const nameInput = content.querySelector('.name-edit');
  if (nameInput) autoSizeNameInput(nameInput);

  const z = nextModalZ++;
  win.style.zIndex = z;
  openModals.set(projectId, { projectId, element: win, minimized: false, zIndex: z });

  centerModalElement(win);
  focusModal(projectId);
  fetchAgentStatus(projectId).then(() => refreshModalById(projectId));
}

function closeModalById(modalId) {
  const entry = openModals.get(modalId);
  if (!entry) return;
  entry.element.remove();
  const chip = document.getElementById('chip-' + CSS.escape(modalId));
  if (chip) chip.remove();
  openModals.delete(modalId);

  if (entry.projectId) {
    const p = allProjects.find(x => x.id === entry.projectId);
    if (p && p.backlog) p.backlog.forEach(item => openAttPanels.delete(item.id));
  }

  if (focusedModalId === modalId) {
    focusedModalId = null;
    let topId = null, topZ = 0;
    for (const [id, e] of openModals) {
      if (!e.minimized && e.zIndex > topZ) { topZ = e.zIndex; topId = id; }
    }
    if (topId) focusModal(topId);
  }
}

function closeModal() {
  if (focusedModalId) closeModalById(focusedModalId);
}

function minimizeModal(modalId) {
  const entry = openModals.get(modalId);
  if (!entry) return;
  entry.minimized = true;
  entry.savedScrollTop = entry.element.querySelector('.modal-scroll-body')?.scrollTop || 0;
  entry.element.classList.add('minimized');

  const tray = document.getElementById('minimized-tray');
  const p = entry.projectId ? allProjects.find(x => x.id === entry.projectId) : null;
  const name = p ? (p.name || p.id) : modalId.replace(/^__/, '').replace(/_/g, ' ');
  const statusColor = p ? getStatusColor(p.status) : 'var(--text-faint)';

  const chipEl = document.createElement('div');
  chipEl.className = 'minimized-chip';
  chipEl.id = 'chip-' + modalId;
  chipEl.innerHTML = `
    <span class="chip-status" style="background:${statusColor}"></span>
    <span>${esc(name)}</span>
    <span class="chip-close" onclick="event.stopPropagation(); closeModalById('${esc(modalId)}')" title="Close">&#10005;</span>`;
  chipEl.addEventListener('click', (e) => {
    if (!e.target.closest('.chip-close')) restoreModal(modalId);
  });
  tray.appendChild(chipEl);

  if (focusedModalId === modalId) {
    focusedModalId = null;
    let topId = null, topZ = 0;
    for (const [id, e] of openModals) {
      if (!e.minimized && e.zIndex > topZ) { topZ = e.zIndex; topId = id; }
    }
    if (topId) focusModal(topId);
  }
}

function restoreModal(modalId) {
  const entry = openModals.get(modalId);
  if (!entry) return;
  entry.minimized = false;
  entry.element.classList.remove('minimized');
  const chip = document.getElementById('chip-' + CSS.escape(modalId));
  if (chip) chip.remove();
  if (entry.projectId) refreshModalById(modalId);
  const scrollBody = entry.element.querySelector('.modal-scroll-body');
  if (scrollBody && entry.savedScrollTop) scrollBody.scrollTop = entry.savedScrollTop;
  focusModal(modalId);
}

function refreshModalById(modalId) {
  const entry = openModals.get(modalId);
  if (!entry || entry.minimized) return;
  const p = allProjects.find(x => x.id === entry.projectId);
  if (!p) { closeModalById(modalId); return; }

  const content = entry.element.querySelector('.modal-content');
  const scrollBody = content.querySelector('.modal-scroll-body');
  const savedScroll = scrollBody ? scrollBody.scrollTop : 0;
  const saved = {};
  let focusedId = null, selStart = 0, selEnd = 0;
  content.querySelectorAll('textarea, input[type="text"]').forEach(ta => {
    if (ta.id && ta.value) saved[ta.id] = ta.value;
    if (ta === document.activeElement) {
      focusedId = ta.id;
      selStart = ta.selectionStart;
      selEnd = ta.selectionEnd;
    }
  });
  content.innerHTML = modalContentHTML(p);
  for (const [id, val] of Object.entries(saved)) {
    const el = document.getElementById(id);
    if (el) el.value = val;
  }
  // Restore focus and cursor position
  if (focusedId) {
    const el = document.getElementById(focusedId);
    if (el) { el.focus(); el.selectionStart = selStart; el.selectionEnd = selEnd; }
  }
  // Restore scroll position
  const newScrollBody = content.querySelector('.modal-scroll-body');
  if (newScrollBody) newScrollBody.scrollTop = savedScroll;
  // Auto-size name input
  const nameInput = content.querySelector('.name-edit');
  if (nameInput) autoSizeNameInput(nameInput);
  // Scroll agent output to bottom
  const sid = activeAgentTab[entry.projectId];
  if (sid) {
    const out = document.getElementById(`agent-output-${sid}`);
    if (out) out.scrollTop = out.scrollHeight;
  }
  // Reapply per-modal zoom level
  if (modalZoomLevels[modalId]) {
    entry.element.querySelectorAll('.agent-output, .ac-session-output, .plan-viewer-body').forEach(el => {
      el.style.fontSize = modalZoomLevels[modalId] + 'px';
    });
  }
  // Reapply tab search filter
  if (modalSearchQuery[entry.projectId]) {
    applyTabFilter(entry.projectId);
  }
}

function refreshModal() {
  for (const [modalId, entry] of openModals) {
    if (entry.projectId) refreshModalById(modalId);
  }
}

// Escape key closes the focused modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && focusedModalId) closeModalById(focusedModalId);
});

// Click on any modal window to bring it to front
document.getElementById('modal-layer').addEventListener('mousedown', (e) => {
  const win = e.target.closest('.modal-window');
  if (win) focusModal(win.dataset.modalId);
}, true);

// ── Drag-and-drop reordering (mouse events) ─────────────────────────────────

let dragState = null;

document.getElementById('projects-col').addEventListener('mousedown', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  // Don't start drag on interactive elements inside the card
  if (e.target.closest('button, a, input, select, textarea, [contenteditable]')) return;
  const startX = e.clientX, startY = e.clientY;
  dragState = { id: card.dataset.id, card, startX, startY, started: false };
});

document.addEventListener('mousemove', (e) => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  // Require 8px movement to start drag (avoids interfering with clicks)
  if (!dragState.started) {
    if (Math.abs(dx) + Math.abs(dy) < 8) return;
    dragState.started = true;
    dragState.card.classList.add('dragging');
  }
  // Highlight the card we're hovering over
  const col = document.getElementById('projects-col');
  col.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over-left', 'drag-over-right'));
  const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.card');
  if (target && target.dataset.id !== dragState.id) {
    const rect = target.getBoundingClientRect();
    const midX = rect.left + rect.width / 2;
    target.classList.add(e.clientX < midX ? 'drag-over-left' : 'drag-over-right');
  }
});

document.addEventListener('mouseup', (e) => {
  if (!dragState) return;
  const { id: srcId, started } = dragState;
  dragState = null;
  const col = document.getElementById('projects-col');
  col.querySelectorAll('.card').forEach(c => c.classList.remove('dragging', 'drag-over-left', 'drag-over-right'));
  if (!started) return;
  lastDragEnd = Date.now();
  // Find drop target
  const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.card');
  const targetId = target?.dataset.id;
  if (targetId && srcId !== targetId) {
    reorderProjects(srcId, targetId);
  }
});

function reorderProjects(srcId, targetId) {
  const ids = allProjects.map(p => p.id);
  const srcIdx = ids.indexOf(srcId);
  const targetIdx = ids.indexOf(targetId);
  if (srcIdx === -1 || targetIdx === -1) return;

  // Move src to target position
  const [moved] = allProjects.splice(srcIdx, 1);
  allProjects.splice(targetIdx, 0, moved);

  // Update order
  projectOrder = allProjects.map(p => p.id);
  localStorage.setItem('projectOrder', JSON.stringify(projectOrder));
  renderProjects();

  // Persist to server
  fetch(API_BASE + '/api/projects/order', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({order: projectOrder})
  }).catch(() => {});
}

// ── Create-form attachment handling ──────────────────────────────────────────

const pendingFiles = new Map();

function handleCreatePaste(e, projectId) {
  const items = Array.from(e.clipboardData?.items || []);
  const imageItems = items.filter(i => i.type.startsWith('image/'));
  if (imageItems.length === 0) return;
  e.preventDefault();
  const files = pendingFiles.get(projectId) || [];
  for (const item of imageItems) {
    const blob = item.getAsFile();
    if (blob) files.push(blob);
  }
  pendingFiles.set(projectId, files);
  renderCreatePreviews(projectId);
}

function createDragOver(e, projectId) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById(`backlog-input-${projectId}`)?.classList.add('drag-over');
}

function createDragLeave(projectId) {
  document.getElementById(`backlog-input-${projectId}`)?.classList.remove('drag-over');
}

function createDrop(e, projectId) {
  e.preventDefault();
  e.stopPropagation();
  createDragLeave(projectId);
  const droppedFiles = Array.from(e.dataTransfer.files);
  if (droppedFiles.length === 0) return;
  const files = pendingFiles.get(projectId) || [];
  files.push(...droppedFiles);
  pendingFiles.set(projectId, files);
  renderCreatePreviews(projectId);
}

function renderCreatePreviews(projectId) {
  const container = document.getElementById(`create-previews-${projectId}`);
  if (!container) return;
  const files = pendingFiles.get(projectId) || [];
  container.innerHTML = files.map((file, i) => {
    const isImage = file.type.startsWith('image/');
    const thumbContent = isImage
      ? `<img src="${URL.createObjectURL(file)}" alt="${esc(file.name)}">`
      : `<div class="file-icon">📎</div>`;
    return `
      <div class="create-preview-item" title="${esc(file.name)}">
        ${thumbContent}
        <div class="file-name">${esc(file.name)}</div>
        <button class="create-preview-remove" onclick="removeCreateFile('${esc(projectId)}',${i})">✕</button>
      </div>`;
  }).join('');
}

function removeCreateFile(projectId, index) {
  const files = pendingFiles.get(projectId) || [];
  files.splice(index, 1);
  if (files.length === 0) pendingFiles.delete(projectId);
  else pendingFiles.set(projectId, files);
  renderCreatePreviews(projectId);
}

// ── Backlog actions ─────────────────────────────────────────────────────────

async function addBacklogItem(projectId) {
  const input = document.getElementById(`backlog-input-${projectId}`);
  const priSel = document.getElementById(`backlog-pri-${projectId}`);
  const text = input.value.trim();
  const files = pendingFiles.get(projectId) || [];
  if (!text && files.length === 0) return;
  if (!text) { input.focus(); return; }
  input.value = '';
  input.disabled = true;
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/backlog`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, priority: priSel.value, source: 'dashboard'})
    });
    const data = await res.json();
    if (data.item && data.item.id && files.length > 0) {
      for (const file of files) {
        await uploadFile(projectId, data.item.id, file);
      }
    }
    pendingFiles.delete(projectId);
    const previewEl = document.getElementById(`create-previews-${projectId}`);
    if (previewEl) previewEl.innerHTML = '';
    await refreshSilent();
  } finally { input.disabled = false; input.focus(); }
}

async function toggleDone(e, projectId, itemId, currentStatus) {
  e.stopPropagation();
  pushUndo({type: 'status', projectId, itemId, data: {status: currentStatus}, label: currentStatus === 'done' ? 'mark open' : 'mark done'});
  await patchItem(projectId, itemId, {status: currentStatus === 'done' ? 'open' : 'done'});
}

async function cyclePriority(e, projectId, itemId, current) {
  e.stopPropagation();
  const cycle = {normal:'high', high:'low', low:'normal'};
  pushUndo({type: 'priority', projectId, itemId, data: {priority: current}, label: 'priority change'});
  await patchItem(projectId, itemId, {priority: cycle[current]||'normal'});
}

async function saveBacklogText(e, projectId, itemId) {
  const text = e.target.innerText.trim();
  if (!text) return;
  const p = allProjects.find(x => x.id === projectId);
  const oldItem = p && (p.backlog || []).find(i => i.id === itemId);
  if (oldItem && oldItem.text !== text) {
    pushUndo({type: 'text', projectId, itemId, data: {text: oldItem.text}, label: 'text edit'});
  }
  await patchItem(projectId, itemId, {text});
}

async function deleteBacklogItem(e, projectId, itemId) {
  e.stopPropagation();
  if (!confirm('Delete this item?')) return;
  const p = allProjects.find(x => x.id === projectId);
  const item = p && (p.backlog || []).find(i => i.id === itemId);
  if (item) {
    pushUndo({type: 'delete', projectId, itemId, data: {...item}, label: 'delete'});
  }
  await fetch(API_BASE + `/api/project/${projectId}/backlog/${itemId}`, {method: 'DELETE'});
  await refreshSilent();
}

function dispatchBacklogItem(e, projectId, itemId) {
  e.stopPropagation();
  const p = allProjects.find(x => x.id === projectId);
  if (!p) return;
  const item = (p.backlog || []).find(i => i.id === itemId);
  if (!item) return;
  // Fill agent input and dispatch
  const input = document.getElementById(`agent-task-${projectId}`);
  if (input) {
    input.value = item.text;
    input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    input.focus();
  }
}

async function patchItem(projectId, itemId, data, skipUndo) {
  await fetch(API_BASE + `/api/project/${projectId}/backlog/${itemId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  await refreshSilent();
}

function toggleShowDone(e, projectId) {
  e.stopPropagation();
  showDoneMap[projectId] = !showDoneMap[projectId];
  refreshModal();
}

function pushUndo(entry) {
  undoStack.push(entry);
  if (undoStack.length > 20) undoStack.shift();
}

async function performUndo(e) {
  e.stopPropagation();
  const entry = undoStack.pop();
  if (!entry) return;
  if (entry.type === 'status' || entry.type === 'priority' || entry.type === 'text') {
    await patchItem(entry.projectId, entry.itemId, entry.data, true);
  } else if (entry.type === 'delete') {
    // Re-create the deleted item via POST, then PATCH to restore its full state
    const res = await fetch(API_BASE + `/api/project/${entry.projectId}/backlog`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: entry.data.text, priority: entry.data.priority || 'normal', source: entry.data.source || 'dashboard'})
    });
    if (res.ok && entry.data.status === 'done') {
      const result = await res.json();
      await fetch(API_BASE + `/api/project/${entry.projectId}/backlog/${result.item.id}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({status: 'done'})
      });
    }
    await refreshSilent();
  }
}

function attHTML(a, projectId, itemId) {
  const url = API_BASE + `/api/attachments/${a.stored_name}`;
  const isImage = a.type === 'image';
  const icon = a.type === 'pdf' ? '📄' : '📎';
  const kb = a.size ? (a.size < 1024*1024 ? (a.size/1024).toFixed(0)+'KB' : (a.size/1024/1024).toFixed(1)+'MB') : '';
  const thumb = isImage
    ? `<img class="att-thumb" src="${url}" alt="${esc(a.original_name)}" onerror="this.style.display='none'">`
    : `<div class="att-icon">${icon}</div>`;
  return `
  <div class="att-item" data-att-id="${esc(a.id)}">
    ${thumb}
    <div class="att-info">
      <div class="att-name" title="${esc(a.original_name)}">${esc(a.original_name)}</div>
      <div class="att-size">${kb}</div>
    </div>
    <a href="${url}" target="_blank" rel="noopener"><button class="att-open">Open</button></a>
    <button class="att-del" onclick="deleteAttachment(event,'${projectId}','${itemId}','${esc(a.id)}')" title="Remove">✕</button>
  </div>`;
}

function toggleAttPanel(e, projectId, itemId) {
  e.stopPropagation();
  const panel = document.getElementById('att-'+itemId);
  if (panel) {
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) openAttPanels.add(itemId);
    else openAttPanels.delete(itemId);
  }
}

function attDragOver(e, itemId) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('drop-'+itemId)?.classList.add('drag-over');
}
function attDragLeave(itemId) {
  document.getElementById('drop-'+itemId)?.classList.remove('drag-over');
}
async function attDrop(e, projectId, itemId) {
  e.preventDefault();
  e.stopPropagation();
  attDragLeave(itemId);
  const files = Array.from(e.dataTransfer.files);
  for (const file of files) await uploadFile(projectId, itemId, file);
}
async function attFileSelected(e, projectId, itemId) {
  const files = Array.from(e.target.files);
  for (const file of files) await uploadFile(projectId, itemId, file);
  e.target.value = '';
}

async function uploadFile(projectId, itemId, file) {
  const listEl = document.getElementById('attlist-'+itemId);
  const uploading = document.createElement('div');
  uploading.className = 'att-uploading';
  uploading.textContent = `Uploading ${file.name}...`;
  listEl?.appendChild(uploading);
  try {
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch(API_BASE + `/api/project/${projectId}/backlog/${itemId}/attachments`, {method:'POST', body: fd});
    const data = await res.json();
    uploading.remove();
    if (data.ok) {
      openAttPanels.add(itemId);
      await refreshSilent();
    }
  } catch(err) {
    uploading.textContent = 'Upload failed';
    setTimeout(() => uploading.remove(), 3000);
  }
}

async function deleteAttachment(e, projectId, itemId, attId) {
  e.stopPropagation();
  if (!confirm('Remove this attachment?')) return;
  openAttPanels.add(itemId);
  await fetch(API_BASE + `/api/project/${projectId}/backlog/${itemId}/attachments/${attId}`, {method:'DELETE'});
  await refreshSilent();
}

let agentEventSources = {};   // session_id → EventSource
let sseRetryCount = {};       // session_id → number of consecutive reconnect attempts
let agentOutputBuffers = {};   // session_id → string[]
let agentStatusCache = {};     // session_id → {status, task, projectId, startedAt}
let agentHistory = [];         // [{projectId, sessionId, projectName, task, status, startedAt}]
let activeAgentTab = {};       // project_id → session_id (which tab is active in modal)
let agentPendingImages = {};   // key (projectId or sessionId) → [{file, objectUrl, serverPath}]
let acOpenSessions = new Set(); // session_id → expanded in console
let acExpanded = false;
let planViewerContent = {};    // session_id → string[] of raw plan text lines

function getProjectSessions(projectId) {
  return agentHistory.filter(h => h.projectId === projectId);
}

function agentPanelHTML(p) {
  const pp = p.project_path || '';
  if (!pp) {
    return `<div class="agent-panel">
      <div class="section-title">Agent</div>
      <div class="agent-disabled">Set project_path to enable agent dispatch</div>
    </div>`;
  }

  const sessions = getProjectSessions(p.id);
  const activeSessionId = activeAgentTab[p.id];
  const activeSession = activeSessionId ? agentStatusCache[activeSessionId] : null;
  const st = activeSession ? (activeSession.status || 'idle') : 'idle';
  const isRunning = st === 'running';

  // Tab bar
  const tabsHTML = sessions.map(h => {
    const isActive = h.sessionId === activeSessionId;
    const label = (h.task || '').substring(0, 30) || 'Session';
    return `<div class="agent-tab ${isActive ? 'active' : ''}" onclick="switchAgentTab('${esc(p.id)}','${esc(h.sessionId)}')" title="${esc(h.task)}">
      <span class="agent-status-dot ${h.status}"></span>
      <span class="agent-tab-label">${esc(label)}</span>
      <button class="agent-tab-close" onclick="event.stopPropagation();closeAgentTab('${esc(p.id)}','${esc(h.sessionId)}')" title="Close tab">&#10005;</button>
    </div>`;
  }).join('');

  const tabBar = sessions.length > 0
    ? `<div class="agent-tab-bar">${tabsHTML}<button class="agent-tab-new" onclick="newAgentTab('${esc(p.id)}')">+ New</button></div>`
    : '';

  // Dispatch row (always visible)
  const dispatchPreviews = renderAgentImagePreviews(p.id);
  const dispatchRow = `<div class="agent-input-row">
    <textarea spellcheck="true" class="agent-task-input" id="agent-task-${esc(p.id)}" rows="1"
      placeholder="Describe a task for the agent... (paste screenshots here)"
      onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey)){event.preventDefault();dispatchAgent('${esc(p.id)}')}"
      onpaste="handleAgentPaste(event,'${esc(p.id)}')"
    ></textarea>
    <button class="btn-dispatch" onclick="dispatchAgent('${esc(p.id)}')">Dispatch</button>
  </div>
  ${dispatchPreviews}`;

  // Active tab content
  let tabContent = '';
  if (activeSession && activeSessionId) {
    const outputLines = (() => {
      const buf = (agentOutputBuffers[activeSessionId] || []).flatMap(l => l.split('\n'));
      let result = '';
      let tableLines = [];
      let planBlock = '';   // accumulates non-tool lines for plan detection
      let planRawLines = []; // raw text for plan viewer
      function flushTable() {
        if (tableLines.length === 0) return;
        if (isPipeTable(tableLines)) {
          planBlock += `<div class="hl-table">${buildPipeTable(tableLines)}</div>`;
        } else {
          planBlock += `<div class="hl-table-pre">${tableLines.map(l => formatTableLine(esc(l))).join('\n')}</div>`;
        }
        tableLines = [];
      }
      for (const line of buf) {
        // Plan detection: when ExitPlanMode is hit, collapse prior non-tool lines
        if (line.trim() === '[tool: ExitPlanMode]') {
          flushTable();
          if (planRawLines.length >= 2) {
            planViewerContent[activeSessionId] = planRawLines;
            result += `<button class="plan-show-btn" onclick="openPlanViewer('${esc(activeSessionId)}')">&#128196; Show Plan</button>`;
            result += `<div class="plan-hidden-block">${planBlock}</div>`;
          } else {
            result += planBlock;
          }
          planBlock = ''; planRawLines = [];
          const cls = agentLineCls(line);
          result += `<div class="${cls}">${esc(line)}</div>`;
          continue;
        }
        if (isTableLine(line)) {
          tableLines.push(line);
          planRawLines.push(line);
        } else if (tableLines.length > 0 && line.trim() === '') {
          tableLines.push(line);
          planRawLines.push(line);
        } else {
          flushTable();
          const cls = agentLineCls(line);
          const html = cls.includes('agent-line-tool') || cls.includes('agent-line-error') || cls.includes('agent-line-followup') || cls.includes('agent-line-queued') || cls.includes('agent-line-prompt')
            ? esc(line) : formatAgentText(line);
          const div = `<div class="${cls}">${html}</div>`;
          // Tool lines reset plan block accumulator
          if (cls.includes('agent-line-tool') || cls.includes('agent-line-prompt')) {
            result += planBlock + div;
            planBlock = ''; planRawLines = [];
          } else {
            planBlock += div;
            planRawLines.push(line);
          }
        }
      }
      flushTable();
      result += planBlock; // flush any remaining non-plan text
      return result;
    })();

    const stopBtn = isRunning
      ? `<button class="btn-stop" onclick="stopAgent('${esc(p.id)}','${esc(activeSessionId)}')">Stop</button>` : '';

    const followupPreviews = renderAgentImagePreviews('fu_' + activeSessionId);
    const chatInput = (st === 'running' || st === 'completed' || st === 'stopped')
      ? `<div class="agent-chat-input">
          ${followupPreviews}
          <div class="agent-chat-input-row">
            <textarea spellcheck="true" class="agent-task-input" id="agent-followup-${esc(activeSessionId)}" rows="1"
              placeholder="Send follow-up... (paste screenshots here)"
              onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey)){event.preventDefault();sendFollowup('${esc(p.id)}','${esc(activeSessionId)}')}"
              onpaste="handleAgentPaste(event,'fu_${esc(activeSessionId)}')"
            ></textarea>
            <button class="btn-dispatch" onclick="sendFollowup('${esc(p.id)}','${esc(activeSessionId)}')">Send</button>
          </div>
        </div>` : '';

    const planFileBtn = activeSession && activeSession.planFile
      ? (() => {
          const fname = activeSession.planFile.split(/[/\\]/).pop();
          return `<button class="btn-plan-file" onclick="openPlanFileViewer('${esc(p.id)}','${esc(activeSessionId)}')" title="Open ${esc(fname)}">&#128196; ${esc(fname)}</button>`;
        })()
      : '';
    tabContent = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span class="agent-status-dot ${st}"></span>
        <span class="agent-status-label ${st}">${st}</span>
        ${stopBtn}
        <span class="agent-activity" id="agent-activity-${esc(activeSessionId)}"></span>
        <span id="plan-file-btn-${esc(activeSessionId)}">${planFileBtn}</span>
        <button class="btn-popout" onclick="openPlanViewer('${esc(activeSessionId)}')" title="Open output in viewer window">Pop Out &#8599;</button>
      </div>
      <div class="agent-chat">
        <div class="agent-chat-resize"></div>
        <div class="agent-output" id="agent-output-${esc(activeSessionId)}">${outputLines}</div>
        ${chatInput}
      </div>`;
  }

  return `<div class="agent-panel">
    <div class="agent-panel-header">
      <div class="section-title" style="margin-bottom:0">Agent</div>
    </div>
    ${tabBar}
    ${tabContent}
    ${dispatchRow}
  </div>`;
}

function switchAgentTab(projectId, sessionId) {
  activeAgentTab[projectId] = sessionId;
  refreshModal();
}

function newAgentTab(projectId) {
  // Clear active tab so the panel shows just the dispatch input
  delete activeAgentTab[projectId];
  refreshModal();
  setTimeout(() => document.getElementById(`agent-task-${projectId}`)?.focus(), 50);
}

function closeAgentTab(projectId, sessionId) {
  // Close EventSource immediately
  if (agentEventSources[sessionId]) {
    agentEventSources[sessionId].close();
    delete agentEventSources[sessionId];
  }

  // Kill process + remove session from backend
  fetch(API_BASE + `/api/project/${projectId}/agent/session`, {
    method: 'DELETE',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session_id: sessionId })
  }).catch(() => {});

  // Remove from frontend state
  delete agentStatusCache[sessionId];
  delete agentOutputBuffers[sessionId];
  agentHistory = agentHistory.filter(h => h.sessionId !== sessionId);
  acOpenSessions.delete(sessionId);

  // Switch to next available tab
  const remaining = getProjectSessions(projectId);
  if (remaining.length > 0) {
    activeAgentTab[projectId] = remaining[0].sessionId;
  } else {
    delete activeAgentTab[projectId];
  }
  refreshModal();
  renderAgentConsole();
}

async function dispatchAgent(projectId) {
  const input = document.getElementById(`agent-task-${projectId}`);
  const task = input.value.trim();
  if (!task) { input.focus(); return; }
  input.value = '';

  // Upload any pasted images and build final task
  const imagePaths = await uploadAgentImages(projectId);
  const fullTask = buildTaskWithImages(task, imagePaths);
  clearAgentImages(projectId);

  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/agent/dispatch`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ task: fullTask })
    });
    const data = await res.json();
    if (!data.ok) { alert(data.error || 'Dispatch failed'); return; }
    const sessionId = data.session_id;
    const pName = (allProjects.find(x => x.id === projectId) || {}).name || projectId;

    agentOutputBuffers[sessionId] = [`> ${task}`];
    agentStatusCache[sessionId] = { status: 'running', task, projectId, startedAt: new Date().toISOString() };
    agentHistory.unshift({ projectId, sessionId, projectName: pName, task, status: 'running', startedAt: new Date().toISOString() });
    activeAgentTab[projectId] = sessionId;

    refreshModal();
    renderAgentConsole();
    connectAgentStream(projectId, sessionId);
  } catch(e) {
    alert('Failed to dispatch: ' + e.message);
  }
}

function connectAgentStream(projectId, sessionId) {
  if (agentEventSources[sessionId]) {
    agentEventSources[sessionId].close();
  }

  const es = new EventSource(API_BASE + `/api/project/${projectId}/agent/stream?session=${sessionId}`);
  agentEventSources[sessionId] = es;

  es.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'output') {
        sseRetryCount[sessionId] = 0;  // successful data — reset retry counter
        if (!agentOutputBuffers[sessionId]) agentOutputBuffers[sessionId] = [];
        agentOutputBuffers[sessionId].push(msg.text);
        appendAgentLine(sessionId, msg.text);
        updateConsoleOutput(sessionId);
        // Update live activity ticker for tool lines
        if (msg.text && msg.text.startsWith('[tool:')) {
          for (const id of [`agent-activity-${sessionId}`, `ac-activity-${sessionId}`]) {
            const el = document.getElementById(id);
            if (el) el.textContent = msg.text;
          }
        } else if (msg.text && !msg.text.startsWith('[') && !msg.text.startsWith('\n---')) {
          // Text output — clear activity (agent is now responding)
          for (const id of [`agent-activity-${sessionId}`, `ac-activity-${sessionId}`]) {
            const el = document.getElementById(id);
            if (el) el.textContent = '';
          }
        }
      } else if (msg.type === 'status') {
        if (agentStatusCache[sessionId]) agentStatusCache[sessionId].status = msg.status;
        updateHistoryStatus(sessionId, msg.status);
        es.close();
        delete agentEventSources[sessionId];
        delete sseRetryCount[sessionId];
        delete agentLogCache[projectId];  // invalidate so fresh data (with claude_session_id) loads
        if (agentLogOpen[projectId]) loadAgentLog(projectId);  // re-fetch if panel is open
        refreshModal();
        renderAgentConsole();
        refreshSilent();
      } else if (msg.type === 'error') {
        if (agentStatusCache[sessionId]) agentStatusCache[sessionId].status = 'error';
        updateHistoryStatus(sessionId, 'error');
        es.close();
        delete agentEventSources[sessionId];
        delete sseRetryCount[sessionId];
        delete agentLogCache[projectId];  // invalidate so fresh data loads
        if (agentLogOpen[projectId]) loadAgentLog(projectId);  // re-fetch if panel is open
        refreshModal();
        renderAgentConsole();
      }
    } catch(e) {}
  };

  es.onerror = () => {
    es.close();
    delete agentEventSources[sessionId];
    const cached = agentStatusCache[sessionId];
    if (cached && cached.status === 'running') {
      const retries = (sseRetryCount[sessionId] || 0) + 1;
      sseRetryCount[sessionId] = retries;
      if (retries <= 3) {
        // Retry with increasing delay
        setTimeout(() => connectAgentStream(projectId, sessionId), retries * 2000);
      } else {
        // Too many retries — server likely lost the session
        cached.status = 'error';
        const hist = agentHistory.find(h => h.sessionId === sessionId);
        if (hist) hist.status = 'error';
        delete sseRetryCount[sessionId];
        refreshModal();
        renderAgentConsole();
        refreshSilent();
      }
    }
  };
}

// ── Rich text formatting for agent output ────────────────────────────────────
function formatAgentText(raw) {
  // Already escaped by esc() before calling — we operate on safe HTML
  let t = esc(raw);

  // Code fence blocks (``` ... ```)
  if (t.match(/^```/)) {
    return `<span class="hl-codeblock">${t.replace(/^```\w*/, '').replace(/```$/, '')}</span>`;
  }

  // Markdown headers: ## Heading, ### Heading
  if (t.match(/^#{1,4}\s/)) {
    return `<span class="hl-h">${t}</span>`;
  }

  // Numbered list items: 1. item, 2. item
  t = t.replace(/^(\d+\.)\s/, '<span class="hl-num">$1</span> ');

  // Bullet points: - item, * item
  t = t.replace(/^([-*])\s/, '<span class="hl-bullet">$1</span> ');

  // Inline code: `something`
  t = t.replace(/`([^`]+)`/g, '<span class="hl-code">$1</span>');

  // Bold: **text**
  t = t.replace(/\*\*([^*]+)\*\*/g, '<span class="hl-bold">$1</span>');

  // File paths: word.ext patterns (common code file extensions)
  t = t.replace(/(?<![&\w])([A-Za-z_][\w.-]*\.(py|js|ts|tsx|jsx|html|css|json|md|yml|yaml|toml|rs|go|java|c|cpp|h|sh|sql|vue|svelte|rb|php))(?![&\w])/g,
    '<span class="hl-path">$1</span>');

  // Absolute paths: /path/to/file or C:\path\to\file
  t = t.replace(/((?:\/[\w.-]+){2,}|(?:[A-Z]:\\[\w.-\\]+))/g, '<span class="hl-path">$1</span>');

  // URLs
  t = t.replace(/(https?:\/\/[^\s<]+)/g, '<span class="hl-url">$1</span>');

  return t;
}

function isTableLine(text) {
  // Pipe-delimited table row: | col1 | col2 | or starts/ends with pipe
  if (/^\s*\|.*\|/.test(text)) return true;
  // Separator lines: +---+---+, +===+===+, |---|---|
  if (/^\s*[+|][-=]+[+|]/.test(text)) return true;
  // Unicode box drawing: ┌─┬─┐, ├─┼─┤, └─┴─┘, │ etc
  if (/[┌┐└┘├┤┬┴┼─│═║╔╗╚╝╠╣╦╩╬]/.test(text)) return true;
  return false;
}

function formatTableLine(escaped) {
  // Colorize pipes and border characters (for box-drawing / non-pipe tables)
  return escaped
    .replace(/([│|])/g, '<span class="table-pipe">$1</span>')
    .replace(/([┌┐└┘├┤┬┴┼─═║╔╗╚╝╠╣╦╩╬+])/g, '<span class="table-border">$1</span>');
}

function isPipeTable(lines) {
  // True if at least one line has pipe-delimited columns (not just box-drawing)
  return lines.some(l => /^\s*\|[^┌┐└┘├┤┬┴┼─│═║╔╗╚╝╠╣╦╩╬]*\|/.test(l));
}

function isSeparatorLine(text) {
  return /^\s*\|?[-=|:+\s]+\|?\s*$/.test(text) && /[-=]{2,}/.test(text);
}

function buildPipeTable(rawLines) {
  // Parse pipe-delimited lines into HTML <table>
  const dataRows = [];
  let headerIdx = -1;
  for (let i = 0; i < rawLines.length; i++) {
    const line = rawLines[i].trim();
    if (!line) continue;
    if (isSeparatorLine(line)) {
      // The row before the first separator is the header
      if (headerIdx < 0 && dataRows.length > 0) headerIdx = dataRows.length - 1;
      continue;
    }
    // Split by pipe, trim each cell
    const cells = line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
    dataRows.push(cells);
  }
  if (dataRows.length === 0) return '';
  // If we found a header separator, first row is header
  const hasHeader = headerIdx === 0;
  let html = '<table>';
  dataRows.forEach((cells, i) => {
    const tag = (hasHeader && i === 0) ? 'th' : 'td';
    html += '<tr>' + cells.map(c => `<${tag}>${esc(c)}</${tag}>`).join('') + '</tr>';
  });
  html += '</table>';
  return html;
}

function agentLineCls(text) {
  const t = text.trim();
  if (t.startsWith('> [queued]')) return 'agent-line agent-line-queued';
  if (t.startsWith('> ')) return 'agent-line agent-line-prompt';
  if (t.startsWith('[tool:')) return 'agent-line agent-line-tool';
  if (t.startsWith('[') && t.endsWith(']')) return 'agent-line agent-line-status';
  if (t.startsWith('[exited') || t.startsWith('[stream error')) return 'agent-line agent-line-error';
  return 'agent-line';
}

function collapseIntoPlanButton(sessionId, container) {
  // Walk backwards from end, collecting non-tool text lines until we hit a [tool:] line
  const children = Array.from(container.children);
  const planLines = [];
  const planElements = [];

  for (let i = children.length - 1; i >= 0; i--) {
    const child = children[i];
    const txt = (child.textContent || '').trim();
    // Stop at tool lines, prompt lines, or existing plan buttons
    if (child.classList.contains('agent-line-tool') ||
        child.classList.contains('agent-line-prompt') ||
        child.classList.contains('plan-show-btn')) break;
    // Skip the ExitPlanMode tool line itself (already handled above)
    if (txt === '[tool: ExitPlanMode]') continue;
    planLines.unshift(child.textContent || child.innerText || '');
    planElements.unshift(child);
  }

  if (planLines.length < 2) return; // Too few lines, not a real plan

  // Store plan content
  planViewerContent[sessionId] = planLines;

  // Wrap plan elements in a hidden container
  const wrapper = document.createElement('div');
  wrapper.className = 'plan-hidden-block';
  wrapper.dataset.sessionId = sessionId;
  const insertBefore = planElements[0];
  container.insertBefore(wrapper, insertBefore);
  for (const el of planElements) wrapper.appendChild(el);

  // Insert "Show Plan" button before the hidden block
  const btn = document.createElement('button');
  btn.className = 'plan-show-btn';
  btn.innerHTML = '&#128196; Show Plan';
  btn.onclick = () => openPlanViewer(sessionId);
  container.insertBefore(btn, wrapper);
}

function appendAgentLine(sessionId, text) {
  const el = document.getElementById(`agent-output-${sessionId}`);
  if (!el) return;
  el.style.display = 'block';

  // Split multi-line text blocks into individual lines
  if (text.includes('\n')) {
    for (const line of text.split('\n')) {
      appendAgentLine(sessionId, line);
    }
    return;
  }

  // Group consecutive table lines into a single styled block
  if (isTableLine(text)) {
    let block = el.lastElementChild;
    if (block && (block.classList.contains('hl-table') || block.classList.contains('hl-table-pre'))) {
      block._rawLines.push(text);
    } else {
      block = document.createElement('div');
      block._rawLines = [text];
      el.appendChild(block);
    }
    // Rebuild: pipe tables get <table>, box-drawing stays pre-formatted
    if (isPipeTable(block._rawLines)) {
      block.className = 'hl-table';
      block.innerHTML = buildPipeTable(block._rawLines);
    } else {
      block.className = 'hl-table-pre';
      block.innerHTML = block._rawLines.map(l => formatTableLine(esc(l))).join('\n');
    }
    el.scrollTop = el.scrollHeight;
    return;
  }
  // Blank lines inside a table: keep them in the table block
  if (text.trim() === '') {
    const last = el.lastElementChild;
    if (last && (last.classList.contains('hl-table') || last.classList.contains('hl-table-pre'))) {
      last._rawLines.push(text);
      el.scrollTop = el.scrollHeight;
      return;
    }
  }

  const div = document.createElement('div');
  const cls = agentLineCls(text);
  div.className = cls;
  // Use rich formatting for regular text lines, plain for special lines
  if (cls.includes('agent-line-tool') || cls.includes('agent-line-error') || cls.includes('agent-line-followup') || cls.includes('agent-line-queued') || cls.includes('agent-line-prompt')) {
    div.textContent = text;
  } else {
    div.innerHTML = formatAgentText(text);
  }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;

  // Plan detection: [tool: ExitPlanMode] signals end of plan
  if (text.trim() === '[tool: ExitPlanMode]') {
    collapseIntoPlanButton(sessionId, el);
    // Check for plan file and inject button
    const cached = agentStatusCache[sessionId];
    if (cached && cached.projectId) {
      fetch(API_BASE + `/api/project/${cached.projectId}/agent/status`)
        .then(r => r.json())
        .then(data => {
          const s = (data.sessions || []).find(x => x.session_id === sessionId);
          if (s && s.plan_file) {
            cached.planFile = s.plan_file;
            const container = document.getElementById(`plan-file-btn-${sessionId}`);
            if (container && !container.innerHTML.trim()) {
              const fname = s.plan_file.split(/[/\\]/).pop();
              container.innerHTML = `<button class="btn-plan-file" onclick="openPlanFileViewer('${esc(cached.projectId)}','${esc(sessionId)}')" title="Open ${esc(fname)}">&#128196; ${esc(fname)}</button>`;
            }
          }
        }).catch(() => {});
    }
  }
}

async function sendFollowup(projectId, sessionId) {
  const input = document.getElementById(`agent-followup-${sessionId}`);
  const message = input.value.trim();
  if (!message) { input.focus(); return; }
  input.value = '';

  // Upload any pasted images and build final message
  const imageKey = 'fu_' + sessionId;
  const imagePaths = await uploadAgentImages(imageKey);
  const fullMessage = buildTaskWithImages(message, imagePaths);
  clearAgentImages(imageKey);

  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/agent/followup`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: fullMessage, session_id: sessionId })
    });
    const data = await res.json();
    if (!data.ok) { alert(data.error || 'Follow-up failed'); return; }
    if (data.queued) {
      // Follow-up queued — will be sent after current task completes
      // SSE is still connected and will stream the queued confirmation
      return;
    }
    if (agentStatusCache[sessionId]) agentStatusCache[sessionId].status = 'running';
    updateHistoryStatus(sessionId, 'running');
    refreshModal();
    renderAgentConsole();
    connectAgentStream(projectId, sessionId);
  } catch(e) {
    alert('Failed to send follow-up: ' + e.message);
  }
}

async function stopAgent(projectId, sessionId) {
  try {
    await fetch(API_BASE + `/api/project/${projectId}/agent/stop`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session_id: sessionId })
    });
    if (agentStatusCache[sessionId]) agentStatusCache[sessionId].status = 'stopped';
    updateHistoryStatus(sessionId, 'stopped');
    if (agentEventSources[sessionId]) {
      agentEventSources[sessionId].close();
      delete agentEventSources[sessionId];
    }
    refreshModal();
    renderAgentConsole();
    refreshSilent();
  } catch(e) {}
}

// Fetch all agent sessions for a project on modal open / page boot
async function fetchAgentStatus(projectId) {
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/agent/status`);
    const data = await res.json();
    const sessions = data.sessions || [];
    const pName = (allProjects.find(x => x.id === projectId) || {}).name || projectId;

    for (const s of sessions) {
      const sid = s.session_id;
      agentStatusCache[sid] = { status: s.status, task: s.task, projectId, startedAt: s.started_at, planFile: s.plan_file || '' };
      if (s.log_lines && s.log_lines.length > 0) {
        agentOutputBuffers[sid] = s.log_lines;
      }
      if (!agentHistory.find(h => h.sessionId === sid)) {
        agentHistory.unshift({ projectId, sessionId: sid, projectName: pName, task: s.task || '', status: s.status, startedAt: s.started_at || '' });
      }
      if (s.status === 'running') {
        connectAgentStream(projectId, sid);
      }
    }
    // Set active tab to most recent running, or first session
    if (sessions.length > 0 && !activeAgentTab[projectId]) {
      const running = sessions.find(s => s.status === 'running');
      activeAgentTab[projectId] = running ? running.session_id : sessions[0].session_id;
    }
    if (sessions.length > 0) renderAgentConsole();
  } catch(e) {}
}
