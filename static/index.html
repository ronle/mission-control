    return;
  }

  // Get content: prefer specific plan content, fall back to full output buffer
  const lines = planViewerContent[sessionId] || agentOutputBuffers[sessionId] || [];
  const usingFullBuffer = !planViewerContent[sessionId];

  // Determine title from session info
  const cached = agentStatusCache[sessionId];
  const taskTitle = cached ? (cached.task || '').substring(0, 80) : 'Agent Output';

  // Render lines with rich formatting (same logic as outputLines builder)
  const flatLines = lines.flatMap(l => l.trimStart().startsWith('> ') ? [l] : l.split('\n'));
  let bodyHTML = '';
  let tableLines = [];
  function flushTable() {
    if (tableLines.length === 0) return;
    if (isPipeTable(tableLines)) {
      bodyHTML += `<div class="hl-table">${buildPipeTable(tableLines)}</div>`;
    } else {
      bodyHTML += `<div class="hl-table-pre">${tableLines.map(l => formatTableLine(esc(l))).join('\n')}</div>`;
    }
    tableLines = [];
  }
  for (const line of flatLines) {
    if (isTableLine(line)) {
      tableLines.push(line);
    } else if (tableLines.length > 0 && line.trim() === '') {
      tableLines.push(line);
    } else {
      flushTable();
      const cls = agentLineCls(line);
      const html = cls.includes('agent-line-tool') || cls.includes('agent-line-error') || cls.includes('agent-line-followup') || cls.includes('agent-line-queued') || cls.includes('agent-line-prompt')
        ? esc(line) : formatAgentText(line);
      bodyHTML += `<div class="${cls}">${html}</div>`;

  const headerLabel = usingFullBuffer ? 'Agent Output' : 'Plan Viewer';

  const win = document.createElement('div');

  const z = nextModalZ++;

  openModals.set(modalId, { projectId: null, element: win, minimized: false, zIndex: z });
  centerModalElement(win);
  focusModal(modalId);
}

        placeholder="Send input to process..."

function initTerminalXterm(sessionId) {
  const container = document.getElementById(`terminal-container-${sessionId}`);
  if (!container || terminalInstances[sessionId]) return;

  const term = new Terminal({
    theme: {
      background: '#0a0c10',
      foreground: '#e2e8f0',
      cursor: '#4da6ff',
      selectionBackground: '#3d4460',
      black: '#0f1117',
      red: '#f87171',
      green: '#34d399',
      yellow: '#fbbf24',
      blue: '#4da6ff',
      magenta: '#a78bfa',
      cyan: '#22d3ee',
      white: '#f1f5f9',
    },
    fontFamily: "'JetBrains Mono', monospace",
    fontSize: 12,
    lineHeight: 1.4,
    cursorBlink: false,
    disableStdin: true,
    convertEol: false,
    scrollback: 5000,
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(container);
  fitAddon.fit();

  terminalInstances[sessionId] = term;
  terminalInstances[sessionId]._fitAddon = fitAddon;

  // Re-fit on container resize
  new ResizeObserver(() => {
    try { fitAddon.fit(); } catch {}
  }).observe(container);

  // Write any buffered output
  const buf = terminalOutputBuffers[sessionId] || [];
  for (const line of buf) {
    term.write(line);
  }
}

function connectTerminalStream(projectId, sessionId) {
  if (terminalEventSources[sessionId]) {
    terminalEventSources[sessionId].close();
  }

  const since = terminalOutputCount[sessionId] || 0;
  const es = new EventSource(API_BASE + `/api/terminal/stream?session=${sessionId}&since=${since}`);
  terminalEventSources[sessionId] = es;

  es.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'output') {
        if (!terminalOutputBuffers[sessionId]) terminalOutputBuffers[sessionId] = [];
        terminalOutputBuffers[sessionId].push(msg.text);
        terminalOutputCount[sessionId] = (terminalOutputCount[sessionId] || 0) + 1;
        // Cap buffer
        if (terminalOutputBuffers[sessionId].length > 5000) {
          terminalOutputBuffers[sessionId] = terminalOutputBuffers[sessionId].slice(-3000);
        }
        const term = terminalInstances[sessionId];
        if (term) term.write(msg.text);
      } else if (msg.type === 'status') {
        const term = terminalInstances[sessionId];
        if (term) {
          term.writeln(`\r\n\x1b[90m[Process ${msg.status} — exit code ${msg.exit_code}]\x1b[0m`);
        }
        // Update status dot and hide stop button
        const dot = document.getElementById(`term-dot-${sessionId}`);
        if (dot) { dot.className = `terminal-status-dot ${msg.status}`; }
        const stopBtn = document.getElementById(`term-stop-${sessionId}`);
        if (stopBtn) stopBtn.style.display = 'none';
        es.close();
        delete terminalEventSources[sessionId];
      } else if (msg.type === 'error') {
        // Session doesn't exist on server — close the pop-out
        es.close();
        delete terminalEventSources[sessionId];
        terminalDismissed.add(sessionId);
        const modalId = `__terminal_${sessionId}`;
        if (openModals.has(modalId)) closeModalById(modalId);
      }
    } catch {}
  };

  es.onerror = () => {
    es.close();
    delete terminalEventSources[sessionId];
  };
}

async function sendTerminalInput(sessionId) {
  const input = document.getElementById(`terminal-stdin-${sessionId}`);
  if (!input) return;
  const text = input.value;
  input.value = '';

  // Echo the input in cyan
  const term = terminalInstances[sessionId];
  if (term) term.writeln(`\x1b[36m${text}\x1b[0m`);

  await fetch(API_BASE + `/api/terminal/stdin`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session_id: sessionId, text: text + '\n' })
  }).catch(() => {});
}

async function stopTerminal(sessionId) {
  await fetch(API_BASE + `/api/terminal/stop`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session_id: sessionId })
  }).catch(() => {});

  if (terminalEventSources[sessionId]) {
    terminalEventSources[sessionId].close();
    delete terminalEventSources[sessionId];
  }
  const dot = document.getElementById(`term-dot-${sessionId}`);
  if (dot) dot.className = 'terminal-status-dot stopped';
  const stopBtn = document.getElementById(`term-stop-${sessionId}`);
  if (stopBtn) stopBtn.style.display = 'none';
}

async function fetchTerminalStatus(projectId) {
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/terminal/status`);
    const data = await res.json();
    const sessions = data.sessions || [];
    for (const s of sessions) {
      const modalId = `__terminal_${s.session_id}`;
      if (s.status === 'running' && !openModals.has(modalId)) {
        // Restore buffer and open pop-out
        terminalOutputBuffers[s.session_id] = s.output_lines || [];
        terminalOutputCount[s.session_id] = (s.output_lines || []).length;
        openTerminalPopout(projectId, s.session_id, s.command);
      }
    }
  } catch {}
}

// Clean up xterm instance when terminal modal is closed
function cleanupTerminalModal(modalId) {
  const match = modalId.match(/^__terminal_(.+)$/);
  if (!match) return;
  const sessionId = match[1];
  // Mark as dismissed so replayed markers don't reopen it
  terminalDismissed.add(sessionId);
  // Close SSE
  if (terminalEventSources[sessionId]) {
    terminalEventSources[sessionId].close();
    delete terminalEventSources[sessionId];
  }
  if (terminalInstances[sessionId]) {
    terminalInstances[sessionId].dispose();
    delete terminalInstances[sessionId];
  }
  delete terminalOutputBuffers[sessionId];
  delete terminalOutputCount[sessionId];
  // Tell server to remove the session entirely (kills process if still running)
  fetch(API_BASE + `/api/terminal/delete`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session_id: sessionId })
  }).catch(() => {});
}

async function refreshScheduleList() {
  const container = document.getElementById('schedule-list');
  if (!container) return;

      const desc = scheduleDescription(s);
      const lastRun = s.last_run ? timeAgoShort(s.last_run) : 'never';
      const nextRun = s.next_run ? formatScheduleTime(s.next_run) : (s.enabled ? 'calculating...' : 'disabled');
      return `<div class="schedule-card${cardClass}">
        <div class="schedule-card-body">

        </div>

    container.innerHTML = '<div class="schedule-empty">Failed to load schedules.</div>';
  }

function scheduleDescription(s) {
  const type = s.schedule_type;
  if (type === 'once') {
    return s.run_at ? 'Once at ' + formatScheduleTime(s.run_at) : 'Once (no time set)';
  } else if (type === 'daily') {
    const dayNames = ['', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const days = (s.days || []).map(d => dayNames[d] || '?').join(', ');
    return 'Daily at ' + (s.time || '09:00') + (days ? ' (' + days + ')' : '');
  } else if (type === 'interval') {
    const mins = s.interval_minutes || 60;
    if (mins >= 60 && mins % 60 === 0) return `Every ${mins / 60}h`;
    return `Every ${mins}m`;
  } else if (type === 'cron') {
    return 'Cron: ' + (s.cron_expr || '?');
  }
  return type;
}

function formatScheduleTime(isoStr) {
  if (!isoStr) return '—';
  try {
    const d = new Date(isoStr);
    const now = new Date();
    const diffMs = d - now;
    const diffMin = Math.round(diffMs / 60000);
    if (diffMin >= 0 && diffMin < 60) return `in ${diffMin}m`;
    if (diffMin >= 60 && diffMin < 1440) return `in ${Math.round(diffMin / 60)}h`;
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch(e) { return isoStr.slice(0, 16); }
}

function timeAgoShort(isoStr) {
  if (!isoStr) return 'never';
  try {
    const d = new Date(isoStr);
    const secs = Math.round((Date.now() - d) / 1000);
    if (secs < 60) return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
    return `${Math.floor(secs/86400)}d ago`;
  } catch(e) { return isoStr; }
}

function showScheduleForm(existing) {

  const selDays = existing ? (existing.days || []) : [1,2,3,4,5];
  const selInterval = existing ? (existing.interval_minutes || 60) : 60;
  const selTask = existing ? existing.task : '';
  const selRunAt = existing ? (existing.run_at || '').slice(0, 16) : '';
  const selCron = existing ? (existing.cron_expr || '') : '';

  area.innerHTML = `<div class="schedule-form">
    <label>Project</label>
    <select id="sched-project">${projects.map(p =>
      `<option value="${esc(p.id)}"${p.id === selPid ? ' selected' : ''}>${esc(p.name)}</option>`

    <label>Schedule Type</label>

      <button class="sched-type-btn${selType==='daily'?' active':''}" onclick="setSchedType('daily')">Daily</button>
      <button class="sched-type-btn${selType==='interval'?' active':''}" onclick="setSchedType('interval')">Interval</button>
      <button class="sched-type-btn${selType==='once'?' active':''}" onclick="setSchedType('once')">Once</button>

function hideScheduleForm() {
  const area = document.getElementById('schedule-form-area');
  if (area) area.innerHTML = '';

}

function setSchedType(type) {
  document.querySelectorAll('.sched-type-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === type));
  renderSchedTypeFields(type);
}

function renderSchedTypeFields(type, vals) {
  const container = document.getElementById('sched-type-fields');
  if (!container) return;
  const time = vals?.time || '09:00';
  const days = vals?.days || [1,2,3,4,5];
  const interval = vals?.interval_minutes || 60;
  const runAt = vals?.run_at || '';
  const cronExpr = vals?.cron_expr || '';

  if (type === 'daily') {
    const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    container.innerHTML = `
      <label>Time (UTC)</label>
      <input type="time" id="sched-time" value="${time}">
      <label>Days</label>
      <div class="sched-days">
        ${dayLabels.map((label, i) => {
          const dayNum = i + 1;
          return `<button class="sched-day-btn${days.includes(dayNum)?' active':''}" data-day="${dayNum}" onclick="this.classList.toggle('active')">${label}</button>`;
        }).join('')}
      </div>`;
  } else if (type === 'interval') {
    container.innerHTML = `
      <label>Interval (minutes)</label>
      <input type="number" id="sched-interval" value="${interval}" min="1" step="1">`;
  } else if (type === 'once') {
    container.innerHTML = `
      <label>Run At</label>
      <input type="datetime-local" id="sched-runat" value="${runAt}">`;
  } else if (type === 'cron') {
    container.innerHTML = `
      <label>Cron Expression (UTC)</label>
      <input type="text" id="sched-cron" value="${esc(cronExpr)}" placeholder="*/15 * * * *" spellcheck="false" style="font-family:var(--mono)">
      <span class="memory-hint" style="margin:4px 0 0;font-size:10px">5 fields: minute hour day-of-month month day-of-week &mdash; e.g. <code>0 9 * * 1-5</code> = weekdays 9am UTC</span>`;
  }
}

async function saveSchedule() {
  const pid = document.getElementById('sched-project')?.value;
  const task = document.getElementById('sched-task')?.value?.trim();
  if (!pid || !task) { alert('Project and task are required'); return; }

  const activeType = document.querySelector('.sched-type-btn.active')?.textContent?.toLowerCase() || 'daily';
  const body = { project_id: pid, task, schedule_type: activeType };

  if (activeType === 'daily') {
    body.time = document.getElementById('sched-time')?.value || '09:00';
    body.days = [...document.querySelectorAll('.sched-day-btn.active')].map(b => parseInt(b.dataset.day));
  } else if (activeType === 'interval') {
    body.interval_minutes = parseInt(document.getElementById('sched-interval')?.value) || 60;
  } else if (activeType === 'once') {
    const val = document.getElementById('sched-runat')?.value;
    if (val) body.run_at = new Date(val).toISOString();
  } else if (activeType === 'cron') {
    const expr = document.getElementById('sched-cron')?.value?.trim();
    if (!expr || expr.split(/\s+/).length !== 5) { alert('Cron expression must have exactly 5 fields'); return; }
    body.cron_expr = expr;
  }

  try {
    const url = schedulerEditId ? `${API_BASE}/api/schedules/${schedulerEditId}` : `${API_BASE}/api/schedules`;
    const method = schedulerEditId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
    if (!res.ok) { const d = await res.json(); alert(d.error || 'Failed'); return; }
    hideScheduleForm();
    await refreshScheduleList();
    refreshScheduleBanner();
  } catch(e) { alert('Failed to save: ' + e.message); }
}

async function toggleScheduleEnabled(id, enabled) {

    await fetch(`${API_BASE}/api/schedules/${id}`, {
      method: 'PUT',

async function editSchedule(id) {
  try {

    const sched = schedules.find(s => s.id === id);
    if (sched) showScheduleForm(sched);

async function deleteSchedule(id) {
  if (!confirm('Delete this schedule?')) return;
  try {
    await fetch(`${API_BASE}/api/schedules/${id}`, { method: 'DELETE' });
    await refreshScheduleList();
    refreshScheduleBanner();
  } catch(e) {}
}

// ── Schedule Banner (upcoming jobs at top of page) ────────────────────────

async function refreshScheduleBanner() {
  const banner = document.getElementById('schedule-banner');
  if (!banner) return;
  try {
    const res = await fetch(API_BASE + '/api/schedules');
    const schedules = await res.json();
    const upcoming = schedules
      .filter(s => s.enabled && s.next_run)
      .sort((a, b) => (a.next_run || '').localeCompare(b.next_run || ''))
      .slice(0, 5);
    if (!upcoming.length) {
      banner.classList.add('hidden');
      return;
    }
    banner.classList.remove('hidden');
    banner.innerHTML = '<span class="schedule-banner-label">Upcoming</span>' +
      upcoming.map(s => {
        const desc = scheduleDescription(s);
        return `<span class="schedule-banner-item" onclick="openScheduler()" title="${esc(s.task)}">
          <span class="sb-project">${esc(s.project_name || s.project_id)}</span>
          <span class="sb-task">${esc(s.task.length > 40 ? s.task.slice(0, 40) + '...' : s.task)}</span>
          <span class="sb-time">${formatScheduleTime(s.next_run)}</span>
        </span>`;
      }).join('');
  } catch(e) {
    banner.classList.add('hidden');
  }
}

let folderBrowserPath = '';
let folderBrowserOpen = false;

function toggleFolderBrowser() {
  folderBrowserOpen = !folderBrowserOpen;
  const panel = document.getElementById('folder-browser');
  const btn = document.getElementById('browse-toggle-btn');
  if (folderBrowserOpen) {
    panel.style.display = 'block';
    btn.textContent = 'Hide';
    const startPath = (document.getElementById('new-proj-path').value || '').trim();
    loadDirectory(startPath || '');
  } else {
    panel.style.display = 'none';
    btn.textContent = 'Browse';
  }
}

async function loadDirectory(path) {
  const listing = document.getElementById('folder-listing');
  listing.innerHTML = '<div class="folder-loading">Loading...</div>';
  try {
    const res = await fetch(API_BASE + '/api/list-directory', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path: path || '' })
    });
    const data = await res.json();
    if (!res.ok) {
      listing.innerHTML = `<div class="folder-error">${esc(data.error)}</div>`;
      return;
    }
    folderBrowserPath = data.path;
    renderBreadcrumb(data.path, data.parent);
    if (data.dirs.length === 0) {
      listing.innerHTML = '<div class="folder-empty">No subdirectories</div>';
    } else {
      listing.innerHTML = data.dirs.map(name =>
        `<div class="folder-item" data-dir="${esc(name)}" title="${esc(name)}">
          <span class="folder-item-icon">&#128193;</span>
          <span class="folder-item-name">${esc(name)}</span>
        </div>`
      ).join('');
    }
    listing.onclick = function(e) {
      const item = e.target.closest('.folder-item');
      if (!item) return;
      loadDirectory(folderBrowserPath + '/' + item.dataset.dir);
    };
  } catch(e) {
    listing.innerHTML = `<div class="folder-error">Failed to load: ${esc(e.message)}</div>`;
  }
}

function renderBreadcrumb(currentPath, parentPath) {
  const bc = document.getElementById('folder-breadcrumb');
  const isWindows = currentPath.includes('\\');
  const parts = currentPath.split(/[/\\]/).filter(Boolean);
  let html = '';
  let accumulated = isWindows ? '' : '/';
  parts.forEach((part, i) => {
    if (i > 0) html += '<span class="folder-crumb-sep">&#9656;</span>';
    accumulated += (i > 0 ? '/' : '') + part;
    const segPath = accumulated;
    if (i === parts.length - 1) {
      html += `<span class="folder-crumb-current">${esc(part)}</span>`;
    } else {
      html += `<span class="folder-crumb" onclick="loadDirectory('${esc(segPath)}')">${esc(part)}</span>`;
    }
  });
  if (parentPath) {
    html = `<span class="folder-crumb" onclick="loadDirectory('${esc(parentPath)}')" title="Go up"
             style="font-size:14px;margin-right:4px">&#11176;</span>` + html;
  }
  bc.innerHTML = html;
}

function browseTo(path) {
  if (!folderBrowserOpen) toggleFolderBrowser();
  else loadDirectory(path);
}

function selectBrowsedFolder() {
  document.getElementById('new-proj-path').value = folderBrowserPath;
  toggleFolderBrowser();
}

async function createFolderInBrowser() {
  const folderInput = document.getElementById('new-proj-folder');
  const folderName = (folderInput.value || '').trim();
  if (!folderName) { alert('Enter a folder name'); return; }
  try {
    const res = await fetch(API_BASE + '/api/create-folder', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name: folderName, parent: folderBrowserPath })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Failed to create folder'); return; }
    folderInput.value = '';
    loadDirectory(data.path);
  } catch(e) { alert('Failed to create folder: ' + e.message); }
}

async function addNewProjDomainEntry(value) {
  const name = value.trim();
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
  if (!id) return;
  try {
    const res = await fetch(API_BASE + '/api/settings/domains/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ id, label: name })
    });
    const data = await res.json();
    if (!data.ok && data.error !== 'domain already exists') return;
    await fetchDomains();
    renderDomainFilters();
    newProjDomain = id;
    refreshNewProjDomainTrigger();
  } catch(err) {}
}

async function setNewProjDomainColor(e, color, bg) {
  e.stopPropagation();
  const domainId = newProjDomain;
  const domain = domainsList.find(d => d.id === domainId);
  if (!domain) return;
  domain.color = color;
  domain.bg = bg;
  try {
    await fetch(API_BASE + `/api/settings/domains/${domainId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ color, bg })
    });
    renderDomainFilters();
    refreshNewProjDomainTrigger();
    await refreshSilent();
  } catch(err) {}
}

async function createProject() {
  const id = document.getElementById('new-proj-id').value.trim();
  const name = document.getElementById('new-proj-name').value.trim();
  const domain = newProjDomain;
  const path = document.getElementById('new-proj-path').value.trim();
  if (!id || !name) { alert('Name and ID are required'); return; }
  if (allProjects.find(p => p.id === id)) { alert('A project with this ID already exists'); return; }
  try {
    const res = await fetch(API_BASE + `/api/project/${encodeURIComponent(id)}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, domain, status: 'active', project_path: path })
    });
    const data = await res.json();
    if (!data.ok) { alert(data.error || 'Failed to create project'); return; }

}

function _formatDuration(startedAt) {
  const ms = Date.now() - new Date(startedAt).getTime();
  const secs = Math.floor(ms / 1000);
  if (secs < 60) return secs + 's';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ' + (secs % 60) + 's';
  const hrs = Math.floor(mins / 60);
  return hrs + 'h ' + (mins % 60) + 'm';
}

async function refreshProcessList() {
  const container = document.getElementById('process-list');
  const countEl = document.getElementById('process-count');
  if (!container) return;
  try {
    const res = await fetch(API_BASE + '/api/processes');
    const processes = await res.json();
    const alive = processes.filter(p => p.alive).length;
    if (countEl) countEl.textContent = `${alive} running / ${processes.length} tracked`;
    if (!processes.length) {
      container.innerHTML = '<div class="process-empty">No tracked processes.</div>';
      return;
    }
    container.innerHTML = `<table class="process-table">
      <thead><tr>
        <th style="width:24px"></th>
        <th>PID</th>
        <th>Name</th>
        <th>Project</th>
        <th>Task / Command</th>
        <th>Duration</th>
        <th style="width:50px"></th>
      </tr></thead>
      <tbody>${processes.map(p => {
        const dotClass = p.alive ? 'alive' : (p.exit_code === 0 ? 'exited' : 'dead');
        const dur = _formatDuration(p.started_at);
        return `<tr>
          <td><span class="process-status-dot ${dotClass}" title="${p.alive ? 'Running' : 'Exited (' + p.exit_code + ')'}"></span></td>
          <td style="font-family:var(--mono);font-size:11px">${p.pid}</td>
          <td>${esc(p.name)}</td>
          <td>${esc(p.project_name || p.project_id || '\u2014')}</td>
          <td title="${esc(p.command_preview || '')}" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.command_preview || '\u2014')}</td>
          <td>${dur}</td>
          <td>${p.alive ? `<button class="btn-kill-process" onclick="killTrackedProcess(${p.pid})">Kill</button>` : ''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  } catch(e) {
    container.innerHTML = '<div class="process-empty">Failed to load processes.</div>';
  }
}

async function killTrackedProcess(pid) {
  if (!confirm('Kill process ' + pid + '?')) return;
  try {
    const res = await fetch(API_BASE + '/api/processes/' + pid + '/kill', { method: 'POST' });
    const data = await res.json();
    if (data.error) showToast(data.error, 4000);
    else showToast('Process ' + pid + ' killed');
  } catch(e) {
    showToast('Failed to kill process: ' + e.message, 4000);
  }
  refreshProcessList();
}

async function cleanupOrphanedProcesses() {
  try {
    const res = await fetch(API_BASE + '/api/processes/cleanup', { method: 'POST' });
    const data = await res.json();
    showToast('Cleaned up ' + (data.killed || 0) + ' orphaned process(es)');
  } catch(e) {
    showToast('Cleanup failed: ' + e.message, 4000);
  }
  refreshProcessList();
}

async function wtShow(idx) {
  wtStep = idx;
  const step = WT_STEPS[idx];
  if (!step) { wtEnd(); return; }

  if (step.onEnter) await step.onEnter();

  // Remove old overlay
  const old = document.getElementById('wt-overlay');
  if (old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'wt-overlay';
  overlay.className = 'wt-overlay';

  const backdrop = document.createElement('div');
  backdrop.className = 'wt-backdrop';
  backdrop.onclick = () => {}; // block clicks
  overlay.appendChild(backdrop);

  // Remove previous elevation
  document.querySelectorAll('.wt-elevated').forEach(el => el.classList.remove('wt-elevated'));

  let targetEl = step.target ? document.querySelector(step.target) : null;

  // Inject virtual demo element if step uses one
  if (step.demo) {
    const demo = document.createElement('div');
    demo.className = 'wt-demo';
    demo.style.cssText = 'position:fixed;z-index:2001;pointer-events:none;';

    if (step.demo === 'tile') {
      demo.innerHTML = wtDemoTileHTML();
      // Center the tile in the upper-left area
      demo.style.left = '80px';
      demo.style.top = '180px';
      overlay.appendChild(demo);
      targetEl = demo.firstElementChild;
    } else if (step.demo === 'modal-menu') {
      demo.innerHTML = wtDemoMenuHTML();
      demo.style.left = `${Math.max(40, (window.innerWidth - 700) / 2)}px`;
      demo.style.top = `${Math.max(40, (window.innerHeight - 520) / 2)}px`;
      overlay.appendChild(demo);
      if (step.demoTarget) {
        const subEl = demo.querySelector(step.demoTarget);
        if (subEl) {
          subEl.style.outline = '2px solid var(--accent)';
          subEl.style.outlineOffset = '2px';
          subEl.style.borderRadius = '4px';
          subEl.style.background = 'var(--accent-dim)';
          targetEl = subEl;
        } else {
          targetEl = demo.firstElementChild;
        }
      } else {
        targetEl = demo.firstElementChild;
      }
    } else if (step.demo.startsWith('modal')) {
      const tab = step.demo === 'modal-backlog' ? 'backlog'
                : step.demo === 'modal-agent' ? 'agent'
                : 'agent';
      demo.innerHTML = wtDemoModalHTML(tab);
      demo.style.left = `${Math.max(40, (window.innerWidth - 700) / 2)}px`;
      demo.style.top = `${Math.max(40, (window.innerHeight - 520) / 2)}px`;
      overlay.appendChild(demo);
      if (step.demoTarget) {
        const subEl = demo.querySelector(step.demoTarget);
        if (subEl) {
          subEl.style.outline = '2px solid var(--accent)';
          subEl.style.outlineOffset = '3px';
          subEl.style.borderRadius = '6px';
          targetEl = subEl;
        } else {
          targetEl = demo.firstElementChild;
        }
      } else {
        targetEl = demo.firstElementChild;
      }
    }
  }

  // Elevate the target (or its modal-window ancestor) above the backdrop
  if (targetEl && !step.demo) {
    const modal = targetEl.closest('.modal-window');
    (modal || targetEl).classList.add('wt-elevated');
  }

  // Clip-path cutout around target
  if (targetEl) {
    const r = targetEl.getBoundingClientRect();
    const pad = 10;
    const x1 = r.left - pad, y1 = r.top - pad;
    const x2 = r.right + pad, y2 = r.bottom + pad;
    // polygon: full screen with rectangular hole
    backdrop.style.clipPath = `polygon(
      0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%,
      ${x1}px ${y1}px, ${x1}px ${y2}px, ${x2}px ${y2}px, ${x2}px ${y1}px, ${x1}px ${y1}px
    )`;

    const hl = document.createElement('div');
    hl.className = 'wt-highlight';
    hl.style.left = (r.left - pad) + 'px';
    hl.style.top = (r.top - pad) + 'px';
    hl.style.width = (r.width + pad * 2) + 'px';
    hl.style.height = (r.height + pad * 2) + 'px';
    overlay.appendChild(hl);
  }

  // Card
  const card = document.createElement('div');
  card.className = 'wt-card' + (step.pos === 'center' ? ' centered' : '');

  const isFirst = idx === 0;
  const isLast = idx === WT_STEPS.length - 1;

  let btns = '';
  if (isLast) {
    btns = `<button class="wt-btn wt-btn-primary" onclick="wtEnd()">Get Started</button>`;
  } else {
    if (!isFirst) btns += `<button class="wt-btn" onclick="wtBack()">Back</button>`;
    btns += `<button class="wt-btn wt-btn-skip" onclick="wtSkip()">Skip</button>`;
    btns += `<button class="wt-btn wt-btn-primary" onclick="wtNext()">${isFirst ? 'Start Tour' : 'Next'}</button>`;
  }

  let dismissHTML = '';
  if (!isLast) {
    dismissHTML = `<div class="wt-dismiss">
      <input type="checkbox" id="wt-dontshow" ${wtDontShow ? 'checked' : ''} onchange="wtDontShow=this.checked">
      <label for="wt-dontshow">Don't show this again</label>
    </div>`;
  }

  card.innerHTML = `
    <div class="wt-title">${esc(step.title)}</div>
    <div class="wt-body">${esc(step.body)}</div>
    <div class="wt-actions">
      <span class="wt-progress">${idx + 1} / ${WT_STEPS.length}</span>
      ${btns}
    </div>
    ${dismissHTML}
  `;
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  // Position card near target
  if (targetEl && step.pos !== 'center') {
    wtPositionCard(targetEl, card, step.pos);
  }
}

function wtPositionCard(targetEl, cardEl, pos) {
  const tr = targetEl.getBoundingClientRect();
  const cr = cardEl.getBoundingClientRect();
  const gap = 20;
  let left, top;

  switch (pos) {
    case 'bottom':
      left = tr.left + (tr.width - cr.width) / 2;
      top = tr.bottom + gap;
      break;
    case 'top':
      left = tr.left + (tr.width - cr.width) / 2;
      top = tr.top - cr.height - gap;
      break;
    case 'left':
      left = tr.left - cr.width - gap;
      top = tr.top + (tr.height - cr.height) / 2;
      break;
    case 'right':
      left = tr.right + gap;
      top = tr.top + (tr.height - cr.height) / 2;
      break;
    default:
      return;
  }

  // Clamp to viewport
  left = Math.max(16, Math.min(left, window.innerWidth - cr.width - 16));
  top = Math.max(16, Math.min(top, window.innerHeight - cr.height - 16));
  cardEl.style.left = left + 'px';
  cardEl.style.top = top + 'px';
}

function wtNext() { if (wtStep < WT_STEPS.length - 1) wtShow(wtStep + 1); else wtEnd(); }
function wtBack() { if (wtStep > 0) wtShow(wtStep - 1); }
function wtSkip() {
  if (wtDontShow) localStorage.setItem('walkthrough_done', '1');
  wtEnd();
}
function wtEnd() {
  wtActive = false;
  localStorage.setItem('walkthrough_done', '1');
  document.querySelectorAll('.wt-elevated').forEach(el => el.classList.remove('wt-elevated'));
  const el = document.getElementById('wt-overlay');

}

// ── Fallback: poll for missed agent completions every 15s ───────────────────
setInterval(async () => {
  const running = agentHistory.filter(h => h.status === 'running' || h.status === 'idle');
  if (running.length === 0) return;
  const checked = new Set();
  for (const h of running) {
    if (checked.has(h.projectId)) continue;
    checked.add(h.projectId);
    try {
      const res = await fetch(API_BASE + `/api/project/${h.projectId}/agent/status`);
      const data = await res.json();
      const serverMap = {};
      for (const s of (data.sessions || [])) serverMap[s.session_id] = s;
      for (const rh of running.filter(x => x.projectId === h.projectId)) {
        const ss = serverMap[rh.sessionId];
        if (!ss) {
          // Session vanished from server (e.g. server restart) — mark as lost
          if (!agentEventSources[rh.sessionId]) {
            rh.status = 'error';
            if (agentStatusCache[rh.sessionId]) agentStatusCache[rh.sessionId].status = 'error';
            delete agentLogCache[h.projectId];
            refreshModal();
            renderAgentConsole();
            refreshSilent();
          }
          continue;
        }
        if (ss.status !== 'running' && ss.status !== 'idle' && !agentEventSources[rh.sessionId]) {
          // Server says done but we missed the SSE event
          rh.status = ss.status;
          if (agentStatusCache[rh.sessionId]) agentStatusCache[rh.sessionId].status = ss.status;
          agentOutputBuffers[rh.sessionId] = ss.log_lines;
          delete agentLogCache[h.projectId];
          refreshModal();
          renderAgentConsole();
          refreshSilent();
        } else if ((ss.status === 'running' || ss.status === 'idle') && !agentEventSources[rh.sessionId]) {
          // Still running but SSE dropped — reconnect
          connectAgentStream(h.projectId, rh.sessionId);
        }
      }
    } catch(e) {}
  }
}, 15000);

// ── Modal drag-to-move (multi-modal) ────────────────────────────────────────

let modalDrag = null;

function modalDragStart(x, y, target) {
  const header = target.closest('.modal-header');
  if (!header) return false;
  if (target.closest('input, button, select, textarea, [contenteditable]')) return false;
  const win = target.closest('.modal-window');
  if (!win) return false;
  const rect = win.getBoundingClientRect();
  modalDrag = { element: win, startX: x, startY: y, origLeft: rect.left, origTop: rect.top };
  header.classList.add('dragging');
  return true;
}

function modalDragMove(x, y) {
  if (!modalDrag) return;
  const dx = x - modalDrag.startX;
  const dy = y - modalDrag.startY;
  modalDrag.element.style.left = Math.max(0, Math.min(window.innerWidth - 100, modalDrag.origLeft + dx)) + 'px';
  modalDrag.element.style.top = Math.max(0, Math.min(window.innerHeight - 50, modalDrag.origTop + dy)) + 'px';
}

function modalDragEnd() {
  if (!modalDrag) return;
  modalDrag.element.querySelector('.modal-header.dragging')?.classList.remove('dragging');
  modalDrag = null;
}

document.getElementById('modal-layer').addEventListener('mousedown', (e) => {
  if (modalDragStart(e.clientX, e.clientY, e.target)) e.preventDefault();
});
document.addEventListener('mousemove', (e) => modalDragMove(e.clientX, e.clientY));
document.addEventListener('mouseup', modalDragEnd);

document.getElementById('modal-layer').addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  if (modalDragStart(t.clientX, t.clientY, e.target)) e.preventDefault();
}, { passive: false });
document.addEventListener('touchmove', (e) => {
  if (!modalDrag) return;
  e.preventDefault();
  modalDragMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchend', modalDragEnd);

// ── Agent chat separator drag (resize input area) ───────────────────────────

let chatResize = null;

function separatorDragStart(y, target) {
  const handle = target.closest('.agent-chat-separator');
  if (!handle) return false;
  const chat = handle.closest('.agent-chat');
  const textarea = handle.nextElementSibling?.querySelector('.agent-task-input');
  if (!textarea || !chat) return false;
  const chatH = chat.offsetHeight;
  chatResize = { textarea, chat, startY: y, origH: textarea.offsetHeight, chatH };
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
  return true;
}

function separatorDragMove(y) {
  if (!chatResize) return;
  const dy = chatResize.startY - y;  // drag up = positive = grow textarea
  const maxH = chatResize.chatH - 80;  // leave at least 80px for output + separator
  const newH = Math.max(38, Math.min(maxH, chatResize.origH + dy));
  chatResize.textarea.style.height = newH + 'px';
}

function separatorDragEnd() {
  if (!chatResize) return;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  chatResize = null;
}

document.getElementById('modal-layer').addEventListener('mousedown', (e) => {
  if (separatorDragStart(e.clientY, e.target)) e.preventDefault();
});
document.addEventListener('mousemove', (e) => separatorDragMove(e.clientY));
document.addEventListener('mouseup', separatorDragEnd);

document.getElementById('modal-layer').addEventListener('touchstart', (e) => {
  if (separatorDragStart(e.touches[0].clientY, e.target)) e.preventDefault();
}, { passive: false });
document.addEventListener('touchmove', (e) => {
  if (!chatResize) return;
  e.preventDefault();
  separatorDragMove(e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchend', separatorDragEnd);

// ── Touch resize for modal windows (mobile) ─────────────────────────────────

let modalTouchResize = null;
const RESIZE_ZONE = 40; // px from bottom-right corner

// Corner drag resize (single finger)
document.getElementById('modal-layer').addEventListener('touchstart', (e) => {
  if (modalDrag || chatResize) return;
  const content = e.target.closest('.modal-content');
  if (!content) return;
  const t = e.touches[0];
  const rect = content.getBoundingClientRect();
  if (t.clientX < rect.right - RESIZE_ZONE || t.clientY < rect.bottom - RESIZE_ZONE) return;
  e.preventDefault();
  modalTouchResize = { content, startX: t.clientX, startY: t.clientY, origW: content.offsetWidth, origH: content.offsetHeight };
}, { passive: false });

// Pinch-to-resize (two fingers anywhere on modal)
let modalPinch = null;

function pinchDist(e) {
  const a = e.touches[0], b = e.touches[1];
  return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
}

document.getElementById('modal-layer').addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    const content = e.target.closest('.modal-content');
    if (!content) return;
    e.preventDefault();
    modalPinch = { content, startDist: pinchDist(e), origW: content.offsetWidth, origH: content.offsetHeight };
  }
}, { passive: false });

document.addEventListener('touchmove', (e) => {
  // Corner drag
  if (modalTouchResize && e.touches.length === 1) {
    e.preventDefault();
    const t = e.touches[0];
    const dx = t.clientX - modalTouchResize.startX;
    const dy = t.clientY - modalTouchResize.startY;
    modalTouchResize.content.style.width = Math.max(380, modalTouchResize.origW + dx) + 'px';
    modalTouchResize.content.style.height = Math.max(300, modalTouchResize.origH + dy) + 'px';
    return;
  }
  // Pinch resize
  if (modalPinch && e.touches.length === 2) {
    e.preventDefault();
    const scale = pinchDist(e) / modalPinch.startDist;
    modalPinch.content.style.width = Math.max(380, Math.round(modalPinch.origW * scale)) + 'px';
    modalPinch.content.style.height = Math.max(300, Math.round(modalPinch.origH * scale)) + 'px';
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  modalTouchResize = null;
  if (e.touches.length < 2) modalPinch = null;
});

// ── Ctrl+Scroll zoom on agent output areas ──────────────────────────────────

const modalZoomLevels = {}; // modalId → current font-size in px

document.getElementById('modal-layer').addEventListener('wheel', (e) => {
  if (!e.ctrlKey) return;
  const target = e.target.closest('.agent-output, .ac-session-output, .plan-viewer-body');
  if (!target) return;
  const modal = target.closest('.modal-window');
  if (!modal) return;
  e.preventDefault();
  const modalId = modal.dataset.modalId;
  if (!modalZoomLevels[modalId]) modalZoomLevels[modalId] = 12;
  const delta = e.deltaY > 0 ? -1 : 1;
  modalZoomLevels[modalId] = Math.max(8, Math.min(24, modalZoomLevels[modalId] + delta));
  modal.querySelectorAll('.agent-output, .ac-session-output, .plan-viewer-body').forEach(el => {
    el.style.fontSize = modalZoomLevels[modalId] + 'px';
  });
}, { passive: false });
</script>
</body>
