// ── Token Usage Helpers ─────────────────────────────────────────────────────

const TOKEN_MODES = [
  { id: 'all',     label: 'All Time' },
  { id: 'today',   label: 'Today' },
  { id: 'week',    label: 'This Week' },
  { id: 'month',   label: 'This Month' },
];

let tokenCounterMode = localStorage.getItem('tc_mode') || 'all';

function formatTokens(n) {
  if (!n || n === 0) return '0';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'k';
  return String(n);
}

function formatCost(usd) {
  if (!usd || usd === 0) return '';
  if (usd < 0.01) return '$' + usd.toFixed(4);
  return '$' + usd.toFixed(2);
}

function tokenBadgeHTML(usage, costUsd) {
  const inp = (usage && usage.input_tokens) || 0;
  const out = (usage && usage.output_tokens) || 0;
  const total = inp + out;
  if (!total) return '';
  const cost = formatCost(costUsd);
  return `<span class="token-badge">${formatTokens(total)} tokens${cost ? ` <span class="tb-cost">${cost}</span>` : ''}</span>`;
}

function getTokenSince(mode) {
  const now = new Date();
  if (mode === 'today') {
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return d.toISOString();
  } else if (mode === 'week') {
    const d = new Date(now);
    d.setDate(d.getDate() - d.getDay()); // start of week (Sunday)
    d.setHours(0, 0, 0, 0);
    return d.toISOString();
  } else if (mode === 'month') {
    const d = new Date(now.getFullYear(), now.getMonth(), 1);
    return d.toISOString();
  }
  return ''; // 'all' — no filter
}

async function fetchGlobalUsage() {
  try {
    const since = getTokenSince(tokenCounterMode);
    const url = API_BASE + '/api/usage' + (since ? `?since=${encodeURIComponent(since)}` : '');
    const r = await fetch(url);
    const d = await r.json();
    const tokensEl = document.getElementById('global-tc-tokens');
    const costEl = document.getElementById('global-tc-cost');
    const modeEl = document.getElementById('global-tc-mode');
    if (tokensEl) tokensEl.textContent = formatTokens(d.total_tokens) + ' tokens';
    if (costEl) {
      const cost = formatCost(d.cost_usd);
      costEl.textContent = cost ? cost : '';
    }
    if (modeEl) {
      const m = TOKEN_MODES.find(m => m.id === tokenCounterMode);
      modeEl.textContent = (tokenCounterMode === 'all') ? '' : m ? m.label : '';
    }
  } catch(e) {}
}

function openTokenContextMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  const menu = document.getElementById('tc-context-menu');
  if (!menu) return;

  menu.innerHTML = TOKEN_MODES.map(m =>
    `<button class="tc-ctx-item${tokenCounterMode === m.id ? ' active' : ''}" onclick="setTokenMode('${m.id}')">
      <span class="ctx-check">${tokenCounterMode === m.id ? '&#x2713;' : ''}</span> ${m.label}
    </button>`
  ).join('');

  menu.classList.add('open');
  menu.style.left = Math.min(e.clientX, window.innerWidth - 190) + 'px';
  menu.style.top = Math.min(e.clientY, window.innerHeight - 200) + 'px';

  const close = (ev) => {
    if (!menu.contains(ev.target)) {
      menu.classList.remove('open');
      document.removeEventListener('mousedown', close);
    }
  };
  setTimeout(() => document.addEventListener('mousedown', close), 0);
}

function setTokenMode(mode) {
  tokenCounterMode = mode;
  localStorage.setItem('tc_mode', mode);
  document.getElementById('tc-context-menu')?.classList.remove('open');
  fetchGlobalUsage();
}

// ── Enter Key Behavior ──────────────────────────────────────────────────────

// 'enter' = Enter sends, Shift+Enter for newline
// 'ctrl-enter' = Ctrl/Cmd+Enter sends, Enter for newline (default)
let enterKeyMode = localStorage.getItem('enter_mode') || 'ctrl-enter';

function handleInputEnter(event, sendFn) {
  if (event.key !== 'Enter') return;
  if (enterKeyMode === 'enter') {
    // Enter sends, Shift+Enter for newline
    if (event.shiftKey) return; // allow newline
    event.preventDefault();
    sendFn();
  } else {
    // Ctrl/Cmd+Enter sends (default)
    if (event.ctrlKey || event.metaKey) {
      event.preventDefault();
      sendFn();
    }
  }
}

function setEnterMode(mode) {
  enterKeyMode = mode;
  localStorage.setItem('enter_mode', mode);
  document.querySelectorAll('.modal-menu-dropdown.open').forEach(d => d.classList.remove('open'));
  refreshModal();
}

function formatElapsed(startedAt) {
  if (!startedAt) return '';
  const s = Math.floor((Date.now() - new Date(startedAt).getTime()) / 1000);
  if (s < 0) return '0s';
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm ' + (s % 60) + 's';
  return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm';
}

function sessionMetricsHTML(session) {
  if (!session) return '';
  const usage = session.usage || {};
  const inp = usage.input_tokens || 0;
  const out = usage.output_tokens || 0;
  const cache_read = usage.cache_read_input_tokens || 0;
  const cache_create = usage.cache_creation_input_tokens || 0;
  const total = inp + out;
  const turns = session.num_turns || 0;
  const cost = formatCost(session.cost_usd);
  const isRunning = session.status === 'running' || session.status === 'idle';

  if (isRunning) {
    const elapsed = formatElapsed(session.startedAt);
    const parts = [];
    if (elapsed) parts.push(`&#x23F1; ${elapsed}`);
    if (total) {
      let tokenDetail = `${formatTokens(total)} tokens`;
      if (cache_read) tokenDetail += ` (${formatTokens(cache_read)} cached)`;
      parts.push(tokenDetail);
    }
    if (turns) parts.push(`${turns} turn${turns !== 1 ? 's' : ''}`);
    if (cost) parts.push(`<span class="tb-cost">${cost}</span>`);
    return parts.join(' &middot; ');
  }
  // Completed/stopped/error
  if (total) {
    const parts = [`${formatTokens(total)} tokens`];
    if (cache_read) parts[0] += ` (${formatTokens(cache_read)} cached)`;
    if (turns) parts.push(`${turns} turn${turns !== 1 ? 's' : ''}`);
    if (cost) parts.push(`<span class="tb-cost">${cost}</span>`);
    return parts.join(' &middot; ');
  }
  return '';
}

// ── Agent Panel ─────────────────────────────────────────────────────────────

let agentEventSources = {};   // session_id → EventSource
let sseRetryCount = {};       // session_id → number of consecutive reconnect attempts
let agentOutputBuffers = {};   // session_id → string[]
let agentServerLines = {};     // session_id → count of lines received from server (for SSE since param)
let agentStatusCache = {};     // session_id → {status, task, projectId, startedAt}
let agentHistory = [];         // [{projectId, sessionId, projectName, task, status, startedAt}]
let activeAgentTab = {};       // project_id → session_id (which tab is active in modal)

// Update elapsed timers + metrics for running sessions every second
setInterval(() => {
  for (const [sid, cached] of Object.entries(agentStatusCache)) {
    if (cached.status !== 'running' && cached.status !== 'idle') continue;
    const el = document.getElementById(`session-metrics-${sid}`);
    if (el) el.innerHTML = sessionMetricsHTML(cached);
  }
}, 1000);
let agentPendingImages = {};   // key (projectId or sessionId) → [{file, objectUrl, serverPath}]
let acOpenSessions = new Set(); // session_id → expanded in console
let acExpanded = false;
let planViewerContent = {};    // session_id → string[] of raw plan text lines
let planFileTitle = {};        // session_id → extracted first heading from plan file
let exitPlanModeCount = {};    // session_id → number of consecutive ExitPlanMode calls
let pendingResumeId = {};      // project_id → claude_session_id to resume (null = fresh)

// ── Terminal pop-out state ─────────────────────────────────────────────────
let terminalInstances = {};      // session_id → Terminal (xterm.js)
let terminalEventSources = {};   // session_id → EventSource
let terminalOutputBuffers = {};  // session_id → string[]
let terminalOutputCount = {};    // session_id → int
let terminalDismissed = new Set(); // session IDs closed by user — don't reopen from replayed markers

function getProjectSessions(projectId) {
  return agentHistory.filter(h => h.projectId === projectId);
}

let _skipAgentOutput = false;  // set by refreshModalById to skip expensive output rendering

function agentPanelHTML(p) {
  const pp = p.project_path || '';
  if (!pp) {
    return `<div class="agent-panel">
      <div class="section-title">Agent</div>
      <div class="agent-disabled">Set project_path to enable agent dispatch</div>
    </div>`;
  }

  const sessions = getProjectSessions(p.id);
  // Sort tabs chronologically so newest appears on the right (next to "+ New")
  sessions.sort((a, b) => (a.startedAt || '').localeCompare(b.startedAt || ''));
  const activeSessionId = activeAgentTab[p.id];
  const activeSession = activeSessionId ? agentStatusCache[activeSessionId] : null;
  const st = activeSession ? (activeSession.status || 'idle') : 'idle';
  const isRunning = st === 'running';

  // Tab bar
  const tabsHTML = sessions.map(h => {
    const isActive = h.sessionId === activeSessionId;
    const label = (h.task || '').substring(0, 30) || 'Session';
    return `<div class="agent-tab ${isActive ? 'active' : ''}" onclick="switchAgentTab('${esc(p.id)}','${esc(h.sessionId)}')" title="${esc(h.task)}">
      <span class="agent-status-dot ${h.status}"></span>
      <span class="agent-tab-label">${esc(label)}</span>
      <button class="agent-tab-close" onclick="event.stopPropagation();closeAgentTab('${esc(p.id)}','${esc(h.sessionId)}')" title="Close tab">&#10005;</button>
    </div>`;
  }).join('');

  const tabBar = sessions.length > 0
    ? `<div class="agent-tab-bar">${tabsHTML}<button class="agent-tab-new" onclick="newAgentTab('${esc(p.id)}')">+ New</button></div>`
    : '';

  // Session picker (shown when no active tab)
  const noActiveTab = !activeSession || !activeSessionId;
  if (noActiveTab) {
    // Auto-load agent log and set default resume on first render
    if (!agentLogCache[p.id]) {
      loadAgentLog(p.id);
    } else if (!(p.id in pendingResumeId)) {
      pendingResumeId[p.id] = getDefaultResumeId(p.id);
    }
  }
  const picker = noActiveTab ? sessionPickerHTML(p.id) : '';

  // Resume indicator (shown when a prior session is selected)
  const resumeId = pendingResumeId[p.id] || null;
  const resumeIndicator = (noActiveTab && resumeId) ? (() => {
    const entries = agentLogCache[p.id] || [];
    const entry = entries.find(e => e.claude_session_id === resumeId);
    const label = entry ? (entry.task || '').substring(0, 50) : resumeId.substring(0, 12);
    return `<div class="resume-indicator">Resuming: ${esc(label)} <span class="ri-clear" onclick="selectResumeSession('${esc(p.id)}','')">clear</span></div>`;
  })() : '';

  // Dispatch row (only shown on the +New screen, not when viewing an active session)
  const dispatchPreviews = noActiveTab ? renderAgentImagePreviews(p.id) : '';
  const dispatchRow = noActiveTab ? `${picker}${resumeIndicator}<div class="agent-input-row">
    <textarea spellcheck="true" class="agent-task-input" id="agent-task-${esc(p.id)}" rows="1"
      placeholder="Describe a task for the agent... (paste screenshots here)"
      onkeydown="handleInputEnter(event,()=>dispatchAgent('${esc(p.id)}'))"
      onpaste="handleAgentPaste(event,'${esc(p.id)}')"
    ></textarea>
    <button class="btn-dispatch" onclick="dispatchAgent('${esc(p.id)}')">${resumeId ? 'Continue' : 'Dispatch'}</button>
  </div>
  ${dispatchPreviews}` : '';

  // Active tab content
  let tabContent = '';
  if (activeSession && activeSessionId) {
    const MAX_RENDER_LINES = 500;
    const outputLines = _skipAgentOutput ? '' : (() => {
      const fullBuf = (agentOutputBuffers[activeSessionId] || []).flatMap(l => l.trimStart().startsWith('> ') ? [l] : l.split('\n'));
      const forceAll = expandedOutputSessions.has(activeSessionId);
      const truncated = !forceAll && fullBuf.length > MAX_RENDER_LINES;
      const buf = truncated ? fullBuf.slice(-MAX_RENDER_LINES) : fullBuf;
      let result = '';
      let tableLines = [];
      let planBlock = '';   // accumulates non-tool lines for plan detection
      let planRawLines = []; // raw text for plan viewer
      function flushTable() {
        if (tableLines.length === 0) return;
        if (isPipeTable(tableLines)) {
          planBlock += `<div class="hl-table">${buildPipeTable(tableLines)}</div>`;
        } else {
          planBlock += `<div class="hl-table-pre">${tableLines.map(l => formatTableLine(esc(l))).join('\n')}</div>`;
        }
        tableLines = [];
      }
      for (const line of buf) {
        // Plan detection: when ExitPlanMode is hit, collapse prior non-tool lines
        if (line.trim() === '[tool: ExitPlanMode]') {
          flushTable();
          if (planRawLines.length >= 2) {
            planViewerContent[activeSessionId] = planRawLines;
            result += `<button class="plan-show-btn" onclick="openPlanViewer('${esc(activeSessionId)}')">&#128196; Show Plan</button>`;
            result += `<div class="plan-hidden-block">${planBlock}</div>`;
          } else {
            result += planBlock;
          }
          planBlock = ''; planRawLines = [];
          const cls = agentLineCls(line);
          result += `<div class="${cls}">${esc(line)}</div>`;
          continue;
        }
        if (isTableLine(line)) {
          tableLines.push(line);
          planRawLines.push(line);
        } else if (tableLines.length > 0 && line.trim() === '') {
          tableLines.push(line);
          planRawLines.push(line);
        } else {
          flushTable();
          const cls = agentLineCls(line);
          const html = cls.includes('agent-line-tool') || cls.includes('agent-line-error') || cls.includes('agent-line-followup') || cls.includes('agent-line-queued') || cls.includes('agent-line-prompt')
            ? esc(line) : formatAgentText(line);
          const div = `<div class="${cls}">${html}</div>`;
          // Tool lines reset plan block accumulator
          if (cls.includes('agent-line-tool') || cls.includes('agent-line-prompt')) {
            result += planBlock + div;
            planBlock = ''; planRawLines = [];
          } else {
            planBlock += div;
            planRawLines.push(line);
          }
        }
      }
      flushTable();
      result += planBlock; // flush any remaining non-plan text
      if (truncated) {
        result = `<div class="agent-line" style="text-align:center;padding:8px;opacity:0.6;cursor:pointer" onclick="expandAgentOutput('${esc(activeSessionId)}')">&#x25B2; ${fullBuf.length - MAX_RENDER_LINES} earlier lines — click to load all &#x25B2;</div>` + result;
      }
      return result;
    })();

    const stopBtn = (isRunning || st === 'idle')
      ? `<button class="btn-stop" onclick="stopAgent('${esc(p.id)}','${esc(activeSessionId)}')">Stop</button>` : '';

    const followupPreviews = renderAgentImagePreviews('fu_' + activeSessionId);
    const chatInput = (st === 'running' || st === 'completed' || st === 'stopped' || st === 'idle')
      ? `<div class="agent-chat-input">
          ${followupPreviews}
          <div class="agent-chat-input-row">
            <textarea spellcheck="true" class="agent-task-input" id="agent-followup-${esc(activeSessionId)}" rows="1"
              placeholder="${st === 'stopped' ? 'Type to resume conversation...' : 'Send follow-up... (paste screenshots here)'}"
              onkeydown="handleInputEnter(event,()=>sendFollowup('${esc(p.id)}','${esc(activeSessionId)}'))"
              onpaste="handleAgentPaste(event,'fu_${esc(activeSessionId)}')"
            ></textarea>
            <button class="btn-dispatch" onclick="sendFollowup('${esc(p.id)}','${esc(activeSessionId)}')">Send</button>
          </div>
        </div>` : '';

    const planFileBtn = activeSession && activeSession.planFile
      ? (() => {
          const fname = activeSession.planFile.split(/[/\\]/).pop();
          const label = planFileTitle[activeSessionId] || planFileLabel(activeSession.task || fname);
          // Lazy-fetch heading if not cached yet
          if (!planFileTitle[activeSessionId]) {
            fetch(API_BASE + `/api/project/${esc(p.id)}/agent/plan-file?session=${esc(activeSessionId)}`)
              .then(r => r.ok ? r.json() : null)
              .then(d => {
                if (d && d.content) {
                  const m = d.content.match(/^#\s+(.+)/m);
                  if (m) {
                    let t = m[1].trim();
                    if (t.length > 40) t = t.slice(0, 37) + '...';
                    planFileTitle[activeSessionId] = t;
                    const c = document.getElementById(`plan-file-btn-${activeSessionId}`);
                    if (c) c.querySelector('.btn-plan-file')?.childNodes?.forEach?.((n, i) => {
                      if (i > 0) n.textContent = ' ' + t;
                    });
                    if (c && c.querySelector('.btn-plan-file')) {
                      c.querySelector('.btn-plan-file').innerHTML = `&#128196; ${esc(t)}`;
                    }
                  }
                }
              }).catch(() => {});
          }
          return `<button class="btn-plan-file" onclick="openPlanFileViewer('${esc(p.id)}','${esc(activeSessionId)}')" title="${esc(fname)}">&#128196; ${esc(label)}</button>`;
        })()
      : '';
    tabContent = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;flex-shrink:0">
        <span class="agent-status-dot ${st}"></span>
        <span class="agent-status-label ${st}">${st}</span>
        ${stopBtn}
        <span class="token-badge" id="session-metrics-${esc(activeSessionId)}">${activeSession ? sessionMetricsHTML(activeSession) : ''}</span>
        <span class="agent-activity" id="agent-activity-${esc(activeSessionId)}"></span>
        <span id="plan-file-btn-${esc(activeSessionId)}">${planFileBtn}</span>
        <button class="btn-popout" onclick="openPlanViewer('${esc(activeSessionId)}')" title="Open output in viewer window">Pop Out &#8599;</button>
      </div>
      <div class="agent-chat">
        <div class="agent-output" id="agent-output-${esc(activeSessionId)}">${outputLines}</div>
        ${chatInput ? `<div class="agent-chat-separator"></div>${chatInput}` : ''}
      </div>`;
  }

  return `<div class="agent-panel">
    <div class="agent-panel-header">
      <div class="section-title" style="margin-bottom:0">Agent</div>
    </div>
    ${tabBar}
    ${tabContent}
    ${dispatchRow}
  </div>`;
}

function switchAgentTab(projectId, sessionId) {
  activeAgentTab[projectId] = sessionId;
  refreshModal();
}

function newAgentTab(projectId) {
  // Clear active tab so the panel shows just the dispatch input + session picker
  delete activeAgentTab[projectId];
  // Reset to default (agentPanelHTML will auto-load log and set default resume)
  delete pendingResumeId[projectId];
  refreshModal();
  setTimeout(() => document.getElementById(`agent-task-${projectId}`)?.focus(), 50);
}

function getDefaultResumeId(projectId) {
  const entries = agentLogCache[projectId] || [];
  const runningSessions = getProjectSessions(projectId);
  const runningResumeIds = new Set(
    runningSessions.filter(h => h.resumedFrom).map(h => h.resumedFrom)
  );
  for (const e of entries) {
    if (e.claude_session_id && !runningResumeIds.has(e.claude_session_id)) {
      return e.claude_session_id;
    }
  }
  return null;
}

function selectResumeSession(projectId, claudeSessionId) {
  pendingResumeId[projectId] = claudeSessionId || null;
  refreshModal();
  setTimeout(() => document.getElementById(`agent-task-${projectId}`)?.focus(), 50);
}

function sessionPickerHTML(projectId) {
  const entries = agentLogCache[projectId] || [];
  // Filter to entries with a claude_session_id
  const resumable = entries.filter(e => e.claude_session_id);
  if (resumable.length === 0) return '';

  // Exclude sessions already running in open tabs for this project
  const runningSessions = getProjectSessions(projectId);
  const runningResumeIds = new Set(
    runningSessions
      .filter(h => h.resumedFrom)
      .map(h => h.resumedFrom)
  );

  const availableAll = resumable.filter(e => !runningResumeIds.has(e.claude_session_id));
  // Deduplicate by claude_session_id (keep first/most recent entry per session)
  const seen = new Set();
  const available = availableAll.filter(e => {
    if (seen.has(e.claude_session_id)) return false;
    seen.add(e.claude_session_id);
    return true;
  });
  if (available.length === 0) return '';

  const selected = pendingResumeId[projectId] || null;

  const opts = available.slice(0, 8).map(e => {
    const csid = e.claude_session_id;
    const isSelected = selected === csid;
    const task = (e.task || '').substring(0, 60) || 'Session';
    const time = e.ts_relative || e.ts || '';
    return `<div class="session-picker-opt ${isSelected ? 'selected' : ''}"
      onclick="selectResumeSession('${esc(projectId)}','${esc(csid)}')"
      title="${esc(e.task || '')}">
      <div class="sp-radio"></div>
      <div class="sp-label">
        <div class="sp-task">${esc(task)}</div>
        <div class="sp-meta">${esc(time)}</div>
      </div>
    </div>`;
  }).join('');

  const freshSelected = !selected;
  return `<div class="session-picker">
    <div class="session-picker-label">Session context</div>
    <div class="session-picker-options">
      <div class="session-picker-opt ${freshSelected ? 'selected' : ''}"
        onclick="selectResumeSession('${esc(projectId)}','')">
        <div class="sp-radio"></div>
        <div class="sp-label"><div class="sp-task">Fresh session (no prior context)</div></div>
      </div>
      ${opts}
    </div>
  </div>`;
}

function closeAgentTab(projectId, sessionId) {
  // Close EventSource immediately
  if (agentEventSources[sessionId]) {
    agentEventSources[sessionId].close();
    delete agentEventSources[sessionId];
  }

  // Kill process + remove session from backend
  fetch(API_BASE + `/api/project/${projectId}/agent/session`, {
    method: 'DELETE',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ session_id: sessionId })
  }).catch(() => {});

  // Remove from frontend state
  delete agentStatusCache[sessionId];
  delete agentOutputBuffers[sessionId];
  delete agentServerLines[sessionId];
  agentHistory = agentHistory.filter(h => h.sessionId !== sessionId);
  acOpenSessions.delete(sessionId);

  // Switch to next available tab
  const remaining = getProjectSessions(projectId);
  if (remaining.length > 0) {
    activeAgentTab[projectId] = remaining[0].sessionId;
  } else {
    delete activeAgentTab[projectId];
  }
  refreshModal();
  renderAgentConsole();
}

async function dispatchAgent(projectId) {
  const input = document.getElementById(`agent-task-${projectId}`);
  const task = input.value.trim();

  // Check if we're resuming a prior session
  const resumeId = pendingResumeId[projectId] || null;
  delete pendingResumeId[projectId];

  // Require a prompt for fresh sessions; resume can go without one
  if (!task && !resumeId) { input.focus(); return; }
  input.value = '';
  if (input.id) delete textareaValues[input.id];

  // Upload any pasted images and build final task
  const imagePaths = await uploadAgentImages(projectId);
  const fullTask = buildTaskWithImages(task || 'Continue where we left off.', imagePaths);
  clearAgentImages(projectId);

  const body = { task: fullTask };
  if (resumeId) body.resume_conversation_id = resumeId;

  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/agent/dispatch`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!data.ok) { alert(data.error || 'Dispatch failed'); return; }
    const sessionId = data.session_id;
    const pName = (allProjects.find(x => x.id === projectId) || {}).name || projectId;

    const displayTask = task || 'Continue where we left off.';
    const prefix = resumeId ? `> [resuming prior session] ${displayTask}` : `> ${displayTask}`;
    agentOutputBuffers[sessionId] = [prefix];
    agentStatusCache[sessionId] = { status: 'running', task: displayTask, projectId, startedAt: new Date().toISOString() };
    agentHistory.unshift({ projectId, sessionId, projectName: pName, task: displayTask, status: 'running', startedAt: new Date().toISOString(), resumedFrom: resumeId || null });
    activeAgentTab[projectId] = sessionId;

    refreshModal();
    renderAgentConsole();
    connectAgentStream(projectId, sessionId);
  } catch(e) {
    alert('Failed to dispatch: ' + e.message);
  }
}

function connectAgentStream(projectId, sessionId) {
  if (agentEventSources[sessionId]) {
    agentEventSources[sessionId].close();
  }

  // Tell server how many lines we already have, so it doesn't replay them.
  // Use agentServerLines (actual server-received count) not agentOutputBuffers.length
  // which includes local echo lines the server doesn't know about.
  const since = agentServerLines[sessionId] || 0;
  const es = new EventSource(API_BASE + `/api/project/${projectId}/agent/stream?session=${sessionId}&since=${since}`);
  agentEventSources[sessionId] = es;

  es.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'output') {
        sseRetryCount[sessionId] = 0;  // successful data — reset retry counter
        if (!agentOutputBuffers[sessionId]) agentOutputBuffers[sessionId] = [];
        agentOutputBuffers[sessionId].push(msg.text);
        agentServerLines[sessionId] = (agentServerLines[sessionId] || 0) + 1;
        // Cap buffer to prevent unbounded memory growth
        if (agentOutputBuffers[sessionId].length > 2000) {
          agentOutputBuffers[sessionId] = agentOutputBuffers[sessionId].slice(-1500);
        }
        // Detect terminal launch marker from agent
        const termMatch = msg.text && msg.text.match(/^\[terminal:([^:]+):(.+)\]$/);
        if (termMatch) {
          const [, termSessionId, termCommand] = termMatch;
          if (!terminalDismissed.has(termSessionId) && !openModals.has(`__terminal_${termSessionId}`)) {
            // Verify session still exists on server before opening pop-out
            fetch(API_BASE + `/api/project/${projectId}/terminal/status`)
              .then(r => r.json())
              .then(data => {
                const exists = (data.sessions || []).some(s => s.session_id === termSessionId);
                if (exists) openTerminalPopout(projectId, termSessionId, termCommand);
                else terminalDismissed.add(termSessionId);
              }).catch(() => terminalDismissed.add(termSessionId));
          }
          return; // don't render this line in agent chat
        }
        // Show toast for auto-fresh session notification
        if (msg.text && msg.text.startsWith('[Session transcript too large')) {
          const pName = (allProjects.find(p => p.id === projectId) || {}).name || projectId;
          showToast(`Session restarted fresh for "${pName}" — previous transcript was too large`);
        }
        // Remove local echo if server sends the real user prompt
        if (msg.text && msg.text.trimStart().startsWith('> ')) {
          const el = document.getElementById(`agent-output-${sessionId}`);
          if (el) {
            const echo = el.querySelector('.agent-echo');
            if (echo) echo.remove();
          }
        }
        appendAgentLine(sessionId, msg.text);
        updateConsoleOutput(sessionId);
        // Update live activity ticker for tool lines
        if (msg.text && msg.text.startsWith('[tool:')) {
          for (const id of [`agent-activity-${sessionId}`, `ac-activity-${sessionId}`]) {
            const el = document.getElementById(id);
            if (el) el.textContent = msg.text;
          }
        } else if (msg.text && !msg.text.startsWith('[') && !msg.text.startsWith('\n---')) {
          // Text output — clear activity (agent is now responding)
          for (const id of [`agent-activity-${sessionId}`, `ac-activity-${sessionId}`]) {
            const el = document.getElementById(id);
            if (el) el.textContent = '';
          }
        }
      } else if (msg.type === 'question' && msg.questions) {
        renderAgentQuestion(sessionId, projectId, msg.questions);
      } else if (msg.type === 'turn_complete') {
        // Mode B: turn finished but process still alive — do NOT close SSE
        if (agentStatusCache[sessionId]) {
          agentStatusCache[sessionId].status = 'idle';
          if (msg.usage) agentStatusCache[sessionId].usage = msg.usage;
          if (msg.cost_usd !== undefined) agentStatusCache[sessionId].cost_usd = msg.cost_usd;
          if (msg.num_turns !== undefined) agentStatusCache[sessionId].num_turns = msg.num_turns;
        }
        updateHistoryStatus(sessionId, 'idle');
        updateAgentStatusUI(sessionId, 'idle');
        refreshModal();
        renderAgentConsole();
      } else if (msg.type === 'status') {
        // Terminal status — close SSE
        if (agentStatusCache[sessionId]) {
          agentStatusCache[sessionId].status = msg.status;
          if (msg.usage) agentStatusCache[sessionId].usage = msg.usage;
          if (msg.cost_usd !== undefined) agentStatusCache[sessionId].cost_usd = msg.cost_usd;
          if (msg.num_turns !== undefined) agentStatusCache[sessionId].num_turns = msg.num_turns;
        }
        updateHistoryStatus(sessionId, msg.status);
        es.close();
        delete agentEventSources[sessionId];
        delete sseRetryCount[sessionId];
        delete agentLogCache[projectId];  // invalidate so fresh data (with claude_session_id) loads
        if (agentLogOpen[projectId]) loadAgentLog(projectId);  // re-fetch if panel is open
        refreshModal();
        renderAgentConsole();
        refreshSilent();
      } else if (msg.type === 'error') {
        if (agentStatusCache[sessionId]) agentStatusCache[sessionId].status = 'error';
        updateHistoryStatus(sessionId, 'error');
        es.close();
        delete agentEventSources[sessionId];
        delete sseRetryCount[sessionId];
        delete agentLogCache[projectId];  // invalidate so fresh data loads
        if (agentLogOpen[projectId]) loadAgentLog(projectId);  // re-fetch if panel is open
        refreshModal();
        renderAgentConsole();
      }
    } catch(e) {}
  };

  es.onerror = () => {
    es.close();
    delete agentEventSources[sessionId];
    const cached = agentStatusCache[sessionId];
    if (cached && (cached.status === 'running' || cached.status === 'idle')) {
      const retries = (sseRetryCount[sessionId] || 0) + 1;
      sseRetryCount[sessionId] = retries;
      if (retries <= 3) {
        // Retry with increasing delay
        setTimeout(() => connectAgentStream(projectId, sessionId), retries * 2000);
      } else {
        // Too many retries — server likely lost the session
        cached.status = 'error';
        const hist = agentHistory.find(h => h.sessionId === sessionId);
        if (hist) hist.status = 'error';
        delete sseRetryCount[sessionId];
        refreshModal();
        renderAgentConsole();
        refreshSilent();
      }
    }
  };
}

// ── Rich text formatting for agent output ────────────────────────────────────
function formatAgentText(raw) {
  // Already escaped by esc() before calling — we operate on safe HTML
  let t = esc(raw);

  // Code fence blocks (``` ... ```)
  if (t.match(/^```/)) {
    return `<span class="hl-codeblock">${t.replace(/^```\w*/, '').replace(/```$/, '')}</span>`;
  }

  // Markdown headers: ## Heading, ### Heading
  if (t.match(/^#{1,4}\s/)) {
    return `<span class="hl-h">${t}</span>`;
  }

  // Numbered list items: 1. item, 2. item
  t = t.replace(/^(\d+\.)\s/, '<span class="hl-num">$1</span> ');

  // Bullet points: - item, * item
  t = t.replace(/^([-*])\s/, '<span class="hl-bullet">$1</span> ');

  // Inline code: `something`
  t = t.replace(/`([^`]+)`/g, '<span class="hl-code">$1</span>');

  // Bold: **text**
  t = t.replace(/\*\*([^*]+)\*\*/g, '<span class="hl-bold">$1</span>');

  // File paths: word.ext patterns (common code file extensions)
  t = t.replace(/(?<![&\w])([A-Za-z_][\w.-]*\.(py|js|ts|tsx|jsx|html|css|json|md|yml|yaml|toml|rs|go|java|c|cpp|h|sh|sql|vue|svelte|rb|php))(?![&\w])/g,
    '<span class="hl-path">$1</span>');

  // Absolute paths: /path/to/file or C:\path\to\file
  t = t.replace(/((?:\/[\w.-]+){2,}|(?:[A-Z]:\\[\w.-\\]+))/g, '<span class="hl-path">$1</span>');

  // URLs
  t = t.replace(/(https?:\/\/[^\s<]+)/g, '<span class="hl-url">$1</span>');

  return t;
}

function isTableLine(text) {
  // Pipe-delimited table row: | col1 | col2 | or starts/ends with pipe
  if (/^\s*\|.*\|/.test(text)) return true;
  // Separator lines: +---+---+, +===+===+, |---|---|
  if (/^\s*[+|][-=]+[+|]/.test(text)) return true;
  // Unicode box drawing: ┌─┬─┐, ├─┼─┤, └─┴─┘, │ etc
  if (/[┌┐└┘├┤┬┴┼─│═║╔╗╚╝╠╣╦╩╬]/.test(text)) return true;
  return false;
}

function formatTableLine(escaped) {
  // Colorize pipes and border characters (for box-drawing / non-pipe tables)
  return escaped
    .replace(/([│|])/g, '<span class="table-pipe">$1</span>')
    .replace(/([┌┐└┘├┤┬┴┼─═║╔╗╚╝╠╣╦╩╬+])/g, '<span class="table-border">$1</span>');
}

function isPipeTable(lines) {
  // True if at least one line has pipe-delimited columns (not just box-drawing)
  return lines.some(l => /^\s*\|[^┌┐└┘├┤┬┴┼─│═║╔╗╚╝╠╣╦╩╬]*\|/.test(l));
}

function isSeparatorLine(text) {
  return /^\s*\|?[-=|:+\s]+\|?\s*$/.test(text) && /[-=]{2,}/.test(text);
}

function buildPipeTable(rawLines) {
  // Parse pipe-delimited lines into HTML <table>
  const dataRows = [];
  let headerIdx = -1;
  for (let i = 0; i < rawLines.length; i++) {
    const line = rawLines[i].trim();
    if (!line) continue;
    if (isSeparatorLine(line)) {
      // The row before the first separator is the header
      if (headerIdx < 0 && dataRows.length > 0) headerIdx = dataRows.length - 1;
      continue;
    }
    // Split by pipe, trim each cell
    const cells = line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
    dataRows.push(cells);
  }
  if (dataRows.length === 0) return '';
  // If we found a header separator, first row is header
  const hasHeader = headerIdx === 0;
  let html = '<table>';
  dataRows.forEach((cells, i) => {
    const tag = (hasHeader && i === 0) ? 'th' : 'td';
    html += '<tr>' + cells.map(c => `<${tag}>${esc(c)}</${tag}>`).join('') + '</tr>';
  });
  html += '</table>';
  return html;
}

function agentLineCls(text) {
  const t = text.trim();
  if (t.startsWith('> [queued]')) return 'agent-line agent-line-queued';
  if (t.startsWith('> ')) return 'agent-line agent-line-prompt';
  if (t.startsWith('[tool:')) return 'agent-line agent-line-tool';
  if (t.startsWith('[') && t.endsWith(']')) return 'agent-line agent-line-status';
  if (t.startsWith('[exited') || t.startsWith('[stream error')) return 'agent-line agent-line-error';
  return 'agent-line';
}

function collapseIntoPlanButton(sessionId, container) {
  // Walk backwards from end, collecting non-tool text lines until we hit a [tool:] line
  const children = Array.from(container.children);
  const planLines = [];
  const planElements = [];

  for (let i = children.length - 1; i >= 0; i--) {
    const child = children[i];
    const txt = (child.textContent || '').trim();
    // Stop at tool lines, prompt lines, or existing plan buttons
    if (child.classList.contains('agent-line-tool') ||
        child.classList.contains('agent-line-prompt') ||
        child.classList.contains('plan-show-btn')) break;
    // Skip the ExitPlanMode tool line itself (already handled above)
    if (txt === '[tool: ExitPlanMode]') continue;
    planLines.unshift(child.textContent || child.innerText || '');
    planElements.unshift(child);
  }

  if (planLines.length < 2) return; // Too few lines, not a real plan

  // Store plan content
  planViewerContent[sessionId] = planLines;

  // Wrap plan elements in a hidden container
  const wrapper = document.createElement('div');
  wrapper.className = 'plan-hidden-block';
  wrapper.dataset.sessionId = sessionId;
  const insertBefore = planElements[0];
  container.insertBefore(wrapper, insertBefore);
  for (const el of planElements) wrapper.appendChild(el);

  // Insert "Show Plan" button before the hidden block
  const btn = document.createElement('button');
  btn.className = 'plan-show-btn';
  btn.innerHTML = '&#128196; Show Plan';
  btn.onclick = () => openPlanViewer(sessionId);
  container.insertBefore(btn, wrapper);
}

const expandedOutputSessions = new Set();  // sessions where user clicked "load all"

function expandAgentOutput(sessionId) {
  expandedOutputSessions.add(sessionId);
  refreshModal();
}

function appendAgentLine(sessionId, text) {
  const el = document.getElementById(`agent-output-${sessionId}`);
  if (!el) return;
  el.style.display = 'block';

  // Split multi-line text blocks into individual lines
  // But keep user prompts (> ) as a single block so styling covers all lines
  if (text.includes('\n') && !text.trimStart().startsWith('> ')) {
    for (const line of text.split('\n')) {
      appendAgentLine(sessionId, line);
    }
    return;
  }

  // Group consecutive table lines into a single styled block
  if (isTableLine(text)) {
    let block = el.lastElementChild;
    if (block && (block.classList.contains('hl-table') || block.classList.contains('hl-table-pre'))) {
      block._rawLines.push(text);
    } else {
      block = document.createElement('div');
      block._rawLines = [text];
      el.appendChild(block);
    }
    // Rebuild: pipe tables get <table>, box-drawing stays pre-formatted
    if (isPipeTable(block._rawLines)) {
      block.className = 'hl-table';
      block.innerHTML = buildPipeTable(block._rawLines);
    } else {
      block.className = 'hl-table-pre';
      block.innerHTML = block._rawLines.map(l => formatTableLine(esc(l))).join('\n');
    }
    el.scrollTop = el.scrollHeight;
    return;
  }
  // Blank lines inside a table: keep them in the table block
  if (text.trim() === '') {
    const last = el.lastElementChild;
    if (last && (last.classList.contains('hl-table') || last.classList.contains('hl-table-pre'))) {
      last._rawLines.push(text);
      el.scrollTop = el.scrollHeight;
      return;
    }
  }

  const div = document.createElement('div');
  const cls = agentLineCls(text);
  div.className = cls;
  // Reset stuck-plan counter only when a non-plan-related tool appears
  if (cls.includes('agent-line-tool') && !text.includes('ExitPlanMode') && !text.includes('EnterPlanMode')) {
    exitPlanModeCount[sessionId] = 0;
  }
  // Use rich formatting for regular text lines, plain for special lines
  if (cls.includes('agent-line-tool') || cls.includes('agent-line-error') || cls.includes('agent-line-followup') || cls.includes('agent-line-queued') || cls.includes('agent-line-prompt')) {
    div.textContent = text;
  } else {
    div.innerHTML = formatAgentText(text);
  }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;

  // Plan detection: [tool: ExitPlanMode] signals end of plan
  if (text.trim() === '[tool: ExitPlanMode]') {
    exitPlanModeCount[sessionId] = (exitPlanModeCount[sessionId] || 0) + 1;
    collapseIntoPlanButton(sessionId, el);

    // Show "Approve Plan" button on first ExitPlanMode
    if (exitPlanModeCount[sessionId] === 1) {
      const cached = agentStatusCache[sessionId];
      const pid = cached ? cached.projectId : null;
      if (pid) {
        const approveRow = document.createElement('div');
        approveRow.className = 'plan-approve-row';
        approveRow.id = `plan-approve-${sessionId}`;
        approveRow.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 0;margin:6px 0';
        approveRow.innerHTML = `<span style="color:var(--text-dim);font-size:12px">Agent is waiting for plan approval.</span>
          <button style="background:var(--green);color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer" onclick="approvePlan('${esc(pid)}','${esc(sessionId)}')">Approve Plan</button>`;
        el.appendChild(approveRow);
        el.scrollTop = el.scrollHeight;
      }
    }

    // Detect stuck ExitPlanMode loop (agent can't exit plan mode via non-interactive dispatch)
    if (exitPlanModeCount[sessionId] >= 2) {
      // Remove the approve button if still present (will re-add with warning)
      const oldApprove = document.getElementById(`plan-approve-${sessionId}`);
      if (oldApprove) oldApprove.remove();
      const cached = agentStatusCache[sessionId];
      const pid = cached ? cached.projectId : null;
      const warn = document.createElement('div');
      warn.style.cssText = 'background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber-text);padding:8px 12px;border-radius:6px;margin:6px 0;font-size:12px;line-height:1.5;display:flex;align-items:center;gap:10px;flex-wrap:wrap';
      warn.innerHTML = `&#x26A0; Agent is stuck trying to exit plan mode.${pid ? ` <button style="background:var(--green);color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer" onclick="approvePlan('${esc(pid)}','${esc(sessionId)}')">Approve Plan</button>` : ''}`;
      el.appendChild(warn);
      el.scrollTop = el.scrollHeight;
      exitPlanModeCount[sessionId] = 0; // Reset so it doesn't spam
    }

    // Check for plan file and inject button
    const cached = agentStatusCache[sessionId];
    if (cached && cached.projectId) {
      fetch(API_BASE + `/api/project/${cached.projectId}/agent/status`)
        .then(r => r.json())
        .then(data => {
          const s = (data.sessions || []).find(x => x.session_id === sessionId);
          if (s && s.plan_file) {
            cached.planFile = s.plan_file;
            // Fetch plan content to extract heading for button label
            fetch(API_BASE + `/api/project/${cached.projectId}/agent/plan-file?session=${sessionId}`)
              .then(r => r.ok ? r.json() : null)
              .then(planData => {
                const fname = s.plan_file.split(/[/\\]/).pop();
                let label;
                if (planData && planData.content) {
                  const headingMatch = planData.content.match(/^#\s+(.+)/m);
                  if (headingMatch) {
                    label = headingMatch[1].trim();
                    if (label.length > 40) label = label.slice(0, 37) + '...';
                    planFileTitle[sessionId] = label;
                  }
                }
                if (!label) label = planFileLabel(cached.task || fname);
                const container = document.getElementById(`plan-file-btn-${sessionId}`);
                if (container && !container.innerHTML.trim()) {
                  container.innerHTML = `<button class="btn-plan-file" onclick="openPlanFileViewer('${esc(cached.projectId)}','${esc(sessionId)}')" title="${esc(fname)}">&#128196; ${esc(label)}</button>`;
                }
              }).catch(() => {
                const fname = s.plan_file.split(/[/\\]/).pop();
                const label = planFileLabel(cached.task || fname);
                const container = document.getElementById(`plan-file-btn-${sessionId}`);
                if (container && !container.innerHTML.trim()) {
                  container.innerHTML = `<button class="btn-plan-file" onclick="openPlanFileViewer('${esc(cached.projectId)}','${esc(sessionId)}')" title="${esc(fname)}">&#128196; ${esc(label)}</button>`;
                }
              });
          }
        }).catch(() => {});
    }
  }
}

function approvePlan(projectId, sessionId) {
  // Remove the approve button/row
  const row = document.getElementById(`plan-approve-${sessionId}`);
  if (row) row.remove();
  // Send approval as a follow-up
  const input = document.getElementById(`agent-followup-${sessionId}`);
  if (input) {
    input.value = 'Plan approved, please continue.';
    sendFollowup(projectId, sessionId);
  } else {
    // Fallback: send directly via API
    const echoEl = document.getElementById(`agent-output-${sessionId}`);
    if (echoEl) {
      const div = document.createElement('div');
      div.className = 'agent-line agent-line-prompt agent-echo';
      div.textContent = '> Plan approved, please continue.';
      div.style.whiteSpace = 'pre-wrap';
      echoEl.appendChild(div);
      echoEl.scrollTop = echoEl.scrollHeight;
    }
    fetch(API_BASE + `/api/project/${projectId}/agent/followup`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: 'Plan approved, please continue.', session_id: sessionId })
    }).catch(() => {});
  }
}

let _aqCounter = 0;
function renderAgentQuestion(sessionId, projectId, questions) {
  const el = document.getElementById(`agent-output-${sessionId}`);
  if (!el || !questions || !questions.length) return;
  const formId = `aq-${sessionId}-${_aqCounter++}`;

  const container = document.createElement('div');
  container.className = 'agent-question';
  container.id = formId;

  let html = '';
  questions.forEach((q, qi) => {
    const inputType = q.multiSelect ? 'checkbox' : 'radio';
    const groupName = `${formId}-q${qi}`;
    html += `<div class="agent-question-header">${esc(q.header || 'Question')}</div>`;
    html += `<div class="agent-question-text">${esc(q.question)}</div>`;
    html += `<div class="agent-question-options" data-qidx="${qi}">`;
    (q.options || []).forEach((opt, oi) => {
      html += `<div class="agent-question-option">
        <input type="${inputType}" name="${groupName}" id="${groupName}-o${oi}" value="${esc(opt.label)}" data-desc="${esc(opt.description || '')}">
        <label for="${groupName}-o${oi}">${esc(opt.label)}${opt.description ? `<span class="aq-desc">${esc(opt.description)}</span>` : ''}</label>
      </div>`;
    });
    // "Other" option
    html += `<div class="agent-question-option">
      <input type="${inputType}" name="${groupName}" id="${groupName}-other" value="__other__" onchange="document.getElementById('${groupName}-other-text').classList.toggle('visible', this.checked || this.selected)">
      <label for="${groupName}-other">Other</label>
    </div>`;
    html += `<input type="text" class="agent-question-other" id="${groupName}-other-text" placeholder="Type your answer...">`;
    html += `</div>`;
  });
  html += `<div class="agent-question-actions">
    <button onclick="submitQuestionAnswer('${esc(projectId)}','${esc(sessionId)}','${formId}',${questions.length})">Submit Answer</button>
  </div>`;

  container.innerHTML = html;
  el.appendChild(container);
  el.scrollTop = el.scrollHeight;

  // Show/hide "Other" text field on radio change
  container.querySelectorAll('input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', () => {
      const group = radio.name;
      const otherText = document.getElementById(group + '-other-text');
      const otherRadio = document.getElementById(group + '-other');
      if (otherText) otherText.classList.toggle('visible', otherRadio && otherRadio.checked);
    });
  });
  container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.value === '__other__') {
        const otherText = document.getElementById(cb.name + '-other-text');
        if (otherText) otherText.classList.toggle('visible', cb.checked);
      }
    });
  });
}

function submitQuestionAnswer(projectId, sessionId, formId, questionCount) {
  const container = document.getElementById(formId);
  if (!container) return;

  const answers = [];
  for (let qi = 0; qi < questionCount; qi++) {
    const groupName = `${formId}-q${qi}`;
    const checked = container.querySelectorAll(`input[name="${groupName}"]:checked`);
    const parts = [];
    checked.forEach(input => {
      if (input.value === '__other__') {
        const otherText = document.getElementById(groupName + '-other-text');
        if (otherText && otherText.value.trim()) parts.push(otherText.value.trim());
      } else {
        parts.push(input.value);
      }
    });
    if (parts.length === 0) continue;
    // Find the question text from the header
    const qTextEl = container.querySelectorAll('.agent-question-text')[qi];
    const qText = qTextEl ? qTextEl.textContent : '';
    answers.push({ question: qText, answer: parts.join(', ') });
  }

  if (answers.length === 0) return;

  // Format answer as a clear text message
  let message = answers.map(a =>
    a.question ? `${a.question}\nAnswer: ${a.answer}` : a.answer
  ).join('\n\n');

  // Mark the form as answered
  container.classList.add('answered');
  const actionsEl = container.querySelector('.agent-question-actions');
  if (actionsEl) actionsEl.innerHTML = `<div class="agent-question-answer">Answered: ${esc(answers.map(a => a.answer).join(', '))}</div>`;
  // Disable inputs
  container.querySelectorAll('input').forEach(i => i.disabled = true);

  // Send as follow-up
  const input = document.getElementById(`agent-followup-${sessionId}`);
  if (input) {
    input.value = message;
    sendFollowup(projectId, sessionId);
  } else {
    // Fallback: direct API call
    fetch(API_BASE + `/api/project/${projectId}/agent/followup`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message, session_id: sessionId })
    }).catch(() => {});
  }
}

async function sendFollowup(projectId, sessionId) {
  const input = document.getElementById(`agent-followup-${sessionId}`);
  const message = input.value.trim();
  if (!message) { input.focus(); return; }
  input.value = '';
  if (input.id) delete textareaValues[input.id];

  // Immediate local echo — show the user's message in DOM only (not buffer)
  // The server will send the real version via SSE which gets added to the buffer
  const echoEl = document.getElementById(`agent-output-${sessionId}`);
  if (echoEl) {
    const div = document.createElement('div');
    div.className = 'agent-line agent-line-prompt agent-echo';
    div.textContent = `> ${message}`;
    div.style.whiteSpace = 'pre-wrap';
    echoEl.appendChild(div);
    echoEl.scrollTop = echoEl.scrollHeight;
  }

  // Upload any pasted images and build final message
  const imageKey = 'fu_' + sessionId;
  const imagePaths = await uploadAgentImages(imageKey);
  const fullMessage = buildTaskWithImages(message, imagePaths);
  clearAgentImages(imageKey);
  // Remove preview thumbnails from DOM
  const previewContainer = input.closest('.agent-chat-input')?.querySelector('.agent-image-previews');
  if (previewContainer) previewContainer.remove();

  // Optimistically update status to running before API returns
  if (agentStatusCache[sessionId]) {
    agentStatusCache[sessionId].status = 'running';
    delete agentStatusCache[sessionId].usage;
    delete agentStatusCache[sessionId].cost_usd;
  }
  updateHistoryStatus(sessionId, 'running');
  updateAgentStatusUI(sessionId, 'running');

  // Fire the API call without blocking — SSE will deliver the response
  fetch(API_BASE + `/api/project/${projectId}/agent/followup`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ message: fullMessage, session_id: sessionId })
  }).then(r => r.json()).then(data => {
    if (!data.ok && !data.queued) {
      console.error('Follow-up failed:', data.error);
    }
    // If queued, update the echo to show queued status
    if (data.queued) {
      const el = document.getElementById(`agent-output-${sessionId}`);
      if (el) {
        const echo = el.querySelector('.agent-echo');
        if (echo) {
          echo.classList.add('agent-echo-queued');
          echo.textContent = `> [queued] ${message}`;
        }
      }
    }
    // Reconnect SSE after server confirms (agent process is now started)
    if (!data.queued && !agentEventSources[sessionId]) {
      connectAgentStream(projectId, sessionId);
    }
  }).catch(e => console.error('Follow-up error:', e));
}

async function stopAgent(projectId, sessionId) {
  try {
    await fetch(API_BASE + `/api/project/${projectId}/agent/stop`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ session_id: sessionId })
    });
    if (agentStatusCache[sessionId]) agentStatusCache[sessionId].status = 'stopped';
    updateHistoryStatus(sessionId, 'stopped');
    if (agentEventSources[sessionId]) {
      agentEventSources[sessionId].close();
      delete agentEventSources[sessionId];
    }
    refreshModal();
    renderAgentConsole();
    refreshSilent();
  } catch(e) {}
}

// Fetch all agent sessions for a project on modal open / page boot
async function fetchAgentStatus(projectId) {
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/agent/status`);
    const data = await res.json();
    const sessions = data.sessions || [];
    const pName = (allProjects.find(x => x.id === projectId) || {}).name || projectId;

    for (const s of sessions) {
      const sid = s.session_id;
      agentStatusCache[sid] = { status: s.status, task: s.task, projectId, startedAt: s.started_at, planFile: s.plan_file || '', usage: s.usage || {}, cost_usd: s.cost_usd || 0, num_turns: s.num_turns || 0 };
      if (s.log_lines && s.log_lines.length > 0) {
        agentOutputBuffers[sid] = s.log_lines;
      }
      if (!agentHistory.find(h => h.sessionId === sid)) {
        agentHistory.unshift({ projectId, sessionId: sid, projectName: pName, task: s.task || '', status: s.status, startedAt: s.started_at || '' });
      }
      if (s.status === 'running' || s.status === 'idle') {
        connectAgentStream(projectId, sid);
      }
    }
    // Set active tab to most recent running/idle, or first session
    if (sessions.length > 0 && !activeAgentTab[projectId]) {
      const running = sessions.find(s => s.status === 'running' || s.status === 'idle');
      activeAgentTab[projectId] = running ? running.session_id : sessions[0].session_id;
    }
    if (sessions.length > 0) renderAgentConsole();
  } catch(e) {}
}

async function toggleAgentLog(projectId) {
  const body = document.getElementById(`agent-log-body-${projectId}`);
  const chevron = document.getElementById(`agent-log-chevron-${projectId}`);
  if (!body) return;

  const isOpen = body.classList.contains('open');
  agentLogOpen[projectId] = !isOpen;
  body.classList.toggle('open');
  chevron?.classList.toggle('open');

  if (!isOpen) {
    await loadAgentLog(projectId);  // always re-fetch on open for fresh data
  }
}

async function loadAgentLog(projectId) {
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/agent/log`);
    agentLogCache[projectId] = await res.json();
    // Populate planFile in status cache from agent log entries
    for (const entry of agentLogCache[projectId]) {
      if (entry.plan_file && entry.session_id) {
        const cached = agentStatusCache[entry.session_id];
        if (cached && !cached.planFile) {
          cached.planFile = entry.plan_file;
        }
      }
    }
    // Auto-set default resume if not explicitly chosen yet
    if (!(projectId in pendingResumeId)) {
      pendingResumeId[projectId] = getDefaultResumeId(projectId);
    }
    refreshModal();
  } catch(e) {}
}

// ── Plans tab ─────────────────────────────────────────────────────────────────

let plansCache = {};
let planSelections = {};  // projectId → Set of plan_file paths

async function loadProjectPlans(projectId) {
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/plans`);
    plansCache[projectId] = await res.json();
  } catch(e) {
    plansCache[projectId] = [];
  }
  refreshModal();
  setTimeout(() => renderPlansTab(projectId), 50);
}

function renderPlansTab(projectId) {
  const container = document.getElementById(`plans-list-${projectId}`);
  const toolbar = document.getElementById(`plans-toolbar-${projectId}`);
  if (!container) return;
  const plans = plansCache[projectId] || [];
  if (!planSelections[projectId]) planSelections[projectId] = new Set();
  const sel = planSelections[projectId];

  if (!plans.length) {
    if (toolbar) toolbar.style.display = 'none';
    container.innerHTML = '<div style="color:var(--text-faint);font-style:italic">No plans yet. Plans are created when an agent uses EnterPlanMode / ExitPlanMode.</div>';
    return;
  }

  // Toolbar
  if (toolbar) {
    const selCount = sel.size;
    const allChecked = selCount === plans.length && plans.length > 0;
    toolbar.style.display = 'flex';
    toolbar.className = 'plans-toolbar';
    toolbar.innerHTML = `
      <label><input type="checkbox" ${allChecked ? 'checked' : ''} onchange="toggleAllPlans('${esc(projectId)}', this.checked)"> Select All</label>
      ${selCount > 0 ? `<button class="btn-plans-action btn-plans-delete" onclick="deleteSelectedPlans('${esc(projectId)}')">Delete Selected (${selCount})</button>` : ''}
      ${selCount > 0 ? `<button class="btn-plans-action" onclick="exportSelectedPlans('${esc(projectId)}')">Export (${selCount})</button>` : ''}
    `;
  }

  container.innerHTML = plans.map(p => {
    const pathEsc = esc(p.plan_file.replace(/\\/g,'\\\\'));
    const checked = sel.has(p.plan_file) ? 'checked' : '';
    return `
    <div class="plan-history-card">
      <input type="checkbox" class="plan-cb" ${checked} onchange="togglePlanSelection('${esc(projectId)}','${pathEsc}',this.checked)" onclick="event.stopPropagation()">
      <div class="plan-card-body" onclick="openPlanFromHistory('${pathEsc}','${esc(p.title)}')">
        <div class="plan-history-title">${esc(p.title)}</div>
        <div class="plan-history-meta">
          <span>${esc(p.ts_relative || '')}</span>
          <span class="plan-history-task">${esc((p.task || '').length > 80 ? p.task.slice(0,77) + '...' : (p.task || ''))}</span>
        </div>
        <div class="plan-history-filename">${esc(p.filename || '')}</div>
      </div>
      <button class="plan-card-delete" onclick="event.stopPropagation();deleteSinglePlan('${esc(projectId)}','${pathEsc}','${esc(p.title)}')" title="Delete plan">&times;</button>
    </div>`;
  }).join('');
}

function togglePlanSelection(projectId, planPath, checked) {
  if (!planSelections[projectId]) planSelections[projectId] = new Set();
  const decoded = planPath.replace(/\\\\/g, '\\');
  if (checked) planSelections[projectId].add(decoded);
  else planSelections[projectId].delete(decoded);
  renderPlansTab(projectId);
}

function toggleAllPlans(projectId, checked) {
  const plans = plansCache[projectId] || [];
  if (!planSelections[projectId]) planSelections[projectId] = new Set();
  if (checked) plans.forEach(p => planSelections[projectId].add(p.plan_file));
  else planSelections[projectId].clear();
  renderPlansTab(projectId);
}

async function deleteSinglePlan(projectId, planPath, title) {
  const decoded = planPath.replace(/\\\\/g, '\\');
  if (!confirm(`Delete plan "${title}"? This cannot be undone.`)) return;
  try {
    await fetch(API_BASE + '/api/plans/delete', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({paths: [decoded]})
    });
  } catch(e) {}
  if (planSelections[projectId]) planSelections[projectId].delete(decoded);
  loadProjectPlans(projectId);
}

async function deleteSelectedPlans(projectId) {
  const sel = planSelections[projectId];
  if (!sel || !sel.size) return;
  if (!confirm(`Delete ${sel.size} plan(s)? This cannot be undone.`)) return;
  try {
    await fetch(API_BASE + '/api/plans/delete', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({paths: Array.from(sel)})
    });
  } catch(e) {}
  planSelections[projectId] = new Set();
  loadProjectPlans(projectId);
}

async function exportSelectedPlans(projectId) {
  const sel = planSelections[projectId];
  if (!sel || !sel.size) return;
  for (const planPath of sel) {
    try {
      const res = await fetch(API_BASE + `/api/plan-file?path=${encodeURIComponent(planPath)}`);
      if (!res.ok) continue;
      const data = await res.json();
      const blob = new Blob([data.content || ''], {type: 'text/markdown'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = data.filename || 'plan.md';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) {}
  }
}

async function openPlanFromHistory(planPath, title) {
  const modalId = '__planhistory_' + planPath.replace(/[^a-zA-Z0-9]/g, '_').slice(-30);
  if (openModals.has(modalId)) { focusModal(modalId); return; }

  let content;
  try {
    const res = await fetch(API_BASE + `/api/plan-file?path=${encodeURIComponent(planPath)}`);
    if (!res.ok) throw new Error('Failed to load');
    const data = await res.json();
    content = data.content || '';
  } catch(e) {
    content = 'Failed to load plan file.';
  }

  // Render with rich formatting (same as openPlanFileViewer)
  const lines = content.split('\n');
  let bodyHTML = '';
  let tableLines = [];
  function flushTable() {
    if (tableLines.length === 0) return;
    if (isPipeTable(tableLines)) {
      bodyHTML += `<div class="hl-table">${buildPipeTable(tableLines)}</div>`;
    } else {
      bodyHTML += `<div class="hl-table-pre">${tableLines.map(l => formatTableLine(esc(l))).join('\n')}</div>`;
    }
    tableLines = [];
  }
  for (const line of lines) {
    if (isTableLine(line)) {
      tableLines.push(line);
    } else if (tableLines.length > 0 && line.trim() === '') {
      tableLines.push(line);
    } else {
      flushTable();
      bodyHTML += `<div class="agent-line">${formatAgentText(line)}</div>`;
    }
  }
  flushTable();

  const win = document.createElement('div');
  win.className = 'modal-window';
  win.dataset.modalId = modalId;
  const contentEl = document.createElement('div');
  contentEl.className = 'modal-content plan-viewer-content';
  contentEl.innerHTML = `
    <div class="modal-window-controls">
      <button class="modal-minimize" onclick="minimizeModal('${esc(modalId)}')" title="Minimize">&#x2015;</button>
      <button class="modal-close" onclick="closeModalById('${esc(modalId)}')" title="Close">&#10005;</button>
    </div>
    <div class="plan-viewer-header modal-header">
      <h3 style="color:#c4b5fd;margin:0;font-size:15px">&#128196; ${esc(title)}</h3>
      <div style="color:var(--text-faint);font-size:12px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(planPath.split(/[/\\]/).pop())}</div>
    </div>
    <div class="plan-viewer-body">${bodyHTML}</div>`;
  win.appendChild(contentEl);
  document.getElementById('modal-layer').appendChild(win);
  const z = nextModalZ++;
  win.style.zIndex = z;
  openModals.set(modalId, { projectId: null, element: win, minimized: false, zIndex: z });
  centerModalElement(win);
  focusModal(modalId);
}

// ── Agent Log continue ───────────────────────────────────────────────────────

function toggleContinueInput(projectId, entryId, claudeSessionId) {
  const el = document.getElementById(`continue-input-${entryId}`);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.agent-log-continue-input.open').forEach(x => x.classList.remove('open'));
  continueInputOpen = {};
  if (!isOpen) {
    el.classList.add('open');
    continueInputOpen[entryId] = true;
    setTimeout(() => document.getElementById(`continue-msg-${entryId}`)?.focus(), 50);
  }
}

async function dispatchContinue(projectId, entryId, claudeSessionId) {
  const input = document.getElementById(`continue-msg-${entryId}`);
  const task = input.value.trim();
  if (!task) { input.focus(); return; }
  input.value = '';
  if (input.id) delete textareaValues[input.id];
  continueInputOpen = {};

  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/agent/dispatch`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ task, resume_conversation_id: claudeSessionId })
    });
    const data = await res.json();
    if (!data.ok) { alert(data.error || 'Continue failed'); return; }
    const sessionId = data.session_id;
    const pName = (allProjects.find(x => x.id === projectId) || {}).name || projectId;

    agentOutputBuffers[sessionId] = [`> [continuing conversation] ${task}`];
    agentStatusCache[sessionId] = { status: 'running', task, projectId, startedAt: new Date().toISOString() };
    agentHistory.unshift({ projectId, sessionId, projectName: pName, task, status: 'running', startedAt: new Date().toISOString() });
    activeAgentTab[projectId] = sessionId;

    modalActiveTab[projectId] = 'agent';
    refreshModal();
    renderAgentConsole();
    connectAgentStream(projectId, sessionId);
  } catch(e) {
    alert('Failed to continue: ' + e.message);
  }
}

// ── Agent image paste ────────────────────────────────────────────────────────

function handleAgentPaste(e, key) {
  const items = Array.from(e.clipboardData?.items || []);
  const imageItems = items.filter(i => i.type.startsWith('image/'));
  if (imageItems.length === 0) return;
  e.preventDefault();
  const list = agentPendingImages[key] || [];
  for (const item of imageItems) {
    const blob = item.getAsFile();
    if (blob) {
      list.push({ file: blob, objectUrl: URL.createObjectURL(blob), serverPath: null });
    }
  }
  agentPendingImages[key] = list;
  refreshModal();
}

function renderAgentImagePreviews(key) {
  const list = agentPendingImages[key] || [];
  if (list.length === 0) return '';
  return `<div class="agent-image-previews">${list.map((img, i) => `
    <div class="agent-image-preview">
      <img src="${img.objectUrl}" alt="paste">
      <button class="create-preview-remove" onclick="removeAgentImage('${esc(key)}',${i})">&#10005;</button>
    </div>`).join('')}</div>`;
}

function removeAgentImage(key, index) {
  const list = agentPendingImages[key] || [];
  if (list[index]) URL.revokeObjectURL(list[index].objectUrl);
  list.splice(index, 1);
  if (list.length === 0) delete agentPendingImages[key];
  refreshModal();
}

async function uploadAgentImages(key) {
  const list = agentPendingImages[key] || [];
  const paths = [];
  for (const img of list) {
    if (img.serverPath) { paths.push(img.serverPath); continue; }
    const fd = new FormData();
    fd.append('file', img.file, img.file.name || 'screenshot.png');
    try {
      const res = await fetch(API_BASE + '/api/agent/upload-image', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.ok) { img.serverPath = data.path; paths.push(data.path); }
    } catch(e) {}
  }
  return paths;
}

function buildTaskWithImages(task, imagePaths) {
  if (imagePaths.length === 0) return task;
  const refs = imagePaths.map(p => `[Screenshot: ${p}]`).join('\n');
  return `${task}\n\n${refs}`;
}

function clearAgentImages(key) {
  const list = agentPendingImages[key] || [];
  for (const img of list) URL.revokeObjectURL(img.objectUrl);
  delete agentPendingImages[key];
}

async function toggleRulesPanel(projectId) {

  const chevron = document.getElementById(`rules-chevron-${projectId}`);
  if (!body) return;

  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  chevron?.classList.toggle('open');

  if (!isOpen && !rulesLoaded[projectId]) {
    await loadRules(projectId);
  }
}

async function loadRules(projectId) {
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/rules`);
    const data = await res.json();
    rulesLoaded[projectId] = data;
    const agentEl = document.getElementById(`rules-agent-${projectId}`);
    const sharedEl = document.getElementById(`rules-shared-${projectId}`);
    if (agentEl) agentEl.value = data.agent_rules || '';
    if (sharedEl) sharedEl.value = data.shared_rules || '';
  } catch(e) {}
}

async function saveProjectRules(projectId) {
  const el = document.getElementById(`rules-agent-${projectId}`);
  if (!el) return;
  try {
    await fetch(API_BASE + `/api/project/${projectId}/rules`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ agent_rules: el.value })
    });
    if (rulesLoaded[projectId]) rulesLoaded[projectId].agent_rules = el.value;
    flashSaved(`rules-saved-agent-${projectId}`);
  } catch(e) { alert('Failed to save rules'); }
}

async function saveSharedRules(projectId) {
  const el = document.getElementById(`rules-shared-${projectId}`);
  if (!el) return;
  try {
    await fetch(API_BASE + '/api/rules/shared', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ shared_rules: el.value })
    });
    if (rulesLoaded[projectId]) rulesLoaded[projectId].shared_rules = el.value;
    flashSaved(`rules-saved-shared-${projectId}`);
  } catch(e) { alert('Failed to save shared rules'); }
}

function flashSaved(elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Agent Console (persistent bottom panel) ─────────────────────────────────

function updateHistoryStatus(sessionId, status) {
  const entry = agentHistory.find(h => h.sessionId === sessionId);
  if (entry) entry.status = status;
}

function toggleAgentConsole() {
  const el = document.getElementById('agent-console');
  acExpanded = !acExpanded;
  el.classList.toggle('collapsed', !acExpanded);
  el.classList.toggle('expanded', acExpanded);
  document.body.classList.toggle('console-open', acExpanded);
  document.body.classList.toggle('console-visible', !acExpanded && !el.classList.contains('hidden'));
}

function toggleConsoleSession(sessionId) {
  if (acOpenSessions.has(sessionId)) acOpenSessions.delete(sessionId);
  else acOpenSessions.add(sessionId);
  renderAgentConsole();
}

function renderAgentConsole() {
  const el = document.getElementById('agent-console');
  const body = document.getElementById('ac-body');
  const countEl = document.getElementById('ac-count');

  if (agentHistory.length === 0) {
    el.classList.add('hidden');
    document.body.classList.remove('console-open', 'console-visible');
    return;
  }

  el.classList.remove('hidden');
  if (!acExpanded) document.body.classList.add('console-visible');

  const runningCount = agentHistory.filter(h => h.status === 'running' || h.status === 'idle').length;
  countEl.textContent = runningCount > 0 ? `${runningCount} running` : agentHistory.length;
  countEl.classList.toggle('has-running', runningCount > 0);

  body.innerHTML = agentHistory.map(h => {
    const isOpen = acOpenSessions.has(h.sessionId);
    const rawBuf = agentOutputBuffers[h.sessionId] || [];
    // Only split lines when panel is open (expensive for large buffers)
    const allLines = isOpen ? rawBuf.flatMap(l => l.trimStart().startsWith('> ') ? [l] : l.split('\n')) : [];
    const lines = allLines.length > 200 ? allLines.slice(-200) : allLines;
    const outputHTML = (() => {
      if (!isOpen) return '';
      let result = '';
      let tableLines = [];
      function flushTable() {
        if (tableLines.length === 0) return;
        if (isPipeTable(tableLines)) {
          result += `<div class="hl-table">${buildPipeTable(tableLines)}</div>`;
        } else {
          result += `<div class="hl-table-pre">${tableLines.map(l => formatTableLine(esc(l))).join('\n')}</div>`;
        }
        tableLines = [];
      }
      for (const l of lines) {
        if (isTableLine(l)) {
          tableLines.push(l);
        } else if (tableLines.length > 0 && l.trim() === '') {
          tableLines.push(l);
        } else {
          flushTable();
          const cls = agentLineCls(l);
          const html = cls.includes('agent-line-tool') || cls.includes('agent-line-error') || cls.includes('agent-line-followup') || cls.includes('agent-line-queued') || cls.includes('agent-line-prompt')
            ? esc(l) : formatAgentText(l);
          result += `<div class="${cls}">${html}</div>`;
        }
      }
      flushTable();
      return result;
    })();

    const stopBtn = (h.status === 'running' || h.status === 'idle')
      ? `<button class="ac-stop-btn" onclick="event.stopPropagation();stopAgent('${esc(h.projectId)}','${esc(h.sessionId)}')" title="Stop agent">Stop</button>`
      : '';

    // Show last tool activity in console header for running sessions
    let lastTool = '';
    if (h.status === 'running') {
      for (let i = rawBuf.length - 1; i >= 0; i--) {
        if (rawBuf[i].startsWith('[tool:')) { lastTool = rawBuf[i]; break; }
      }
    }

    return `<div class="ac-session">
      <div class="ac-session-header" onclick="toggleConsoleSession('${esc(h.sessionId)}')">
        <span class="agent-status-dot ${h.status}"></span>
        <span class="ac-session-project">${esc(h.projectName)}</span>
        <span class="ac-session-task" title="${esc(h.task)}">${esc(h.task)}</span>
        ${lastTool ? `<span class="agent-activity" id="ac-activity-${esc(h.sessionId)}">${esc(lastTool)}</span>` : ''}
        ${stopBtn}
        <span class="ac-session-time">${h.startedAt ? timeAgoShort(h.startedAt) : ''}</span>
        <span class="ac-session-chevron ${isOpen ? 'open' : ''}">&#9654;</span>
      </div>
      <div class="ac-session-output ${isOpen ? 'open' : ''}" id="ac-output-${esc(h.sessionId)}">${outputHTML}</div>
    </div>`;
  }).join('');
}

function updateConsoleOutput(sessionId) {
  const el = document.getElementById(`ac-output-${sessionId}`);
  if (!el) return;
  const lines = agentOutputBuffers[sessionId] || [];
  const lastEntry = lines[lines.length - 1];
  if (!lastEntry) return;

  // Split multi-line text blocks into individual lines
  const subLines = lastEntry.split('\n');
  for (const lastLine of subLines) {
    // Group consecutive table lines into a single styled block
    if (isTableLine(lastLine)) {
      let block = el.lastElementChild;
      if (block && (block.classList.contains('hl-table') || block.classList.contains('hl-table-pre'))) {
        block._rawLines.push(lastLine);
      } else {
        block = document.createElement('div');
        block._rawLines = [lastLine];
        el.appendChild(block);
      }
      if (isPipeTable(block._rawLines)) {
        block.className = 'hl-table';
        block.innerHTML = buildPipeTable(block._rawLines);
      } else {
        block.className = 'hl-table-pre';
        block.innerHTML = block._rawLines.map(l => formatTableLine(esc(l))).join('\n');
      }
      continue;
    }
    if (lastLine.trim() === '') {
      const last = el.lastElementChild;
      if (last && (last.classList.contains('hl-table') || last.classList.contains('hl-table-pre'))) {
        last._rawLines.push(lastLine);
        continue;
      }
    }

    const div = document.createElement('div');
    const cls = agentLineCls(lastLine);
    div.className = cls;
    if (cls.includes('agent-line-tool') || cls.includes('agent-line-error') || cls.includes('agent-line-followup') || cls.includes('agent-line-queued') || cls.includes('agent-line-prompt')) {
      div.textContent = lastLine;
    } else {
      div.innerHTML = formatAgentText(lastLine);
    }
    el.appendChild(div);
  }
  el.scrollTop = el.scrollHeight;
}

function timeAgoShort(ts) {
  try {
    const d = new Date(ts);
    const secs = Math.floor((Date.now() - d.getTime()) / 1000);
    if (secs < 60) return `${secs}s`;
    if (secs < 3600) return `${Math.floor(secs/60)}m`;
    if (secs < 86400) return `${Math.floor(secs/3600)}h`;
    return `${Math.floor(secs/86400)}d`;
  } catch { return ''; }
}

function switchModalTab(projectId, tab) {
  modalActiveTab[projectId] = tab;
  if (tab === 'agent-log') {
    loadAgentLog(projectId);
    return;
  }
  if (tab === 'memory' && !memoryCache[projectId]) {
    loadMemory(projectId);
    return;
  }
  if (tab === 'rules' && !rulesLoaded[projectId]) {
    loadRules(projectId).then(() => refreshModal());
    return;
  }
  if (tab === 'plans') {
    loadProjectPlans(projectId);
    return;
  }
  refreshModal();
}

// ── Tab search / filter ─────────────────────────────────────────────────────

function findModalIdForProject(projectId) {
  for (const [modalId, entry] of openModals) {
    if (entry.projectId === projectId) return modalId;
  }
  return null;
}

function applyTabFilter(projectId) {
  const query = (modalSearchQuery[projectId] || '').toLowerCase().trim();
  const modalId = findModalIdForProject(projectId);
  if (!modalId) return;
  const el = openModals.get(modalId).element;
  const activeTab = modalActiveTab[projectId] || 'agent';

  if (activeTab === 'backlog') {
    el.querySelectorAll('.backlog-item').forEach(item => {
      const text = (item.querySelector('.backlog-text')?.textContent || '').toLowerCase();
      item.style.display = (!query || text.includes(query)) ? '' : 'none';
    });
  } else if (activeTab === 'agent-log') {
    el.querySelectorAll('.agent-log-entry').forEach(item => {
      const task = (item.querySelector('.agent-log-task')?.textContent || '').toLowerCase();
      const summary = (item.querySelector('.agent-log-summary')?.textContent || '').toLowerCase();
      item.style.display = (!query || task.includes(query) || summary.includes(query)) ? '' : 'none';
    });
  } else if (activeTab === 'activity') {
    el.querySelectorAll('.log-entry').forEach(item => {
      const text = item.textContent.toLowerCase();
      item.style.display = (!query || text.includes(query)) ? '' : 'none';
    });
  }

  // Toggle clear button without full re-render
  const searchDiv = el.querySelector('.modal-tab-search');
  if (searchDiv) {
    let clearBtn = searchDiv.querySelector('.search-clear');
    if (query && !clearBtn) {
      clearBtn = document.createElement('span');
      clearBtn.className = 'search-clear';
      clearBtn.innerHTML = '&#x2715;';
      clearBtn.onclick = () => clearTabSearch(projectId);
      searchDiv.appendChild(clearBtn);
    } else if (!query && clearBtn) {
      clearBtn.remove();
    }
  }
}

function clearTabSearch(projectId) {
  modalSearchQuery[projectId] = '';
  const modalId = findModalIdForProject(projectId);
  if (!modalId) return;
  const el = openModals.get(modalId).element;
  const input = el.querySelector('.modal-tab-search input');
  if (input) { input.value = ''; input.focus(); }
  applyTabFilter(projectId);
}

async function importFromProject(projectId) {
  try {
    const res = await fetch(API_BASE + `/api/project/${projectId}/import`, { method: 'POST' });
    const data = await res.json();
    if (!data.ok) { alert(data.error || 'Import failed'); return; }
    const imp = data.imported || {};
    const parts = [];
    if (imp.activity_log) parts.push(`${imp.activity_log} log entries`);
    if (imp.backlog) parts.push(`${imp.backlog} backlog items`);
    if (imp.description) parts.push('description');
    if (imp.current_task) parts.push('current task');
    alert(parts.length > 0 ? `Imported: ${parts.join(', ')}` : 'No new data found in CHANGELOG.md');

  } catch(e) { alert('Import failed: ' + e.message); }
}

    if (entry.minimized) restoreModal(modalId);
